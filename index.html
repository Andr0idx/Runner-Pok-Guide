            <div className="mt-5 pt-5 border-t border-zinc-800/80 grid grid-cols-1 lg:grid-cols-2 gap-6">
              <div className="space-y-3">
                <div className="font-black text-zinc-100">Ataque vs oponente</div>
                {good.length || ok.length || bad.length || noEff.length || incompat.length ? (
                  <div className="flex flex-wrap gap-2">
                    {good.map((m) => (
                      <MoveEffectChip
                        key={m.apiName}
                        label={m.label}
                        mult={formatMultiplier(m.multiplier)}
                        tone="good"
                        typeLabel={m.type}
                        onMouseEnter={(e) =>
                          setMoveTip({
                            anchorEl: e.currentTarget,
                            payload: m,
                            learn: m.learn || (versionGroupName ? 'Não aprende nesse jogo' : ''),
                          })
                        }
                        onMouseLeave={closeMoveTip}
                      />
                    ))}
                    {ok.map((m) => (
                      <MoveEffectChip
                        key={m.apiName}
                        label={m.label}
                        mult={formatMultiplier(m.multiplier)}
                        tone="neutral"
                        typeLabel={m.type}
                        onMouseEnter={(e) =>
                          setMoveTip({
                            anchorEl: e.currentTarget,
                            payload: m,
                            learn: m.learn || (versionGroupName ? 'Não aprende nesse jogo' : ''),
                          })
                        }
                        onMouseLeave={closeMoveTip}
                      />
                    ))}
                    {bad.map((m) => (
                      <MoveEffectChip
                        key={m.apiName}
                        label={m.label}
                        mult={formatMultiplier(m.multiplier)}
                        tone="bad"
                        typeLabel={m.type}
                        onMouseEnter={(e) =>
                          setMoveTip({
                            anchorEl: e.currentTarget,
                            payload: m,
                            learn: m.learn || (versionGroupName ? 'Não aprende nesse jogo' : ''),
                          })
                        }
                        onMouseLeave={closeMoveTip}
                      />
                    ))}
                    {noEff.map((m) => (
                      <MoveEffectChip
                        key={m.apiName}
                        label={m.label}
                        mult={formatMultiplier(m.multiplier)}
                        tone="no"
                        typeLabel={m.type}
                        onMouseEnter={(e) =>
                          setMoveTip({
                            anchorEl: e.currentTarget,
                            payload: m,
                            learn: m.learn || (versionGroupName ? 'Não aprende nesse jogo' : ''),
                          })
                        }
                        onMouseLeave={closeMoveTip}
                      />
                    ))}
                    {incompat.map((m) => (
                      <MoveEffectChip
                        key={m.apiName}
                        label={`${m.label} (incompatível)`}
                        tone="incompat"
                        typeLabel={m.type}
                        onMouseEnter={(e) =>
                          setMoveTip({
                            anchorEl: e.currentTarget,
                            payload: m,
                            learn: m.learn || (versionGroupName ? 'Não aprende nesse jogo' : ''),
                          })
                        }
                        onMouseLeave={closeMoveTip}
                      />
                    ))}
                  </div>
                ) : (
                  <div className="text-sm text-zinc-400">Sem golpes para analisar.</div>
                )}
                <div className="text-xs text-zinc-400 font-semibold">
                  Melhor multiplicador ofensivo: <span className="text-zinc-200 font-black">{formatMultiplier(bestOff)}</span>
                </div>
              </div>

              <div className="space-y-3">
                <div className="font-black text-zinc-100">Defesa</div>
                {worstThreat > 1 ? (
                  <div className="text-sm text-zinc-200">
                    Risco: toma <span className="font-black">{formatMultiplier(worstThreat)}</span> de{' '}
                    <span className="font-black">{worstTypes.join(', ')}</span>
                  </div>
                ) : (
                  <div className="text-sm text-zinc-200">Risco: sem fraqueza de STAB do oponente.</div>
                )}
                {matchupStatus === 'loading' ? (
                  <div className="text-sm text-zinc-400">Carregando forte/fraco...</div>
                ) : matchupStatus === 'error' ? (
                  <div className="text-sm text-zinc-400">Não foi possível calcular agora.</div>
                ) : (
                  <div className="grid grid-cols-1 gap-4">
                    <InfoBlock title="Forte contra" titleClass="text-zinc-200" items={strongAgainst} />
                    <InfoBlock title="Fraco contra" titleClass="text-zinc-200" items={weakTo} />
                  </div>
                )}
              </div>
            </div>

            <SmartTooltip open={moveTipOpen} anchorEl={moveTip?.anchorEl}>
              {moveTip?.payload ? (
                <div className="w-80 max-w-full">
                  <div className="grid grid-cols-2 gap-2 mb-3">
                    <TypePill label={moveTip.payload.type} fullWidth />
                    <TypePill label={moveTip.payload.category} fullWidth />
                  </div>
                  <MoveTooltipContent move={moveTip.payload} lang="pt" versionGroupName={versionGroupName} learn={moveTip?.learn} />
                </div>
              ) : null}
            </SmartTooltip>

            {stats.length ? (
              <div className="mt-5 pt-5 border-t border-zinc-800/80">
                <div className="font-black text-zinc-100 mb-3">Base stats</div>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                  {stats.map((s) => (
                    <div key={s.name} className="flex items-center gap-3">
                      <div className="w-24 text-xs text-zinc-400 font-black">{s.name}</div>
                      <div className="flex-1 h-2 rounded-full bg-zinc-800 overflow-hidden">
                        <div
                          className="h-2 rounded-full bg-cyan-400/60"
                          style={{ width: `${clamp((s.value / 200) * 100, 4, 100)}%` }}
                        />
                      </div>
                      <div className="w-10 text-right text-xs text-zinc-200 font-black">{s.value}</div>
                    </div>
                  ))}
                </div>
              </div>
            ) : pokeStatus === 'loading' ? (
              <div className="mt-5 pt-5 border-t border-zinc-800/80 text-sm text-zinc-400">Carregando stats...</div>
            ) : null}
          </div>
        );
      }

      function BattleSmallCard({ member, onSelect }) {
        const dexNumber = Number.isFinite(member?.id) ? `#${String(member.id).padStart(4, '0')}` : '';
        const worstThreat = typeof member?.worstThreat === 'number' ? member.worstThreat : 1;
        const worstTypes = Array.isArray(member?.worstThreatTypes) ? member.worstThreatTypes : [];
        const bestOff = typeof member?.bestOffensive === 'number' ? member.bestOffensive : 1;
        const good = Array.isArray(member?.goodMoves) ? member.goodMoves : [];

        return (
          <button
            onClick={onSelect}
            type="button"
            className="w-full text-left rounded-3xl border border-zinc-700 bg-zinc-900/40 p-5 hover:border-zinc-500 hover:bg-zinc-900/55 transition-colors"
          >
            <div className="flex items-center gap-4">
              {member?.image ? <img src={member.image} alt={member.label} className="w-16 h-16 object-contain drop-shadow-xl" /> : null}
              <div className="min-w-0 flex-1">
                <div className="flex items-baseline gap-3 flex-wrap">
                  <div className="text-xl font-black text-white truncate">{member?.label || 'Pokémon'}</div>
                  {dexNumber ? <div className="text-xs text-zinc-500 font-black">{dexNumber}</div> : null}
                </div>
                {Array.isArray(member?.types) && member.types.length ? (
                  <div className="mt-2 flex flex-wrap gap-2">
                    {member.types.map((t) => (
                      <TypePill key={t} label={t} />
                    ))}
                  </div>
                ) : null}
                <div className="mt-3 text-xs text-zinc-400 font-semibold">
                  Ofensivo: <span className="text-zinc-200 font-black">{formatMultiplier(bestOff)}</span>
                  {worstThreat > 1 ? (
                    <>
                      {' '}
                      • Defensivo: <span className="text-zinc-200 font-black">{formatMultiplier(worstThreat)}</span> ({worstTypes.join(', ')})
                    </>
                  ) : (
                    <>
                      {' '}
                      • Defensivo: <span className="text-zinc-200 font-black">ok</span>
                    </>
                  )}
                </div>
                {good.length ? (
                  <div className="mt-3 flex flex-wrap gap-2">
                    {good.slice(0, 2).map((m) => (
                      <MoveEffectChip key={m.apiName} label={m.label} mult={formatMultiplier(m.multiplier)} tone="good" typeLabel={m.type} />
                    ))}
                    {good.length > 2 ? <MoveEffectChip label={`+${good.length - 2}`} tone="neutral" /> : null}
                  </div>
                ) : null}
              </div>
            </div>
          </button>
        );
      }

      function BattleTeamCard({ slotIndex, slot, versionGroupName }) {
        const apiName = String(slot?.speciesName ?? '').trim().toLowerCase();
        const { status: pokeStatus, data: poke } = usePokemon(apiName);
        const { status: evoStatus, next: evoNext } = useEvolutionNextLevel(apiName);

        const dexNumber = Number.isFinite(poke?.id) ? `#${String(poke.id).padStart(4, '0')}` : '';
        const types = Array.isArray(poke?.types)
          ? poke.types
              .slice()
              .sort((a, b) => (a?.slot || 0) - (b?.slot || 0))
              .map((t) => typeLabelFromApiName(t?.type?.name))
              .filter(Boolean)
          : [];

        const image =
          pickBestSprite(poke, false) ||
          `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${Number.isFinite(poke?.id) ? poke.id : ''}.png`;

        const evoLevel = Number.isFinite(evoNext?.level) ? Number(evoNext.level) : null;

        const moveSlots = useMemo(() => {
          const cur = Array.isArray(slot?.moveApiNames) ? slot.moveApiNames : [];
          const norm = cur
            .map((x) => String(x ?? '').trim().toLowerCase())
            .slice(0, 4);
          while (norm.length < 4) norm.push('');
          return norm;
        }, [JSON.stringify(slot?.moveApiNames || [])]);

        const nonEmptyMoveApiNames = useMemo(() => moveSlots.filter(Boolean), [moveSlots]);
        const { moves: moveRows } = useMovesDetails(nonEmptyMoveApiNames);
        const moveMap = useMemo(() => new Map((moveRows || []).map((r) => [r.apiName, r])), [moveRows]);

        const learnableMoves = useMemo(() => getLearnableMovesForVersionGroup(poke, versionGroupName), [poke, versionGroupName]);
        const learnableSet = useMemo(() => new Set((learnableMoves || []).map((m) => m.apiName)), [learnableMoves]);
        const learnMap = useMemo(() => new Map((learnableMoves || []).map((m) => [m.apiName, m.learn])), [learnableMoves]);

        const [tooltip, setTooltip] = useState(null);
        const tooltipOpen = Boolean(tooltip?.anchorEl);
        const closeTooltip = () => setTooltip(null);

        if (!apiName) {
          return (
            <div className="rounded-3xl border border-zinc-700 bg-zinc-900/50 shadow-2xl p-6">
              <div className="text-zinc-500 font-semibold">Slot {slotIndex + 1}: selecione um Pokémon na aba Time.</div>
            </div>
          );
        }

        return (
          <div className="rounded-3xl border border-zinc-700 bg-zinc-900/50 shadow-2xl">
            <div className="p-6">
              <div className="flex items-center gap-4">
                {pokeStatus === 'loading' ? (
                  <div className="w-20 h-20 flex items-center justify-center text-zinc-500">...</div>
                ) : (
                  <img src={image} alt={apiName} className="w-20 h-20 object-contain drop-shadow-xl" />
                )}
                <div className="min-w-0 flex-1">
                  <div className="flex items-baseline gap-3 flex-wrap">
                    <div className="text-2xl font-black text-white truncate">{titleFromApiName(apiName)}</div>
                    {dexNumber ? <div className="text-sm text-zinc-400 font-black">{dexNumber}</div> : null}
                  </div>
                  {types.length ? (
                    <div className="mt-2 flex flex-wrap gap-2">
                      {types.map((t) => (
                        <TypePill key={t} label={t} />
                      ))}
                    </div>
                  ) : null}
                  {evoStatus !== 'loading' && evoLevel ? (
                    <div className="mt-2 text-sm text-zinc-300">
                      <span className="text-zinc-200 font-black">Evolui:</span> Nv. {evoLevel}
                    </div>
                  ) : null}
                </div>
              </div>

              <div className="mt-5 rounded-2xl border border-zinc-700 overflow-hidden">
                <table className="w-full table-fixed border-separate border-spacing-0">
                  <thead>
                    <tr className="bg-zinc-800 text-left">
                      <th className="p-2 lg:p-3 w-[34%]">Move</th>
                      <th className="p-2 lg:p-3 w-[16%]">Tipo</th>
                      <th className="p-2 lg:p-3 w-[16%]">Categoria</th>
                      <th className="p-2 lg:p-3 w-[34%] lg:hidden">Stats</th>
                      <th className="hidden lg:table-cell p-2 lg:p-3 w-[12%]">Pwr</th>
                      <th className="hidden lg:table-cell p-2 lg:p-3 w-[12%]">Acc</th>
                      <th className="hidden lg:table-cell p-2 lg:p-3 w-[10%]">PP</th>
                    </tr>
                  </thead>
                  <tbody>
                    {moveSlots.map((m, idx) => {
                      const api = String(m ?? '').trim().toLowerCase();
                      if (!api) {
                        return (
                          <tr key={`empty:${idx}`} className="border-t border-zinc-700 bg-zinc-900/40">
                            <td className="p-2 lg:p-3 text-zinc-500" colSpan={7}>
                              Slot vazio
                            </td>
                          </tr>
                        );
                      }

                      const row =
                        moveMap.get(api) || ({
                          name: titleFromApiName(api),
                          apiName: api,
                          type: 'Normal',
                          category: 'Status',
                          power: '-',
                          acc: '-',
                          pp: '-',
                        });
                      const incompatible = Boolean(versionGroupName && pokeStatus === 'success' && !learnableSet.has(api));

                      return (
                        <tr key={`${idx}:${api}`} className={`border-t border-zinc-700 bg-zinc-900/40 ${incompatible ? 'bg-red-500/5' : ''}`}>
                          <td className={`p-2 lg:p-3 font-semibold align-middle ${incompatible ? 'text-red-200' : 'text-zinc-100'}`}>
                            <span
                              className={`min-w-0 inline-flex items-center gap-2 transition-colors cursor-help leading-tight ${
                                incompatible ? 'text-red-200' : 'hover:text-cyan-300'
                              }`}
                              onMouseEnter={(e) =>
                                setTooltip({
                                  kind: 'move',
                                  anchorEl: e.currentTarget,
                                  payload: row,
                                  learn:
                                    learnMap.get(row.apiName) ||
                                    (versionGroupName && pokeStatus === 'success' ? 'Não aprende nesse jogo' : ''),
                                })
                              }
                              onMouseLeave={closeTooltip}
                            >
                              <span className="truncate">{row.name}</span>
                              <span className="shrink-0 text-xs text-zinc-500">ⓘ</span>
                            </span>
                          </td>
                          <td className="p-2 lg:p-3 align-middle">
                            <span
                              className="block w-full"
                              onMouseEnter={(e) => {
                                const isStatus = row.category === 'Status';
                                setTooltip({ kind: isStatus ? 'status' : 'type', anchorEl: e.currentTarget, payload: isStatus ? row : row.type });
                              }}
                              onMouseLeave={closeTooltip}
                            >
                              <TypePill label={row.type} fullWidth size="sm" className={incompatible ? 'border-red-400/70' : ''} />
                            </span>
                          </td>
                          <td className="p-2 lg:p-3 align-middle">
                            <span
                              className="block w-full"
                              onMouseEnter={(e) => {
                                if (row.category !== 'Status') return;
                                setTooltip({ kind: 'status', anchorEl: e.currentTarget, payload: row });
                              }}
                              onMouseLeave={closeTooltip}
                            >
                              <TypePill label={row.category} fullWidth size="sm" className={incompatible ? 'border-red-400/70' : ''} />
                            </span>
                          </td>
                          <td className="p-2 lg:p-3 align-middle text-xs text-zinc-200 lg:hidden">
                            <span className="truncate block">
                              {row.power} • {row.acc} • {row.pp}
                            </span>
                          </td>
                          <td className="hidden lg:table-cell p-2 lg:p-3 align-middle text-zinc-100">{row.power}</td>

              </div>

              <SmartTooltip open={tooltipOpen} anchorEl={tooltip?.anchorEl}>
                {tooltip?.kind === 'move' ? (
                  <div className="w-80 max-w-full">
                    <div className="grid grid-cols-2 gap-2 mb-3">
                      <TypePill label={tooltip.payload.type} fullWidth />
                      <TypePill label={tooltip.payload.category} fullWidth />
                    </div>
                    <MoveTooltipContent move={tooltip.payload} lang="pt" versionGroupName={versionGroupName} learn={tooltip?.learn} />

                ) : tooltip?.kind === 'type' ? (
                  <MoveTypeTooltipContent type={tooltip.payload} />
                ) : tooltip?.kind === 'status' ? (
                  <div className="w-80 max-w-full">
                    <div className="text-xs font-black text-zinc-200 mb-2 truncate">{tooltip?.payload?.name || 'Efeito do move'}</div>
                    <MoveStatusTooltipContent move={tooltip.payload} lang="pt" versionGroupName={versionGroupName} />
                  </div>
                ) : null}
              </SmartTooltip>
            </div>
          </div>
        );
      }

      function OpponentDetailCard({ apiName }) {
        const name = String(apiName ?? '').trim().toLowerCase();
        const { status: pokeStatus, data: poke } = usePokemon(name);
        const { status: genusStatus, text: genusText } = useSpeciesGenus(name);
        const { status: dexStatus, text: dexText } = useSpeciesFlavorText(name);
        const { status: evoStatus, next: evoNext } = useEvolutionNextLevel(name);

        const dexNumber = Number.isFinite(poke?.id) ? `#${String(poke.id).padStart(4, '0')}` : '';
        const types = Array.isArray(poke?.types)
          ? poke.types
              .slice()
              .sort((a, b) => (a?.slot || 0) - (b?.slot || 0))
              .map((t) => typeLabelFromApiName(t?.type?.name))
              .filter(Boolean)
          : [];

        const image =
          pickBestSprite(poke, false) ||
          `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${Number.isFinite(poke?.id) ? poke.id : ''}.png`;

        const { status: matchupStatus, strongAgainst, weakTo } = usePokemonMatchups(types);

        const genus =
          genusStatus === 'loading'
            ? 'Carregando espécie...'
            : genusStatus === 'error'
              ? 'Não foi possível carregar a espécie.'
              : genusText || '';

        const dex =
          dexStatus === 'loading'
            ? 'Carregando texto da Pokédex...'
            : dexStatus === 'error'
              ? 'Não foi possível carregar o texto da Pokédex.'
              : dexText || '';

        const abilities = Array.isArray(poke?.abilities)
          ? poke.abilities
              .slice()
              .sort((a, b) => (a?.slot || 0) - (b?.slot || 0))
              .map((a) => titleFromApiName(a?.ability?.name))
              .filter(Boolean)
          : [];

        const heightM = Number.isFinite(poke?.height) ? (poke.height / 10).toFixed(1) : null;
        const weightKg = Number.isFinite(poke?.weight) ? (poke.weight / 10).toFixed(1) : null;
        const evoLevel = Number.isFinite(evoNext?.level) ? Number(evoNext.level) : null;

        const stats = Array.isArray(poke?.stats)
          ? poke.stats
              .slice()
              .map((s) => ({
                name: titleFromApiName(s?.stat?.name),
                value: Number.isFinite(s?.base_stat) ? s.base_stat : null,
              }))
              .filter((x) => x.name && Number.isFinite(x.value))
          : [];

        return (
          <div className="rounded-3xl border border-zinc-700 bg-zinc-900/50 shadow-2xl p-6">
            <div className="flex flex-col md:flex-row gap-6 items-center md:items-start">
              <div className="w-40 h-40 flex items-center justify-center">
                {pokeStatus === 'loading' ? (
                  <div className="text-zinc-400">Carregando...</div>
                ) : (
                  <img src={image} alt={name} className="w-40 h-40 object-contain drop-shadow-2xl" />
                )}
              </div>

              <div className="flex-1 w-full">
                <div className="flex items-baseline gap-3 flex-wrap">
                  <h2 className="text-2xl font-black text-white">{name ? titleFromApiName(name) : 'Oponente'}</h2>
                  {dexNumber ? <span className="text-sm text-zinc-400 font-black">{dexNumber}</span> : null}
                </div>

                {genus ? <p className="text-zinc-300">{genus}</p> : null}

                {types.length ? (
                  <div className="mt-2 flex flex-wrap gap-2">
                    {types.map((t) => (
                      <TypePill key={t} label={t} />
                    ))}
                  </div>
                ) : null}

                {abilities.length || heightM || weightKg ? (
                  <div className="mt-4 flex flex-wrap gap-2">
                    {abilities.length ? (
                      <span className="border border-zinc-700 bg-zinc-900/20 rounded-full px-3 py-1 text-sm text-zinc-300">
                        <span className="text-zinc-200 font-black">Habilidades:</span> {abilities.join(', ')}
                      </span>
                    ) : null}
                    {evoStatus !== 'loading' && evoLevel ? (
                      <span className="border border-zinc-700 bg-zinc-900/20 rounded-full px-3 py-1 text-sm text-zinc-300">
                        <span className="text-zinc-200 font-black">Evolui:</span> Nv. {evoLevel}
                      </span>
                    ) : null}
                    {heightM ? (
                      <span className="border border-zinc-700 bg-zinc-900/20 rounded-full px-3 py-1 text-sm text-zinc-300">
                        <span className="text-zinc-200 font-black">Altura:</span> {heightM} m
                      </span>
                    ) : null}
                    {weightKg ? (
                      <span className="border border-zinc-700 bg-zinc-900/20 rounded-full px-3 py-1 text-sm text-zinc-300">
                        <span className="text-zinc-200 font-black">Peso:</span> {weightKg} kg
                      </span>
                    ) : null}
                  </div>
                ) : null}
              </div>
            </div>

            {dex ? (
              <div className="mt-5 pt-5 border-t border-zinc-800/80">
                <div className="text-sm text-zinc-200 leading-relaxed">{dex}</div>
              </div>
            ) : null}

            {matchupStatus === 'loading' ? (
              <div className="mt-5 pt-5 border-t border-zinc-800/80 text-sm text-zinc-400">Carregando fraquezas e forças...</div>
            ) : matchupStatus === 'error' ? (
              <div className="mt-5 pt-5 border-t border-zinc-800/80 text-sm text-zinc-400">Não foi possível calcular agora.</div>
            ) : (
              <div className="mt-5 pt-5 border-t border-zinc-800/80 grid grid-cols-1 gap-4">
                <InfoBlock title="Forte contra" titleClass="text-zinc-200" items={strongAgainst} />
                <InfoBlock title="Fraco contra" titleClass="text-zinc-200" items={weakTo} />
              </div>
            )}

            {stats.length ? (
              <div className="mt-5 pt-5 border-t border-zinc-800/80">
                <div className="font-black text-zinc-100 mb-3">Base stats</div>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                  {stats.map((s) => (
                    <div key={s.name} className="flex items-center gap-3">
                      <div className="w-24 text-xs text-zinc-400 font-black">{s.name}</div>
                      <div className="flex-1 h-1.5 rounded-full bg-zinc-800 overflow-hidden">
                        <div
                          className="h-1.5 rounded-full bg-cyan-400/60"
                          style={{ width: `${clamp((s.value / 200) * 100, 4, 100)}%` }}
                        />
                      </div>
                      <div className="w-10 text-right text-xs text-zinc-200 font-black">{s.value}</div>
                    </div>
                  ))}
                </div>
              </div>
            ) : null}
          </div>
        );
      }

      function trainerSpriteUrl(trainerKey) {
        const k = String(trainerKey ?? '').trim().toLowerCase();
        if (!k) return '';
        return `https://play.pokemonshowdown.com/sprites/trainers/${encodeURIComponent(k)}.png`;
      }

      const CAPTURE_RESOLVE_VERSIONS_CACHE = new Map();
      const CAPTURE_HAS_WILD_ENCOUNTER_CACHE = new Map();

      async function getVersionsForVersionGroup(versionGroupName) {
        const vg = String(versionGroupName ?? '').trim().toLowerCase();
        if (!vg) return [];
        if (CAPTURE_RESOLVE_VERSIONS_CACHE.has(vg)) return CAPTURE_RESOLVE_VERSIONS_CACHE.get(vg);
        const data = await cachedFetchJson(`${POKEAPI_BASE}/version-group/${vg}`);
        const list = Array.isArray(data?.versions) ? data.versions.map((v) => String(v?.name ?? '').trim().toLowerCase()).filter(Boolean) : [];
        CAPTURE_RESOLVE_VERSIONS_CACHE.set(vg, list);
        return list;
      }

      async function hasWildEncounterInVersions(pokemonApiName, versions) {
        const name = String(pokemonApiName ?? '').trim().toLowerCase();
        const list = Array.isArray(versions) ? versions : [];
        if (!name || !list.length) return false;
        const key = `${name}::${list.join('|')}`;
        if (CAPTURE_HAS_WILD_ENCOUNTER_CACHE.has(key)) return CAPTURE_HAS_WILD_ENCOUNTER_CACHE.get(key);

        let ok = false;
        try {
          const rows = await cachedFetchJson(`${POKEAPI_BASE}/pokemon/${name}/encounters`);
          const versionSet = new Set(list);
          const areas = Array.isArray(rows) ? rows : [];
          ok = areas.some((a) => {
            const vds = Array.isArray(a?.version_details) ? a.version_details : [];
            return vds.some((vd) => versionSet.has(String(vd?.version?.name ?? '').trim().toLowerCase()));
          });
        } catch {
          ok = false;
        }

        CAPTURE_HAS_WILD_ENCOUNTER_CACHE.set(key, ok);
        return ok;
      }

      async function resolveCapturablePokemonForGame(pokemonApiName, versionGroupName) {
        const start = String(pokemonApiName ?? '').trim().toLowerCase();
        const vg = String(versionGroupName ?? '').trim().toLowerCase();
        if (!start || !vg) return start;

        const versions = await getVersionsForVersionGroup(vg);

        const chain = [];
        let cur = start;
        for (let i = 0; i < 8; i += 1) {
          chain.push(cur);
          let species = null;
          try {
            species = await getSpeciesData(cur);
          } catch {
            species = null;
          }
          const prev = String(species?.evolves_from_species?.name ?? '').trim().toLowerCase();
          if (!prev) break;
          cur = prev;
        }

        if (versions.length) {
          for (const candidate of chain) {
            const can = await hasWildEncounterInVersions(candidate, versions);
            if (can) return candidate;
          }
        }

        return chain[chain.length - 1] || start;
      }

      // Normaliza chaves de sprite de treinadores:
      // - remove espaços/pontuação
      // - padroniza alguns casos (ex.: "Lt. Surge")
      function normalizeTrainerSpriteKey(input) {
        const raw = String(input ?? '').trim().toLowerCase();
        if (!raw) return '';
        const cleaned = raw
          .replace(/\(.*?\)/g, '')
          .replace(/&/g, ' and ')
          .replace(/[^a-z0-9_-]+/g, ' ')
          .replace(/\s+/g, ' ')
          .trim()
          .replace(/\s/g, '');
        if (cleaned === 'lt_surge' || cleaned === 'ltsurge') return 'ltsurge';
        if (cleaned === 'tateandliza' || cleaned === 'lizaandtate') return 'tateandliza';
        if (cleaned === 'crasherwake') return 'crasherwake';
        if (cleaned === 'chairmanrose') return 'rose';
        return cleaned;
      }

      // Gera possíveis variações de chave para aumentar a chance de encontrar o sprite.
      // Ex.: "phoebe" pode existir como "phoebe-gen3" etc.
      function trainerSpriteCandidates(key) {
        const k = normalizeTrainerSpriteKey(key);
        if (!k) return [];
        const hasGen = /-gen\d/.test(k);
        const base = hasGen ? k.replace(/-gen\d+.*$/, '') : k;
        const out = hasGen
          ? [k, base]
          : [
              k,
              `${base}-gen3`,
              `${base}-gen4`,
              `${base}-gen5`,
              `${base}-gen6`,
              `${base}-gen7`,
              `${base}-gen8`,
              `${base}-gen9`,
              `${base}-gen2`,
              `${base}-gen1`,
            ];
        const unique = [];
        const seen = new Set();
        for (const x of out) {
          if (!x || seen.has(x)) continue;
          seen.add(x);
          unique.push(x);
        }
        return unique;
      }

      // Retorna a lista de bosses para o versionGroup, garantindo normalização de nomes.
      function getBossRosters(versionGroupName) {
        const vg = String(versionGroupName ?? '').trim().toLowerCase();
        const list = Array.isArray(BOSS_ROSTERS_BY_VERSION_GROUP[vg]) ? BOSS_ROSTERS_BY_VERSION_GROUP[vg] : [];
        return list.map((b) => ({
          ...b,
          roster: Array.isArray(b?.roster) ? b.roster.map((x) => String(x ?? '').trim().toLowerCase()).filter(Boolean) : [],
          trainer: normalizeTrainerSpriteKey(b?.trainer) || normalizeTrainerSpriteKey(b?.label),
        }));
      }

      function bossCategoryLabel(category) {
        const c = String(category ?? '').trim().toLowerCase();
        if (c === 'gym') return 'Ginásios';
        if (c === 'e4') return 'Elite 4';
        if (c === 'champion') return 'Campeão';
        return titleFromApiName(c);
      }

      // Renderiza o ícone do boss (treinador).
      // Tenta várias chaves e, se nenhuma funcionar, mostra um fallback textual (letra).
      function BossAvatar({ trainerKey, fallbackText, alt, className } = {}) {
        const label = String(alt ?? '');
        const text = String(fallbackText ?? '').slice(0, 1) || 'B';
        const candidates = useMemo(() => trainerSpriteCandidates(trainerKey), [trainerKey]);
        const [idx, setIdx] = useState(0);

        useEffect(() => {
          setIdx(0);
        }, [trainerKey]);

        const key = idx >= 0 ? candidates[idx] || '' : '';
        const src = key ? trainerSpriteUrl(key) : '';

        if (!src) {
          return <span className={className}>{text}</span>;
        }

        return (
          <img
            src={src}
            alt={label}
            className={className}
            loading="lazy"
            referrerPolicy="no-referrer"
            onError={() => setIdx((i) => (i + 1 < candidates.length ? i + 1 : -1))}
          />
        );
      }

      function BossPicker({ value, onChange, bosses, placeholder = 'Selecionar boss' }) {
        const [open, setOpen] = useState(false);
        const [q, setQ] = useState('');
        const [activeIndex, setActiveIndex] = useState(0);
        const ref = useRef(null);

        const selected = useMemo(() => {
          const v = String(value ?? '').trim().toLowerCase();
          if (!v) return null;
          const list = Array.isArray(bosses) ? bosses : [];
          return list.find((x) => x?.id === v) || null;
        }, [bosses, value]);

        const filtered = useMemo(() => {
          const t = q.trim().toLowerCase();
          const list = Array.isArray(bosses) ? bosses : [];
          if (!t) return list;
          return list.filter((b) => {
            const label = String(b?.label ?? '').toLowerCase();
            const cat = bossCategoryLabel(b?.category).toLowerCase();
            return label.includes(t) || cat.includes(t);
          });
        }, [q, bosses]);

        useEffect(() => {
          if (!open) return;
          setActiveIndex(0);
          const onDown = (e) => {
            if (!ref.current) return;
            if (!ref.current.contains(e.target)) setOpen(false);
          };
          document.addEventListener('mousedown', onDown);
          return () => document.removeEventListener('mousedown', onDown);
        }, [open]);

        useEffect(() => {
          if (!open) return;
          setActiveIndex(0);
        }, [open, q]);

        const maxIndex = Array.isArray(filtered) ? filtered.length : 0;
        const clampIndex = (n) => Math.max(0, Math.min(Math.max(0, maxIndex - 1), n));

        return (
          <div ref={ref} className="relative w-full">
            <button
              onClick={() => setOpen((o) => !o)}
              className="w-full flex items-center justify-between gap-3 bg-zinc-800/60 border border-zinc-700 rounded-xl px-3 py-2 text-left hover:border-zinc-500 transition-colors"
              type="button"
            >
              <span className={`min-w-0 flex items-center gap-2 ${selected ? 'text-zinc-100' : 'text-zinc-400'}`}>
                <BossAvatar
                  trainerKey={selected?.trainer || ''}
                  fallbackText={selected ? selected.label[0] : 'B'}
                  alt={selected ? selected.label : 'Boss'}
                  className="w-8 h-8 rounded-lg border border-zinc-800 bg-zinc-900/30 flex items-center justify-center text-[10px] font-black text-zinc-300 object-contain"
                />
                <span className="truncate text-sm font-semibold">
                  {selected ? `${bossCategoryLabel(selected.category)} • ${selected.label}` : placeholder}
                </span>
              </span>
              <span className="text-zinc-500 text-xs font-black">{open ? '▲' : '▼'}</span>
            </button>

            {open ? (
              <div className="absolute z-50 mt-2 w-full rounded-xl border border-zinc-700 bg-zinc-900/95 backdrop-blur p-2 shadow-2xl">
                <input
                  value={q}
                  onChange={(e) => setQ(e.target.value)}
                  onKeyDown={(e) => {
                    if (e.key === 'Escape') {
                      setOpen(false);
                      return;
                    }
                    if (e.key === 'ArrowDown') {
                      e.preventDefault();
                      setActiveIndex((i) => clampIndex(i + 1));
                      return;
                    }
                    if (e.key === 'ArrowUp') {
                      e.preventDefault();
                      setActiveIndex((i) => clampIndex(i - 1));
                      return;
                    }
                    if (e.key === 'Enter') {
                      e.preventDefault();
                      const pick = filtered[activeIndex];
                      if (pick?.id) {
                        onChange(pick.id);
                        setOpen(false);
                      }
                    }
                  }}
                  placeholder="Buscar boss..."
                  className="w-full bg-zinc-800/60 border border-zinc-700 rounded-lg px-3 py-2 text-sm outline-none focus:border-cyan-400 text-white"
                />

                <div className="mt-2 max-h-72 overflow-auto pr-1">

                    const active = b.id === value;
                    const highlighted = activeIndex === idx;
                    return (
                      <button
                        key={b.id}
                        onClick={() => {
                          onChange(active ? '' : b.id);
                          setOpen(false);
                        }}
                        className={`w-full text-left px-3 py-2 rounded-lg text-sm font-semibold transition-colors ${
                          active || highlighted
                            ? 'border border-cyan-400/50 bg-cyan-500/10 text-cyan-100'
                            : 'text-zinc-200 hover:bg-zinc-800/50'
                        }`}
                        type="button"

                        <div className="flex items-center justify-between gap-3">
                          <span className="min-w-0 flex items-center gap-2">
                            <BossAvatar
                              trainerKey={b?.trainer || ''}
                              fallbackText={b.label[0]}
                              alt={b.label}
                              className="w-8 h-8 rounded-lg border border-zinc-800 bg-zinc-900/30 flex items-center justify-center text-[10px] font-black text-zinc-300 object-contain"
                            />
                            <span className="truncate">{b.label}</span>
                          </span>
                          <span className="text-xs text-zinc-500 font-black">{bossCategoryLabel(b.category)}</span>
                        </div>
                      </button>
                    );
                  })}
                  {!filtered.length ? <div className="px-3 py-2 text-sm text-zinc-500">Nenhum boss encontrado.</div> : null}
                </div>
              </div>
            ) : null}
          </div>
        );
      }

        const types = Array.isArray(data?.types)
          ? data.types
              .slice()
              .sort((a, b) => (a?.slot || 0) - (b?.slot || 0))
              .map((t) => typeLabelFromApiName(t?.type?.name))
              .filter(Boolean)
          : [];
        const image =
          pickBestSprite(data, false) ||
          `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${Number.isFinite(data?.id) ? data.id : ''}.png`;

      // Página: Batalha (recomenda o melhor membro do time contra um oponente)
      function BattlePage({
        initialOpponent = '',
        initialMode = 'pokemon',
        initialBossCategory = 'gym',
        initialBossId = '',
        initialActiveSlotIndex = null,
        onSessionChange,
      } = {}) {
        const { status: speciesStatus, items: speciesItems } = usePokemonList();
        const [team] = usePersistentState(TEAM_STORAGE_KEY, DEFAULT_TEAM_STATE);
        const [opponent, setOpponent] = useState(String(initialOpponent ?? '').trim().toLowerCase());
        const [mode, setMode] = useState(String(initialMode ?? 'pokemon') || 'pokemon');
        const [bossCategory, setBossCategory] = useState(String(initialBossCategory ?? 'gym') || 'gym');
        const [bossId, setBossId] = useState(String(initialBossId ?? '') || '');

        // A Batalha sempre segue o jogo selecionado no Time.
        // Isso faz o modo Boss carregar o roster correto do jogo.
        const versionGroupName = String(team?.versionGroupName ?? '').trim().toLowerCase();
        const gameOptions = useMemo(() => POKEDEX_BY_GAME.map((g) => ({ key: g.key, label: g.label })), []);
        const versionGroupLabel = useMemo(
          () => gameOptions.find((g) => g.key === versionGroupName)?.label || '',

        const selectedGame = useMemo(

        const pickerItems = useMemo(() => {

        const slots = Array.isArray(team?.slots) ? team.slots.slice(0, 6) : DEFAULT_TEAM_STATE.slots;

        const teamSpeciesSet = useMemo(() => {
          const set = new Set();

        // Carrega bosses configurados para o jogo atual (Ginásios / Elite 4 / Campeão).
        const allBosses = useMemo(() => getBossRosters(versionGroupName), [versionGroupName]);
        const bossCategories = useMemo(() => {
          const set = new Set(allBosses.map((b) => b.category).filter(Boolean));

          return list;
        }, [allBosses]);
        const bossesInCategory = useMemo(() => allBosses.filter((b) => b.category === bossCategory), [allBosses, bossCategory]);
        const selectedBoss = useMemo(() => bossesInCategory.find((b) => b.id === bossId) || null, [bossesInCategory, bossId]);

        useEffect(() => {
          if (mode !== 'boss') return;
          if (!bossCategories.includes(bossCategory)) {
            setBossCategory(bossCategories[0] || 'gym');
            return;
          }
          if (!bossesInCategory.length) {
            setBossId('');
            return;
          }
          if (!bossId || !selectedBoss) {
            setBossId(bossesInCategory[0].id);
          }
        }, [mode, bossCategories.join('|'), bossCategory, bossesInCategory.length, bossId, selectedBoss?.id]);

        const activeSlotIndexRef = useRef(initialActiveSlotIndex);
        const userPickedRef = useRef(Number.isFinite(initialActiveSlotIndex));

        const [analysis, setAnalysis] = useState({ status: 'idle', data: null });
        const [activeSlotIndex, setActiveSlotIndex] = useState(Number.isFinite(initialActiveSlotIndex) ? initialActiveSlotIndex : null);
        useEffect(() => {
          activeSlotIndexRef.current = activeSlotIndex;
        }, [activeSlotIndex]);

        const setOpponentAndReset = (v) => {
          userPickedRef.current = false;
          setActiveSlotIndex(null);
          setOpponent(String(v ?? '').trim().toLowerCase());
        };

        const selectSlot = (idx) => {
          userPickedRef.current = true;
          setActiveSlotIndex(idx);
        };

        useEffect(() => {
          if (mode !== 'boss') return;
          const first = selectedBoss?.roster?.[0] || '';
          const roster = Array.isArray(selectedBoss?.roster) ? selectedBoss.roster : [];

        useEffect(() => {
          if (typeof onSessionChange !== 'function') return;

            opponent,
            mode,
            bossCategory,
            bossId,
            activeSlotIndex,

        const targetOpponentRef = useRef('');
        const scrollYRef = useRef(0);

        useEffect(() => {
          let cancelled = false;
          const o = String(opponent ?? '').trim().toLowerCase();
          if (!o) {
            setAnalysis({ status: 'idle', data: null });

            return;

          targetOpponentRef.current = o;
          try {
            scrollYRef.current = window.scrollY || 0;

          }
          setAnalysis((prev) => ({ status: 'loading', data: prev?.data || null }));
          computeBattleAnalysis({ teamSlots: slots, versionGroupName, opponentApiName: o })
            .then((data) => {
              if (cancelled) return;
              setAnalysis({ status: 'success', data });
              const best = data?.rankedMembers?.[0] || null;
              if (Number.isFinite(best?.slotIndex) && targetOpponentRef.current === o) {
                if (!userPickedRef.current) setActiveSlotIndex(best.slotIndex);
              }
              requestAnimationFrame(() => {
                try {
                  const cur = window.scrollY || 0;
                  const target = Number(scrollYRef.current) || 0;
                  if (Math.abs(cur - target) >= 12) window.scrollTo({ top: target });
                } catch {
                  return;
                }
              });
            })
            .catch(() => {
              if (cancelled) return;
              setAnalysis((prev) => ({ status: 'error', data: prev?.data || null }));
            });

          return () => {
            cancelled = true;
          };
        }, [opponent, versionGroupName, JSON.stringify(slots)]);

        const ranked = Array.isArray(analysis.data?.rankedMembers) ? analysis.data.rankedMembers : [];
        const computedBest = ranked[0] || null;
        const active =
          Number.isFinite(activeSlotIndex) ? ranked.find((m) => m?.slotIndex === activeSlotIndex) || null : null;
        const focus = active || computedBest || null;
        const focusIsBest = Boolean(focus && computedBest && focus.slotIndex === computedBest.slotIndex);

                ) : null}

            </div>

            <div className="grid grid-cols-1 xl:grid-cols-2 gap-8 items-start">
              <div className="rounded-3xl border border-zinc-700 bg-zinc-900/30 p-6">
                <div className="flex items-center justify-between gap-4 mb-4">
                  <div className="text-lg font-black text-white truncate">Seu time</div>
                  {selectedGame ? <div className="text-xs text-zinc-500 font-semibold">{selectedGame.label}</div> : null}
                </div>

                {!opponent ? (
                  <div className="space-y-6">
                    {visibleSlots.length ? (
                      visibleSlots.map(({ slot, idx }) => (
                        <div key={`${idx}:${slot?.speciesName || ''}`}>
                          <BattleTeamCard slotIndex={idx} slot={slot} versionGroupName={versionGroupName} />
                        </div>
                      ))
                    ) : (
                      <div className="text-zinc-400">Nenhum Pokémon capturado no time.</div>
                    )}
                  </div>
                ) : analysis.status === 'loading' ? (
                  <div className="text-zinc-400">Analisando seu time...</div>
                ) : analysis.status === 'error' ? (
                  <div className="text-zinc-400">Não foi possível calcular agora.</div>
                ) : analysis.status === 'success' && focus ? (
                  <div className="space-y-6">
                    <BattleBestCard member={focus} isBest={focusIsBest} versionGroupName={versionGroupName} />
                    {rest.length ? (
                      <div className="space-y-4">
                        {rest.map((m) => (
                          <BattleSmallCard key={`${m.slotIndex}:${m.speciesName}`} member={m} onSelect={() => selectSlot(m.slotIndex)} />
                        ))}
                      </div>
                    ) : null}
                  </div>
                ) : (
                  <div className="text-zinc-400">Monte um time na aba Time para ver a priorização.</div>
                )}
              </div>

              <div className="space-y-6">
                <div className="rounded-3xl border border-zinc-700 bg-zinc-900/50 shadow-2xl p-6">
                  <div className="flex items-center justify-between gap-4">
                    <div className="text-lg font-black text-white">Oponente</div>
                  </div>
                  <div className="mt-3">
                    <div className="inline-flex rounded-xl border border-zinc-700 bg-zinc-900/20 p-0.5">
                      <button
                        type="button"
                        onClick={() => setMode('pokemon')}
                        className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors ${

          </div>
        );

      function useRealtimeSse(url) {
        const [state, setState] = useState({ status: 'idle', lastEvent: null, lastErrorAt: 0 });
        const lastUrlRef = useRef('');
        const lastKeyRef = useRef('');

        useEffect(() => {
          const u = String(url ?? '').trim();
          lastUrlRef.current = u;
          if (!u) {
            setState({ status: 'idle', lastEvent: null, lastErrorAt: 0 });
            return;
          }

          let closed = false;
          setState((prev) => ({ ...prev, status: 'connecting' }));

          let es = null;
          try {
            es = new EventSource(u);
          } catch {
            setState((prev) => ({ ...prev, status: 'error', lastErrorAt: Date.now() }));
            return;
          }

          es.onopen = () => {
            if (closed) return;
            setState((prev) => ({ ...prev, status: 'connected' }));
          };

          es.onerror = () => {
            if (closed) return;
            setState((prev) => ({ ...prev, status: 'error', lastErrorAt: Date.now() }));
          };

          es.onmessage = (e) => {
            if (closed) return;
            try {
              const data = JSON.parse(String(e?.data ?? ''));
              const key = JSON.stringify({
                s: String(data?.source ?? ''),
                sd: String(data?.sourceDetail ?? ''),
                p: String(data?.pokemon ?? data?.pokemonApiName ?? ''),
                ps: Array.isArray(data?.pokemons) ? data.pokemons : [],
                sid: Number.isFinite(Number(data?.speciesId)) ? Number(data.speciesId) : null,
                sids: Array.isArray(data?.speciesIds) ? data.speciesIds : [],
                a: Number.isFinite(Number(data?.addrUsed)) ? Number(data.addrUsed) : null,
              });
              if (key === lastKeyRef.current) return;
              lastKeyRef.current = key;
              setState({ status: 'connected', lastEvent: data, lastErrorAt: 0 });
            } catch {
              return;
            }
          };

          return () => {
            closed = true;
            try {
              es?.close();
            } catch {
              void 0;
            }
          };
        }, [url]);

        return state;
      }

      // Página: Real Time (modo "overlay" para atualizar o oponente automaticamente)
      function RealTimePage() {
        const { status: speciesStatus, items: speciesItems } = usePokemonList();
        const [team] = usePersistentState(TEAM_STORAGE_KEY, DEFAULT_TEAM_STATE);

        const [endpoint, setEndpoint] = usePersistentState('realtime:v1:endpoint', 'http://localhost:9123/events');
        const [auto, setAuto] = usePersistentState('realtime:v1:auto', true);
        const feed = useRealtimeSse(endpoint);

        const [opponents, setOpponents] = useState(['', '']);
        const [opponentIndex, setOpponentIndex] = useState(0);
        const [lastSeen, setLastSeen] = useState(null);
        const [bridge, setBridge] = useState({ status: 'idle', data: null });
        const [learnSpeciesId, setLearnSpeciesId] = useState('');
        const [learnStart, setLearnStart] = usePersistentState('realtime:v1:learnStart', '0x08000000');
        const [learnEnd, setLearnEnd] = usePersistentState('realtime:v1:learnEnd', '0x10000000');
        const [learnMode, setLearnMode] = usePersistentState('realtime:v1:learnMode', 'wild');
        const [bridgeAction, setBridgeAction] = useState({ status: 'idle', message: '' });
        const [sourceMode, setSourceMode] = usePersistentState('realtime:v1:sourceMode', 'auto');
        const [showAdvanced, setShowAdvanced] = usePersistentState('realtime:v1:showAdvanced', false);

        const versionGroupName = String(team?.versionGroupName ?? '').trim().toLowerCase();
        const gameOptions = useMemo(() => POKEDEX_BY_GAME.map((g) => ({ key: g.key, label: g.label })), []);
        const versionGroupLabel = useMemo(
          () => gameOptions.find((g) => g.key === versionGroupName)?.label || '',
          [gameOptions, versionGroupName]
        );
        const selectedGame = useMemo(
          () => POKEDEX_BY_GAME.find((g) => g.key === versionGroupName) || null,
          [versionGroupName]
        );
        const { status: teamDexStatus, entries: teamDexEntries } = usePokedexEntries(selectedGame?.pokedex);

        const pickerItems = useMemo(() => {
          if (selectedGame) {
            const list = Array.isArray(teamDexEntries) ? teamDexEntries : [];
            return list
              .map((e) => ({ name: e.speciesName, id: e.nationalId, order: e.entryNumber }))
              .filter((x) => x.name && Number.isFinite(x.id))
              .sort((a, b) => (a.order || 0) - (b.order || 0))
              .map(({ order, ...rest }) => rest);
          }
          return Array.isArray(speciesItems) ? speciesItems : [];
        }, [selectedGame, teamDexEntries, speciesItems]);

        const slots = Array.isArray(team?.slots) ? team.slots.slice(0, 6) : DEFAULT_TEAM_STATE.slots;
        const visibleSlots = useMemo(() => {
          return slots
            .map((slot, idx) => ({ slot, idx }))
            .filter(({ slot }) => slot?.captured !== false && String(slot?.speciesName ?? '').trim());
        }, [slots]);

        const teamSpeciesSet = useMemo(() => {
          const set = new Set();
          (slots || []).forEach((s) => {
            const n = String(s?.speciesName ?? '').trim().toLowerCase();
            if (n) set.add(n);
          });
          return set;
        }, [slots]);

        const userPickedRef = useRef(false);
        const [analysis, setAnalysis] = useState({ status: 'idle', data: null });
        const [activeSlotIndex, setActiveSlotIndex] = useState(null);

        const bridgeBase = useMemo(() => {
          try {
            const u = new URL(String(endpoint ?? '').trim());
            return u.origin;
          } catch {
            return 'http://localhost:9123';
          }
        }, [endpoint]);

        const refreshBridge = useCallback(() => {
          const base = String(bridgeBase ?? '').trim();
          if (!base) return Promise.resolve(null);
          return fetch(`${base}/status`, { cache: 'no-store' })
            .then((r) => r.json())
            .then((data) => {
              setBridge({ status: 'success', data });
              return data;
            })
            .catch(() => {
              setBridge((prev) => ({ status: 'error', data: prev?.data || null }));
              return null;
            });
        }, [bridgeBase]);

        useEffect(() => {
          const m = String(sourceMode ?? 'auto').trim().toLowerCase();
          fetch(`${bridgeBase}/config?sourceMode=${encodeURIComponent(m)}`, { cache: 'no-store' }).catch(() => void 0);
        }, [bridgeBase, sourceMode]);

        useEffect(() => {
          let cancelled = false;
          const base = String(bridgeBase ?? '').trim();
          if (!base) {
            setBridge({ status: 'idle', data: null });
            return;
          }

          const tick = () => {
            fetch(`${base}/status`, { cache: 'no-store' })
              .then((r) => r.json())
              .then((data) => {
                if (cancelled) return;
                setBridge({ status: 'success', data });
              })
              .catch(() => {
                if (cancelled) return;
                setBridge((prev) => ({ status: 'error', data: prev?.data || null }));
              });
          };

          setBridge((prev) => ({ status: 'loading', data: prev?.data || null }));
          tick();
          const id = setInterval(tick, showAdvanced ? 1000 : 5000);
          return () => {
            cancelled = true;
            clearInterval(id);
          };
        }, [bridgeBase, showAdvanced]);

        const setOpponentAndReset = (idx, v) => {
          userPickedRef.current = false;
          setActiveSlotIndex(null);
          setOpponents((prev) => {
            const next = Array.isArray(prev) ? prev.slice(0, 2) : ['', ''];
            while (next.length < 2) next.push('');
            next[idx] = String(v ?? '').trim().toLowerCase();
            return next;
          });
        };

        const clearOpponents = () => {
          userPickedRef.current = false;
          setActiveSlotIndex(null);
          setAnalysis({ status: 'idle', data: null });
          setOpponents(['', '']);
          setOpponentIndex(0);
        };

        const selectSlot = useCallback((idx) => {
          userPickedRef.current = true;
          setActiveSlotIndex(idx);
        }, []);

        const resolveReqIdRef = useRef(0);
        const lastAcceptedOpponentAtRef = useRef(0);
        const lastNonTeamOpponentAtRef = useRef(0);
        const lastNonTeamOpponentNameRef = useRef('');
        const pendingOpponentRef = useRef({ name: '', timerId: null });
        useEffect(() => {
          return () => {
            if (pendingOpponentRef.current?.timerId) clearTimeout(pendingOpponentRef.current.timerId);
          };
        }, []);
        useEffect(() => {
          if (!auto) return;
          if (!feed?.lastEvent || typeof feed.lastEvent !== 'object') return;

          const ev = feed.lastEvent || {};
          const sourceDetail = String(ev.sourceDetail ?? '').trim();
          const addrUsed = Number.isFinite(Number(ev.addrUsed)) ? Number(ev.addrUsed) : null;
          const sourceLabel = `${String(ev.source ?? 'realtime')}${sourceDetail ? `:${sourceDetail}` : ''}`;
          const incomingPokemon = String(ev.pokemon ?? ev.pokemonApiName ?? ev.opponent ?? '').trim().toLowerCase();
          const incomingPokemons = Array.isArray(ev.pokemons)
            ? ev.pokemons.map((x) => String(x ?? '').trim().toLowerCase()).filter(Boolean).slice(0, 2)
            : [];
          const incomingSpeciesIds = Array.isArray(ev.speciesIds)
            ? ev.speciesIds.map((x) => (Number.isFinite(Number(x)) ? Number(x) : null)).slice(0, 2)
            : [];
          const speciesId = Number.isFinite(Number(ev.speciesId)) ? Number(ev.speciesId) : null;
          const ts = Number.isFinite(Number(ev.ts)) ? Number(ev.ts) : Date.now();

          const reqId = (resolveReqIdRef.current += 1);

          const commitOpponent = (idx, name) => {
            const n = String(name ?? '').trim().toLowerCase();
            if (!n) return;
            if (pendingOpponentRef.current?.timerId) {
              clearTimeout(pendingOpponentRef.current.timerId);
            }
            pendingOpponentRef.current = { name: '', timerId: null };
            lastAcceptedOpponentAtRef.current = Date.now();
            if (!teamSpeciesSet.has(n)) {
              lastNonTeamOpponentAtRef.current = Date.now();
              lastNonTeamOpponentNameRef.current = n;
            }
            setLastSeen({ ts, source: sourceLabel, value: n, addrUsed });
            setOpponentAndReset(idx, n);
          };

          const maybeCommitOpponent = (idx, name) => {
            const n = String(name ?? '').trim().toLowerCase();
            if (!n) return;
            const now = Date.now();
            const isTeam = teamSpeciesSet.has(n);
            const pending = pendingOpponentRef.current || { name: '', timerId: null };
            if (!isTeam) {
              commitOpponent(idx, n);
              return;
            }
            const lastNonTeamAt = Number(lastNonTeamOpponentAtRef.current || 0);
            const timeSinceNonTeam = lastNonTeamAt ? now - lastNonTeamAt : Infinity;
            const timeSinceAnyAccepted = now - Number(lastAcceptedOpponentAtRef.current || 0);
            if (timeSinceNonTeam < 15000) return;
            if (timeSinceAnyAccepted < 6000) return;
            if (pending.name && pending.name !== n) {
              pendingOpponentRef.current = { name: n, timerId: pending.timerId };
              return;
            }
            if (pending.name === n) return;
            if ((now - Number(lastAcceptedOpponentAtRef.current || 0)) < 1500) return;
            const timerId = setTimeout(() => {
              commitOpponent(idx, n);
            }, 3000);
            pendingOpponentRef.current = { name: n, timerId };
          };

          if (incomingPokemons.length) {
            setActiveSlotIndex(null);
            userPickedRef.current = false;
            setOpponentIndex(0);
            if (incomingPokemons[0]) maybeCommitOpponent(0, incomingPokemons[0]);
            if (incomingPokemons[1]) maybeCommitOpponent(1, incomingPokemons[1]);
            return;
          }

          if (incomingPokemon) {
            maybeCommitOpponent(0, incomingPokemon);
            return;
          }

          if (incomingSpeciesIds.length && incomingSpeciesIds[0]) {
            setActiveSlotIndex(null);
            userPickedRef.current = false;
            setOpponentIndex(0);
            const ids = incomingSpeciesIds.slice(0, 2);
            const targets = ids.map((n) => (n && n > 0 ? n : null));
            const resolved = ['', ''];
            Promise.all(
              targets.map((n, i) =>
                n
                  ? cachedFetchJson(`${POKEAPI_BASE}/pokemon/${n}`)
                      .then((data) => {
                        if (resolveReqIdRef.current !== reqId) return;
                        resolved[i] = String(data?.name ?? '').trim().toLowerCase();
                      })
                      .catch(() => {
                        if (resolveReqIdRef.current !== reqId) return;
                      })
                  : Promise.resolve()
              )
            ).then(() => {
              if (resolveReqIdRef.current !== reqId) return;
              if (resolved[0]) maybeCommitOpponent(0, resolved[0]);
              if (resolved[1]) maybeCommitOpponent(1, resolved[1]);
            });
            return;
          }

          if (speciesId && speciesId > 0) {
            cachedFetchJson(`${POKEAPI_BASE}/pokemon/${speciesId}`)
              .then((data) => {
                if (resolveReqIdRef.current !== reqId) return;
                const name = String(data?.name ?? '').trim().toLowerCase();
                if (name) maybeCommitOpponent(0, name);
              })
              .catch(() => {
                if (resolveReqIdRef.current !== reqId) return;
              });
          }
        }, [auto, feed.lastEvent, teamSpeciesSet]);

        const targetOpponentRef = useRef('');
        const scrollYRef = useRef(0);
        const analysisCacheRef = useRef(new Map());
        const teamKey = useMemo(() => {
          const list = Array.isArray(slots) ? slots : [];
          return list
            .map((s) => {
              const n = String(s?.speciesName ?? '').trim().toLowerCase();
              const c = s?.captured === false ? '0' : '1';
              const moves = Array.isArray(s?.moveApiNames) ? s.moveApiNames.map((m) => String(m ?? '').trim().toLowerCase()).join(',') : '';
              return `${n}:${c}:${moves}`;
            })
            .join('|');
        }, [JSON.stringify(slots)]);
        useEffect(() => {
          let cancelled = false;
          const activeOpponent = String((Array.isArray(opponents) ? opponents[opponentIndex] : '') ?? '').trim().toLowerCase();
          if (!activeOpponent || teamSpeciesSet.has(activeOpponent)) {
            setAnalysis({ status: 'idle', data: null });
            setActiveSlotIndex(null);
            return;
          }

          targetOpponentRef.current = activeOpponent;
          try {
            scrollYRef.current = window.scrollY || 0;
          } catch {
            scrollYRef.current = 0;
          }

          const cacheKey = `${String(versionGroupName || '')}|${String(teamKey || '')}|${String(activeOpponent || '')}`;
          const cached = analysisCacheRef.current.get(cacheKey) || null;
          if (cached) {
            setAnalysis({ status: 'success', data: cached });
            const best = cached?.rankedMembers?.[0] || null;
            if (Number.isFinite(best?.slotIndex) && targetOpponentRef.current === activeOpponent) {
              if (!userPickedRef.current) setActiveSlotIndex(best.slotIndex);
            }
            return () => {
              cancelled = true;
            };
          }

          const delayId = setTimeout(() => {
            if (cancelled) return;
            setAnalysis((prev) => ({ status: 'loading', data: prev?.data || null }));
            computeBattleAnalysis({ teamSlots: slots, versionGroupName, opponentApiName: activeOpponent })
              .then((data) => {
                if (cancelled) return;
                analysisCacheRef.current.set(cacheKey, data);
                if (analysisCacheRef.current.size > 12) {
                  const oldestKey = analysisCacheRef.current.keys().next().value;
                  if (oldestKey) analysisCacheRef.current.delete(oldestKey);
                }
                setAnalysis({ status: 'success', data });
                const best = data?.rankedMembers?.[0] || null;
                if (Number.isFinite(best?.slotIndex) && targetOpponentRef.current === activeOpponent) {
                  if (!userPickedRef.current) setActiveSlotIndex(best.slotIndex);
                }
                requestAnimationFrame(() => {
                  try {
                    const cur = window.scrollY || 0;
                    const target = Number(scrollYRef.current) || 0;
                    if (Math.abs(cur - target) >= 12) window.scrollTo({ top: target });
                  } catch {
                    return;
                  }
                });
              })
              .catch(() => {
                if (cancelled) return;
                setAnalysis((prev) => ({ status: 'error', data: prev?.data || null }));
              });
          }, 350);

          return () => {
            cancelled = true;
            clearTimeout(delayId);
          };
        }, [opponents.join('|'), opponentIndex, versionGroupName, JSON.stringify(slots), teamSpeciesSet, teamKey]);

        const ranked = Array.isArray(analysis.data?.rankedMembers) ? analysis.data.rankedMembers : [];
        const computedBest = ranked[0] || null;
        const active =
          Number.isFinite(activeSlotIndex) ? ranked.find((m) => m?.slotIndex === activeSlotIndex) || null : null;
        const focus = active || computedBest || null;
        const focusIsBest = Boolean(focus && computedBest && focus.slotIndex === computedBest.slotIndex);
        const rest = useMemo(() => (focus ? ranked.filter((m) => m?.slotIndex !== focus.slotIndex) : ranked.slice(1)), [ranked, focus]);

        const connectionLabel =
          feed.status === 'connected'
            ? 'Conectado'
            : feed.status === 'connecting'
              ? 'Conectando...'
              : feed.status === 'error'
                ? 'Erro'
                : 'Parado';

        const learnSnapshot = useMemo(() => {
          const lm = String(learnMode ?? 'wild').trim().toLowerCase();
          const learners = bridge?.data?.learners && typeof bridge.data.learners === 'object' ? bridge.data.learners : null;
          if (learners && learners[lm]) return learners[lm];
          return bridge?.data?.learn || null;
        }, [bridge?.data, learnMode]);

        const currentOpponent = String((Array.isArray(opponents) ? opponents[opponentIndex] : '') ?? '').trim().toLowerCase();

        return (
          <div>
            <div className="flex flex-col gap-3 mb-6">
              <div className="flex flex-col lg:flex-row lg:items-center gap-2 w-full">
                <div className="flex-1">
                  <h2 className="text-3xl font-black text-white">Real Time</h2>
                  <p className="text-zinc-400">Modo para acompanhar o oponente automaticamente (via Citra bridge) e atualizar a recomendação em tempo real.</p>
                </div>
                {versionGroupName ? (
                  <div className="text-xs text-zinc-500 font-semibold">Jogo: {versionGroupLabel || versionGroupName}</div>
                ) : null}
              </div>
            </div>

            <div className="rounded-3xl border border-zinc-700 bg-zinc-900/30 p-6 mb-6">
              <div className="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4">
                <div className="min-w-0">
                  <div className="text-xs font-black text-zinc-300">Conexão</div>
                  <div className="mt-1 text-sm font-black text-white">
                    {connectionLabel}
                    {lastSeen?.source ? <span className="ml-2 text-xs font-semibold text-zinc-400">({String(lastSeen.source)})</span> : null}
                  </div>
                  <div className="mt-1 text-xs text-zinc-500 font-semibold truncate">
                    {lastSeen?.value ? `Último: ${String(lastSeen.value)}` : 'Aguardando evento...'}
                  </div>
                </div>

                <div className="flex items-center gap-2 flex-wrap">
                  <div className="inline-flex rounded-xl border border-zinc-700 bg-zinc-900/20 p-0.5">
                    <button
                      type="button"
                      onClick={() => setSourceMode('auto')}
                      className={`px-3 py-2 rounded-lg text-xs font-black transition-colors ${
                        String(sourceMode) === 'auto' ? 'bg-cyan-500/10 text-cyan-100' : 'text-zinc-200 hover:bg-zinc-800/40'
                      }`}
                    >
                      Auto
                    </button>
                    <button
                      type="button"
                      onClick={() => setSourceMode('trainer')}
                      className={`px-3 py-2 rounded-lg text-xs font-black transition-colors ${
                        String(sourceMode) === 'trainer' ? 'bg-cyan-500/10 text-cyan-100' : 'text-zinc-200 hover:bg-zinc-800/40'
                      }`}
                    >
                      Treinador
                    </button>
                    <button
                      type="button"
                      onClick={() => setSourceMode('wild')}
                      className={`px-3 py-2 rounded-lg text-xs font-black transition-colors ${
                        String(sourceMode) === 'wild' ? 'bg-cyan-500/10 text-cyan-100' : 'text-zinc-200 hover:bg-zinc-800/40'
                      }`}
                    >
                      Selvagem
                    </button>
                  </div>

                  <button
                    type="button"
                    onClick={() => setAuto((v) => !v)}
                    className={`px-3 py-2 rounded-xl border text-sm font-black transition-colors ${
                      auto ? 'border-cyan-400/40 bg-cyan-500/10 text-cyan-100' : 'border-zinc-700 bg-zinc-900/20 text-zinc-200 hover:border-zinc-500'
                    }`}
                  >
                    {auto ? 'Auto: ON' : 'Auto: OFF'}
                  </button>

                  <button
                    type="button"
                    onClick={() => setShowAdvanced((v) => !v)}
                    className="px-3 py-2 rounded-xl border border-zinc-700 bg-zinc-900/20 text-sm font-black text-zinc-200 hover:border-zinc-500 transition-colors"
                  >
                    {showAdvanced ? 'Ocultar' : 'Config'}
                  </button>
                </div>
              </div>

              {showAdvanced ? (
                <div className="mt-4 grid grid-cols-1 lg:grid-cols-3 gap-3">
                  <div className="lg:col-span-2">
                    <div className="text-xs font-black text-zinc-300 mb-2">Endpoint (SSE)</div>
                    <input
                      value={String(endpoint ?? '')}
                      onChange={(e) => setEndpoint(e.target.value)}
                      placeholder="http://localhost:9123/events"
                      className="w-full bg-zinc-900/50 border border-zinc-800 rounded-xl px-3 py-2 text-sm outline-none focus:border-cyan-400 text-white"
                    />
                    <div className="mt-2 text-xs text-zinc-500 font-semibold">
                      Polling: <span className="text-zinc-200">{bridge?.data?.config?.pollingEnabled ? 'ON' : 'OFF'}</span>
                      {Number.isFinite(Number(lastSeen?.addrUsed)) ? (
                        <span className="ml-3">
                          Addr: <span className="text-zinc-200">{`0x${Number(lastSeen.addrUsed).toString(16).toUpperCase()}`}</span>
                        </span>
                      ) : null}
                    </div>
                  </div>
                  <div className="flex items-center justify-start lg:justify-end gap-2">
                    <button
                      type="button"
                      onClick={clearOpponents}
                      className="px-3 py-2 rounded-xl border border-zinc-700 bg-zinc-900/20 text-sm font-black text-zinc-200 hover:border-zinc-500 transition-colors"
                    >
                      Limpar
                    </button>
                  </div>
                </div>
              ) : null}
            </div>

            {showAdvanced ? (
              <div className="rounded-3xl border border-zinc-700 bg-zinc-900/30 p-6 mb-6">
              <div className="flex flex-col lg:flex-row lg:items-end gap-4">
                <div className="flex-1">
                  <div className="text-lg font-black text-white">Treino (Learn)</div>
                  <div className="text-xs text-zinc-500 font-semibold mt-1">
                    Use isso para o bridge encontrar o endereço de memória do ORAS automaticamente. O status atualiza sozinho aqui (o endpoint /learn/status é só um JSON e precisa atualizar a página).
                  </div>
                </div>
                <div className="flex items-center gap-2">
                  <input
                    value={String(learnSpeciesId ?? '')}
                    onChange={(e) => setLearnSpeciesId(e.target.value)}
                    placeholder="Species ID (ex.: 263)"
                    className="w-56 bg-zinc-900/50 border border-zinc-800 rounded-xl px-3 py-2 text-sm outline-none focus:border-cyan-400 text-white"
                  />
                  <div className="inline-flex rounded-xl border border-zinc-700 bg-zinc-900/20 p-0.5">
                    <button
                      type="button"
                      onClick={() => setLearnMode('wild')}
                      className={`px-3 py-2 rounded-lg text-xs font-black transition-colors ${
                        String(learnMode) === 'wild' ? 'bg-cyan-500/10 text-cyan-100' : 'text-zinc-200 hover:bg-zinc-800/40'
                      }`}
                    >
                      Selvagem
                    </button>
                    <button
                      type="button"
                      onClick={() => setLearnMode('trainer')}
                      className={`px-3 py-2 rounded-lg text-xs font-black transition-colors ${
                        String(learnMode) === 'trainer' ? 'bg-cyan-500/10 text-cyan-100' : 'text-zinc-200 hover:bg-zinc-800/40'
                      }`}
                    >
                      Treinador
                    </button>
                  </div>
                  <input
                    value={String(learnStart ?? '')}
                    onChange={(e) => setLearnStart(e.target.value)}
                    placeholder="Start (ex.: 0x08000000)"
                    className="w-40 bg-zinc-900/50 border border-zinc-800 rounded-xl px-3 py-2 text-sm outline-none focus:border-cyan-400 text-white"
                  />
                  <input
                    value={String(learnEnd ?? '')}
                    onChange={(e) => setLearnEnd(e.target.value)}
                    placeholder="End (ex.: 0x10000000)"
                    className="w-40 bg-zinc-900/50 border border-zinc-800 rounded-xl px-3 py-2 text-sm outline-none focus:border-cyan-400 text-white"
                  />
                  <button
                    type="button"
                    onClick={() => {
