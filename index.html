    <script type="text/babel">
      const { useCallback, useEffect, useLayoutEffect, useMemo, useRef, useState } = React;

      // ============================================================
      // PokéGuide (SPA em um arquivo só)
      // ============================================================
      // Organização geral do arquivo:
      // 1) Utilidades (string, tipos, helpers de UI)
      // 2) Cache/persistência (localStorage) + fetch com cache
      // 3) PokeAPI (wrappers) + hooks (usePokemon, usePokedexEntries, etc.)
      // 4) Dados estáticos (jogos/dex, bosses, mapas)
      // 5) Componentes reutilizáveis (Pickers, Cards, Pills, Popovers)
      // 6) Páginas (Time, Batalha, Captura, Pokédex, Tipos)
      //
      // Pontos principais para customizar (mais comuns):
      // - Jogos/Dex (selects e filtros): POKEDEX_BY_GAME
      // - Time inicial (slots e moves): DEFAULT_TEAM_STATE
      // - Bosses/rosters por jogo: BOSS_ROSTERS_BY_VERSION_GROUP
      // - Captura (mapa por região): getRegionMapForPokedex
      // - Textos longos em PT-BR (Dex/descrições): useSpeciesFlavorText + useMoveFlavorText
      //
      // Dica: use Ctrl+F por "Página:" para navegar entre as páginas do app.

      // ============================================================
      // Utilidades gerais (UI, texto e matemática)
      // ============================================================

        Dark: 'bg-zinc-700/40 border-zinc-500 text-zinc-200',
        Fairy: 'bg-pink-400/20 border-pink-300 text-pink-100',
        Psychic: 'bg-fuchsia-500/20 border-fuchsia-400 text-fuchsia-200',
        Ghost: 'bg-violet-500/20 border-violet-400 text-violet-200',

        Poison: 'bg-purple-500/20 border-purple-400 text-purple-100',
        Fighting: 'bg-orange-600/20 border-orange-500 text-orange-100',
        Normal: 'bg-neutral-500/20 border-neutral-400 text-neutral-100',
        Status: 'bg-zinc-600/20 border-zinc-400 text-zinc-100',
        Physical: 'bg-red-600/20 border-red-500 text-red-100',
        Special: 'bg-blue-600/20 border-blue-500 text-blue-100',
      };

      // Retorna a classe Tailwind para uma "pílula" (tipo, categoria de move etc.).
      function getTypeClass(type) {
        return TYPE_COLORS[type] || 'bg-zinc-700 border-zinc-500 text-white';
      }

      // Separa "Water x2" em { base: "Water", suffix: " x2" } para renderizar com estilos diferentes.
      function splitTypeLabel(label) {
        const trimmed = String(label ?? '').trim();
        const match = trimmed.match(/^([A-Za-z]+)(\s+x(?:\d+(?:\.\d+)?))?$/i);
        if (!match) return { base: trimmed, suffix: '' };
        return { base: match[1], suffix: match[2] ?? '' };
      }

      // clamp: garante que um número fique dentro de [min, max].
      function clamp(n, min, max) {
        return Math.max(min, Math.min(max, n));
      }

      // Hook simples para detectar breakpoints/condições via matchMedia.
      function useMediaQuery(query) {
        const getMatch = () => {
          try {
            return window.matchMedia(query).matches;
          } catch {
            return false;
          }
        };

        const [matches, setMatches] = useState(getMatch);

        useEffect(() => {
          let mql;
          try {
            mql = window.matchMedia(query);
          } catch {
            return;
          }

          const onChange = () => setMatches(mql.matches);
          onChange();

          if (typeof mql.addEventListener === 'function') {
            mql.addEventListener('change', onChange);
            return () => mql.removeEventListener('change', onChange);
          }
          mql.addListener(onChange);
          return () => mql.removeListener(onChange);
        }, [query]);

        return matches;
      }

      const POKEAPI_BASE = 'https://pokeapi.co/api/v2';
      const POKEAPI_CACHE_MAX_AGE_MS = 1000 * 60 * 60 * 24 * 30;
      const POKEAPI_LANGS = ['pt-BR', 'pt-br', 'pt'];
      const POKEAPI_ORAS_VERSION_GROUP = 'omega-ruby-alpha-sapphire';

      const ICONIC_POKEMON_BY_TYPE = {
        Normal: { id: 133, name: 'eevee' },
        Fire: { id: 4, name: 'charmander' },
        Water: { id: 7, name: 'squirtle' },
        Electric: { id: 25, name: 'pikachu' },
        Grass: { id: 1, name: 'bulbasaur' },
        Ice: { id: 131, name: 'lapras' },
        Fighting: { id: 66, name: 'machop' },
        Poison: { id: 41, name: 'zubat' },
        Ground: { id: 50, name: 'diglett' },
        Flying: { id: 16, name: 'pidgey' },
        Psychic: { id: 63, name: 'abra' },
        Bug: { id: 10, name: 'caterpie' },
        Rock: { id: 74, name: 'geodude' },
        Ghost: { id: 92, name: 'gastly' },
        Dragon: { id: 147, name: 'dratini' },
        Dark: { id: 197, name: 'umbreon' },
        Steel: { id: 81, name: 'magnemite' },
        Fairy: { id: 35, name: 'clefairy' },
      };

      function normalizePokeText(text) {
        return String(text ?? '')
          .replace(/[\n\f]/g, ' ')
          .replace(/\s+/g, ' ')
          .trim();
      }

      function typeLabelFromApiName(apiName) {
        const s = String(apiName ?? '').trim();
        if (!s) return s;
        return s[0].toUpperCase() + s.slice(1);
      }

      const MOVE_NAME_OVERRIDES = {
        'u-turn': 'U-turn',
      };

      // Converte nomes de API (ex.: "mr-mime") em título (ex.: "Mr Mime") para UI.
      function titleFromApiName(apiName) {
        const raw = String(apiName ?? '').trim().toLowerCase();
        if (!raw) return '';
        if (MOVE_NAME_OVERRIDES[raw]) return MOVE_NAME_OVERRIDES[raw];
        return raw
          .split('-')
          .filter(Boolean)
          .map((p) => {
            if (p.length <= 2) return p.toUpperCase();
            return p[0].toUpperCase() + p.slice(1);
          })
          .join(' ');
      }

      // ============================================================
      // Cache e persistência (localStorage)
      // ============================================================
      // cacheGet/cacheSet: usado para dados "cacheáveis" (PokeAPI/translate).
      // Estrutura armazenada: { ts: number, data: any }.
      function cacheGet(key, maxAgeMs) {
        try {
          const raw = localStorage.getItem(key);
          if (!raw) return null;
          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed !== 'object') return null;
          if (typeof parsed.ts !== 'number') return null;
          if (Date.now() - parsed.ts > maxAgeMs) return null;
          return parsed.data ?? null;
        } catch {
          return null;
        }
      }

      // Remove as entradas mais antigas de cache para liberar espaço no localStorage.
      function evictCacheEntries(maxToDelete = 40) {
        try {
          const keys = [];
          for (let i = 0; i < localStorage.length; i += 1) {
            const k = localStorage.key(i);
            if (!k) continue;
            if (!k.startsWith('pokeapi:v1:') && !k.startsWith('translate:v1:')) continue;
            const raw = localStorage.getItem(k);
            let ts = 0;
            try {
              const parsed = raw ? JSON.parse(raw) : null;
              if (parsed && typeof parsed === 'object' && typeof parsed.ts === 'number') ts = parsed.ts;
            } catch {
              ts = 0;
            }
            keys.push({ k, ts });
          }

          keys.sort((a, b) => (a.ts || 0) - (b.ts || 0));
          const toDelete = keys.slice(0, Math.max(0, Math.min(maxToDelete, keys.length)));
          for (const it of toDelete) {
            try {
              localStorage.removeItem(it.k);
            } catch {
              continue;
            }
          }
        } catch {
          return;
        }
      }

      // localStorage pode falhar (quota / modo privado). Esse helper tenta evict e regravar.
      function safeLocalStorageSetItem(key, value) {
        try {
          localStorage.setItem(key, value);
          return true;
        } catch {
          try {
            evictCacheEntries(60);
            localStorage.setItem(key, value);
            return true;
          } catch {
            return false;
          }
        }
      }

      // Salva em cache com timestamp (para expiração por idade).
      function cacheSet(key, data) {
        try {
          safeLocalStorageSetItem(key, JSON.stringify({ ts: Date.now(), data }));
        } catch {
          return;
        }
      }

      function persistentGet(key) {
        try {
          const raw = localStorage.getItem(key);
          if (!raw) return null;
          return JSON.parse(raw);
        } catch {
          return null;
        }
      }

      // Persistência "durável" (sem expiração) para estado do app (ex.: time, sessões).
      function persistentSet(key, value) {
        try {
          safeLocalStorageSetItem(key, JSON.stringify(value));
        } catch {
          return;
        }
      }

      // usePersistentState: useState + sync com localStorage + eventos (aba atual e outras abas).
      // Ideal para dados que o usuário espera "ficarem salvos" (Time, sessão de Batalha/Captura).
      function usePersistentState(key, initialValue) {
        const [state, setState] = useState(() => {
          const saved = persistentGet(key);
          return saved ?? initialValue;
        });

        const stateRef = useRef(state);
        stateRef.current = state;

        useEffect(() => {
          const sync = () => {
            const next = persistentGet(key);
            if (next === null || next === undefined) return;
            stateRef.current = next;
            setState(next);
          };

          const onStorage = (e) => {
            if (!e) return;
            if (e.key && e.key !== key) return;
            sync();
          };

          const onPersist = (e) => {
            const k = e?.detail?.key;
            if (k && k !== key) return;
            sync();
          };

          window.addEventListener('storage', onStorage);
          window.addEventListener('persist:v1', onPersist);
          return () => {
            window.removeEventListener('storage', onStorage);
            window.removeEventListener('persist:v1', onPersist);
          };
        }, [key]);

        const setAndPersist = (updater) => {
          const prev = stateRef.current;
          const next = typeof updater === 'function' ? updater(prev) : updater;
          stateRef.current = next;
          persistentSet(key, next);
          try {
            window.dispatchEvent(new CustomEvent('persist:v1', { detail: { key } }));
          } catch {
            void 0;
          }
          setState(next);
        };

        return [state, setAndPersist];
      }

      // ============================================================
      // Fetch com cache (PokeAPI)
      // ============================================================
      // cachedFetchJson: memoiza respostas em localStorage para reduzir latência e rate-limit.
      async function cachedFetchJson(url, { maxAgeMs = POKEAPI_CACHE_MAX_AGE_MS } = {}) {
        const cacheKey = `pokeapi:v1:${url}`;
        const cached = cacheGet(cacheKey, maxAgeMs);
        if (cached) return cached;

        const res = await fetch(url);
        if (!res.ok) {
          throw new Error(`HTTP ${res.status} for ${url}`);
        }
        const json = await res.json();
        cacheSet(cacheKey, json);
        return json;
      }

      // Variante com prefixo customizado (útil para cache com chaves que não são só "pokeapi:v1").
      async function cachedFetchJsonWithPrefix(url, cachePrefix, { maxAgeMs = POKEAPI_CACHE_MAX_AGE_MS } = {}) {
        const prefix = String(cachePrefix ?? '').trim();
        const cacheKey = `${prefix}:${url}`;
        const cached = cacheGet(cacheKey, maxAgeMs);
        if (cached) return cached;

        const res = await fetch(url);
        if (!res.ok) {
          throw new Error(`HTTP ${res.status} for ${url}`);
        }
        const json = await res.json();
        cacheSet(cacheKey, json);
        return json;
      }

      // ============================================================
      // Textos (PT-BR) e traduções/overrides
      // ============================================================
      // A PokeAPI pode ter textos diferentes por versão e nem sempre existe PT-BR para tudo.
      // Estratégia (resumo):
      // - tenta PT-BR (priorizando ORAS, por ter boa cobertura)
      // - se não achar, usa overrides manuais para alguns moves
      // - se ainda não achar, cai no EN e tenta traduzir
      function pickMoveFlavorTextLocalizedPt(flavorTextEntries) {
        const entries = Array.isArray(flavorTextEntries) ? flavorTextEntries : [];

        const pick = (langName, versionGroupName) =>
          entries.find(
            (e) =>
              e?.language?.name === langName &&
              (versionGroupName ? e?.version_group?.name === versionGroupName : true) &&
              e?.flavor_text
          );

        for (const lang of POKEAPI_LANGS) {
          const best = pick(lang, POKEAPI_ORAS_VERSION_GROUP);
          if (best) return normalizePokeText(best.flavor_text);
        }
        for (const lang of POKEAPI_LANGS) {
          const any = pick(lang, null);
          if (any) return normalizePokeText(any.flavor_text);
        }

        return '';
      }

      const MOVE_DESC_PT_BR_OVERRIDES = {
        'leaf-blade': 'O usuário corta o alvo com folhas afiadas. Acertos críticos acertam com mais facilidade.',
        'dragon-pulse': 'O alvo é atacado por uma onda de choque gerada pela boca aberta do usuário.',
        'swords-dance': 'Uma dança frenética para elevar o espírito de luta. Aumenta muito o Ataque do usuário.',
        detect: 'Permite ao usuário evitar todos os ataques. A chance de falhar aumenta se for usado em sequência.',
        psychic:
          'O alvo é atingido por uma forte força telecinética. Isso também pode reduzir a Defesa Especial do alvo.',
        moonblast:
          'Tomando emprestado o poder da lua, o usuário ataca o alvo. Isso também pode reduzir o Ataque Especial do alvo.',
        'calm-mind': 'O usuário foca a mente e acalma o espírito para aumentar o Ataque Especial e a Defesa Especial.',
        'thunder-wave': 'O usuário libera uma fraca descarga elétrica que paralisa o alvo.',
        earthquake: 'O usuário provoca um terremoto que atinge todos os Pokémon ao redor.',
        'dragon-claw': 'O usuário corta o alvo com grandes garras afiadas.',
        fly: 'O usuário voa para o céu e atinge o alvo no próximo turno.',
        'u-turn': 'Após atacar, o usuário volta rapidamente para trocar com um Pokémon da equipe.',
        surf: 'O usuário ataca tudo ao redor inundando a área com uma onda gigantesca.',
        'ice-beam': 'O alvo é atingido por um feixe de energia congelante. Isso também pode congelar o alvo.',
        recover: 'Restaurando suas próprias células, o usuário recupera metade do seu HP máximo.',
        toxic: 'Um movimento que deixa o alvo gravemente envenenado. O dano do veneno aumenta a cada turno.',
        thunderbolt: 'Uma forte descarga elétrica é lançada no alvo. Isso também pode deixá-lo paralisado.',
        'flash-cannon':
          'O usuário reúne toda a energia luminosa e a libera de uma só vez. Isso também pode reduzir a Defesa Especial do alvo.',
        'volt-switch': 'Após atacar, o usuário volta rapidamente para trocar com um Pokémon da equipe.',
        reflect: 'Uma parede misteriosa de luz é erguida para reduzir o dano de ataques físicos por cinco turnos.',
        'shadow-ball':
          'O usuário arremessa uma massa sombria no alvo. Isso também pode reduzir a Defesa Especial do alvo.',
        'will-o-wisp': 'O usuário dispara uma chama sinistra azulada no alvo para causar queimadura.',
        'destiny-bond':
          'Depois de usar este movimento, se o usuário desmaiar, o Pokémon que desferiu o golpe de nocaute também desmaia.',
      };

      function moveDescOverridePtBr(apiName) {
        const key = String(apiName ?? '').trim().toLowerCase();
        return MOVE_DESC_PT_BR_OVERRIDES[key] || '';
      }

      // Retorna o texto "longo" do move, com fallback inteligente (PT-BR -> override -> EN -> tradução).
      async function getMoveFlavorText(apiName, versionGroupName) {
        const name = String(apiName ?? '').trim().toLowerCase();
        if (!name) return '';
        const data = await cachedFetchJson(`${POKEAPI_BASE}/move/${name}`);
        const pt = pickMoveFlavorTextLocalizedPt(data?.flavor_text_entries);
        if (pt) return pt;
        const override = moveDescOverridePtBr(name);
        if (override) return override;
        const en = pickMoveFlavorTextEn(data?.flavor_text_entries, versionGroupName);
        if (en) {
          try {
            const translated = await translateEnToPtBr(en);
            return translated || en;
          } catch {
            return en;
          }
        }
        return '';
      }

      // Helper para extrair um texto EN "limpo" do move, preferindo o versionGroup atual.
      function pickMoveFlavorTextEn(flavorTextEntries, versionGroupName) {
        const entries = Array.isArray(flavorTextEntries) ? flavorTextEntries : [];
        const pick = (vg) =>
          entries.find((e) => e?.language?.name === 'en' && (vg ? e?.version_group?.name === vg : true) && e?.flavor_text);
        const best = pick(versionGroupName);
        if (best) return normalizePokeText(best.flavor_text);
        const any = pick(null);
        return any ? normalizePokeText(any.flavor_text) : '';
      }

      async function getMoveFlavorTextEn(apiName, versionGroupName) {
        const name = String(apiName ?? '').trim().toLowerCase();
        if (!name) return '';
        const data = await cachedFetchJson(`${POKEAPI_BASE}/move/${name}`);
        return pickMoveFlavorTextEn(data?.flavor_text_entries, versionGroupName);
      }

      const SPECIES_GENUS_PT_BR_OVERRIDES = {
        sceptile: 'Pokémon da Floresta',
        gardevoir: 'Pokémon Abraço',
        flygon: 'Pokémon Místico',
        milotic: 'Pokémon Carinhoso',
        magnezone: 'Pokémon da Área Magnética',
        froslass: 'Pokémon da Terra Nevada',
      };

      // "Genus" é o subtítulo tipo "Pokémon Abraço". Aqui ficam correções pontuais em PT-BR.
      function speciesGenusOverridePtBr(apiName) {
        const key = String(apiName ?? '').trim().toLowerCase();
        return SPECIES_GENUS_PT_BR_OVERRIDES[key] || '';
      }

      function translateGenusToPtBr(enGenus, apiName) {
        const override = speciesGenusOverridePtBr(apiName);
        if (override) return override;

        const genus = normalizePokeText(enGenus);
        if (!genus) return '';

        const m = genus.match(/^(.*)\s+Pokémon$/i);
        if (!m) return '';

        const prefix = m[1].trim();
        const map = {
          Forest: 'da Floresta',
          Embrace: 'Abraço',
          Mystic: 'Místico',
          Tender: 'Carinhoso',
          'Magnet Area': 'da Área Magnética',
          'Snow Land': 'da Terra Nevada',
        };

        if (map[prefix]) {
          const rest = map[prefix];
          return rest.startsWith('da ') || rest.startsWith('de ') || rest.startsWith('do ') ? `Pokémon ${rest}` : `Pokémon ${rest}`;
        }

        return '';
      }

      function pickSpeciesGenus(speciesData, apiName) {
        const genera = Array.isArray(speciesData?.genera) ? speciesData.genera : [];

        const pick = (langName) => genera.find((g) => g?.language?.name === langName && g?.genus)?.genus;

        for (const lang of POKEAPI_LANGS) {
          const g = pick(lang);
          if (g) return { text: normalizePokeText(g), lang };
        }

        const en = pick('en');
        if (en) return { text: normalizePokeText(en), lang: 'en' };

        const override = speciesGenusOverridePtBr(apiName);
        if (override) return { text: override, lang: 'pt-override' };

        return { text: '', lang: '' };
      }

      async function getSpeciesGenus(apiName) {
        const name = String(apiName ?? '').trim().toLowerCase();
        if (!name) return { text: '', lang: '' };
        const data = await cachedFetchJson(`${POKEAPI_BASE}/pokemon-species/${name}`);
        return pickSpeciesGenus(data, name);
      }

      function pickSpeciesFlavorText(speciesData) {
        const entries = Array.isArray(speciesData?.flavor_text_entries) ? speciesData.flavor_text_entries : [];
        const pick = (langName, versionGroupName) =>
          entries.find(
            (e) =>
              e?.language?.name === langName &&
              (versionGroupName ? e?.version?.name === versionGroupName || e?.version_group?.name === versionGroupName : true) &&
              e?.flavor_text
          );

        for (const lang of POKEAPI_LANGS) {
          const best =
            entries.find(
              (e) =>
                e?.language?.name === lang &&
                e?.version?.name === 'omega-ruby' &&
                e?.flavor_text
            ) || null;
          if (best) return { text: normalizePokeText(best.flavor_text), lang };
        }

        for (const lang of POKEAPI_LANGS) {
          const any = pick(lang, null);
          if (any) return { text: normalizePokeText(any.flavor_text), lang };
        }

        const en =
          entries.find((e) => e?.language?.name === 'en' && e?.version?.name === 'omega-ruby' && e?.flavor_text) ||
          entries.find((e) => e?.language?.name === 'en' && e?.flavor_text) ||
          null;
        return en ? { text: normalizePokeText(en.flavor_text), lang: 'en' } : { text: '', lang: '' };
      }

      async function getSpeciesFlavorText(apiName) {
        const name = String(apiName ?? '').trim().toLowerCase();
        if (!name) return { text: '', lang: '' };
        const data = await cachedFetchJson(`${POKEAPI_BASE}/pokemon-species/${name}`);
        return pickSpeciesFlavorText(data);
      }

      const TRANSLATE_CACHE_MAX_AGE_MS = 1000 * 60 * 60 * 24 * 180;

      function allOriginsRaw(url) {
        return `https://api.allorigins.win/raw?url=${encodeURIComponent(String(url ?? '').trim())}`;
      }

      async function translateEnToPtBr(text) {
        const raw = normalizePokeText(text);

      async function getEvolutionNextLevel(apiName) {
        const name = String(apiName ?? '').trim().toLowerCase();
        if (!name) return null;

        const species = await getSpeciesData(name);
        const chainUrl = String(species?.evolution_chain?.url ?? '').trim();
        if (!chainUrl) return null;
        const chain = await cachedFetchJson(chainUrl);

        const root = chain?.chain || null;
        if (!root) return null;

        const findNode = (node) => {
          if (!node) return null;
          const s = String(node?.species?.name ?? '').trim().toLowerCase();
          if (s === name) return node;
          const kids = Array.isArray(node?.evolves_to) ? node.evolves_to : [];
          for (const k of kids) {
            const hit = findNode(k);
            if (hit) return hit;
          }
          return null;
        };

        const node = findNode(root);
        if (!node) return null;

        const kids = Array.isArray(node?.evolves_to) ? node.evolves_to : [];
        if (!kids.length) return null;

        let best = null;
        for (const evo of kids) {
          const evoName = String(evo?.species?.name ?? '').trim().toLowerCase();
          const details = Array.isArray(evo?.evolution_details) ? evo.evolution_details : [];
          for (const d of details) {
            const lvl = Number.isFinite(Number(d?.min_level)) ? Number(d.min_level) : null;
            if (lvl && lvl > 0) {
              if (!best || lvl < best.level) best = { level: lvl, to: evoName };
            }
          }
        }

        return best;
      }

        if (form === base) return 'Normal';

        let tail = form;
        if (tail.startsWith(`${base}-`)) tail = tail.slice(base.length + 1);
        const parts = tail.split('-').filter(Boolean);
        if (!parts.length) return 'Forma';

        const mapFirst = {
          alola: 'Alolan',
          galar: 'Galarian',
          hisui: 'Hisuian',
          paldea: 'Paldean',
        };

        if (mapFirst[parts[0]]) parts[0] = mapFirst[parts[0]];
        if (parts[0] === 'mega') parts[0] = 'Mega';
        if (parts[0] === 'gmax' || parts[0] === 'gigantamax') parts[0] = 'Gigantamax';

        return parts
          .map((p) => {
            if (!p) return '';
            if (p.length <= 3) return p.toUpperCase();
            return p.charAt(0).toUpperCase() + p.slice(1);
          })
          .filter(Boolean)
          .join(' ');

      function getLearnableMovesForVersionGroup(pokemonData, versionGroupName) {
        const vg = String(versionGroupName ?? '').trim().toLowerCase();
        if (!vg) return [];
        const moves = Array.isArray(pokemonData?.moves) ? pokemonData.moves : [];

        const methodLabel = (m, lvl) => {
          if (m === 'level-up') return `Nv. ${lvl || 1}`;
          if (m === 'machine') return 'TM/HM';
          if (m === 'tutor') return 'Tutor';
          if (m === 'egg') return 'Egg';
          if (m === 'stadium-surfing-pikachu') return 'Special';
          return titleFromApiName(m);
        };

        const out = [];
        for (const entry of moves) {
          const name = String(entry?.move?.name ?? '').trim().toLowerCase();
          if (!name) continue;
          const details = Array.isArray(entry?.version_group_details) ? entry.version_group_details : [];
          const filtered = details.filter((d) => d?.version_group?.name === vg);
          if (!filtered.length) continue;

          let best = filtered[0];
          for (const d of filtered) {
            const method = d?.move_learn_method?.name;
            if (method === 'level-up') {
              if (best?.move_learn_method?.name !== 'level-up') best = d;
              else if ((d?.level_learned_at || 0) < (best?.level_learned_at || 0)) best = d;
            }
          }

          const method = String(best?.move_learn_method?.name ?? '').trim().toLowerCase();
          const level = Number.isFinite(best?.level_learned_at) ? best.level_learned_at : 0;
          out.push({
            apiName: name,
            label: titleFromApiName(name),
            learn: methodLabel(method, level),
            _sortKey: `${method === 'level-up' ? String(level).padStart(4, '0') : '9999'}:${titleFromApiName(name)}`,
          });
        }

        out.sort((a, b) => a._sortKey.localeCompare(b._sortKey));
        return out.map(({ _sortKey, ...rest }) => rest);
      }

      function formatMultiplier(mult) {
        if (mult === 0) return 'x0';
        if (mult === 0.25) return 'x0.25';
        if (mult === 0.5) return 'x0.5';
        if (mult === 1) return 'x1';
        if (mult === 2) return 'x2';
        if (mult === 4) return 'x4';
        return `x${mult}`;
      }

      function computeAttackMultiplier(attackTypeLabel, defenderTypeLabels, typeRelationsByAttackType) {
        const attackType = String(attackTypeLabel ?? '').trim();
        const defenders = Array.isArray(defenderTypeLabels) ? defenderTypeLabels.filter(Boolean) : [];
        const rel = typeRelationsByAttackType?.get ? typeRelationsByAttackType.get(attackType) : null;
        if (!attackType || !defenders.length || !rel) return 1;

        let mult = 1;
        for (const d of defenders) {
          if (rel.attack?.immune?.includes(d)) return 0;
          if (rel.attack?.strong?.includes(d)) mult *= 2;
          else if (rel.attack?.weak?.includes(d)) mult *= 0.5;
        }
        if (mult > 4) mult = 4;
        if (mult < 0) mult = 0;
        return mult;
      }

      async function computeBattleAnalysis({ teamSlots, versionGroupName, opponentApiName }) {
        const vg = String(versionGroupName ?? '').trim().toLowerCase();
        const opponentName = String(opponentApiName ?? '').trim().toLowerCase();
        if (!opponentName) return null;

        const typeRelCache = new Map();
        const ensureTypeRel = async (typeLabel) => {
          const t = String(typeLabel ?? '').trim();
          if (!t) return null;
          if (typeRelCache.has(t)) return typeRelCache.get(t);
          try {
            const data = await getTypeDamageRelations(t);
            typeRelCache.set(t, data);
            return data;
          } catch {
            return null;
          }
        };

        const opponent = await cachedFetchJson(`${POKEAPI_BASE}/pokemon/${opponentName}`);
        const opponentId = Number.isFinite(opponent?.id) ? opponent.id : null;
        const opponentTypes = Array.isArray(opponent?.types)
          ? opponent.types
              .slice()
              .sort((a, b) => (a?.slot || 0) - (b?.slot || 0))
              .map((t) => typeLabelFromApiName(t?.type?.name))
              .filter(Boolean)
          : [];
        const opponentImage = pickBestSprite(opponent, false) || '';

        for (const t of opponentTypes) {
          await ensureTypeRel(t);
        }

        const slots = Array.isArray(teamSlots) ? teamSlots.slice(0, 6) : [];
        const members = await Promise.all(
          slots.map(async (slot, idx) => {
            if (slot?.captured === false) return null;
            const speciesName = String(slot?.speciesName ?? '').trim().toLowerCase();
            if (!speciesName) return null;

            let poke = null;
            try {
              poke = await cachedFetchJson(`${POKEAPI_BASE}/pokemon/${speciesName}`);
            } catch {
              return null;
            }

            const pokeId = Number.isFinite(poke?.id) ? poke.id : null;
            const pokeTypes = Array.isArray(poke?.types)
              ? poke.types
                  .slice()
                  .sort((a, b) => (a?.slot || 0) - (b?.slot || 0))
                  .map((t) => typeLabelFromApiName(t?.type?.name))
                  .filter(Boolean)
              : [];
            const image = pickBestSprite(poke, false) || '';

            const learnable = vg ? getLearnableMovesForVersionGroup(poke, vg) : [];
            const learnMap = new Map((learnable || []).map((m) => [m.apiName, m.learn]));
            const learnableSet = new Set(Array.from(learnMap.keys()));

            const rawMoves = Array.isArray(slot?.moveApiNames) ? slot.moveApiNames : [];
            const moveApiNames = rawMoves
              .map((m) => String(m ?? '').trim().toLowerCase())
              .filter(Boolean)
              .slice(0, 4);

            const moveDetails = await Promise.all(
              moveApiNames.map(async (m) => {
                try {
                  const data = await cachedFetchJson(`${POKEAPI_BASE}/move/${m}`);
                  const type = typeLabelFromApiName(data?.type?.name);
                  const category = typeLabelFromApiName(data?.damage_class?.name);
                  return { apiName: m, label: titleFromApiName(m), type, category };
                } catch {
                  return { apiName: m, label: titleFromApiName(m), type: 'Normal', category: 'Status' };
                }
              })
            );

            const moves = [];
            let bestOffensive = 1;
            let superEffectiveCount = 0;
            let damagingMoveCount = 0;
            let hasNoEffect = false;

            for (const md of moveDetails) {
              const compatible = !vg || learnableSet.has(md.apiName);
              const isStatus = md.category === 'Status';
              const learn = learnMap.get(md.apiName) || '';
              let multiplier = null;

              if (!isStatus) {
                damagingMoveCount += compatible ? 1 : 0;
              }

              if (compatible && !isStatus && opponentTypes.length) {
                await ensureTypeRel(md.type);
                multiplier = computeAttackMultiplier(md.type, opponentTypes, typeRelCache);
                if (multiplier === 0) hasNoEffect = true;
                if (multiplier > bestOffensive) bestOffensive = multiplier;
                if (multiplier >= 2) superEffectiveCount += 1;
              }

              moves.push({
                ...md,
                compatible,
                learn,
                multiplier,
              });
            }

            const threatByType = opponentTypes.map((t) => {
              const m = computeAttackMultiplier(t, pokeTypes, typeRelCache);
              return { type: t, mult: m };
            });
            const worstThreat = threatByType.reduce((max, r) => Math.max(max, r.mult), 1);
            const worstThreatTypes = threatByType.filter((r) => r.mult === worstThreat && worstThreat > 1).map((r) => r.type);

            let score = bestOffensive * 100 + superEffectiveCount * 10;
            if (worstThreat === 2) score -= 40;
            if (worstThreat === 4) score -= 90;
            if (hasNoEffect && bestOffensive <= 1) score -= 30;
            if (vg && moveDetails.some((m) => !learnableSet.has(m.apiName))) score -= 10;
            if (damagingMoveCount === 0) score -= 25;

            const goodMoves = moves.filter((m) => Number(m.multiplier) >= 2);
            const okMoves = moves.filter((m) => m.multiplier === 1);
            const badMoves = moves.filter((m) => typeof m.multiplier === 'number' && m.multiplier > 0 && m.multiplier < 1);
            const noEffectMoves = moves.filter((m) => m.multiplier === 0);
            const incompatibleMoves = vg ? moves.filter((m) => !m.compatible) : [];

            return {
              slotIndex: idx,
              speciesName,
              label: titleFromApiName(speciesName),
              id: pokeId,
              image,
              types: pokeTypes,
              score,
              bestOffensive,
              superEffectiveCount,
              worstThreat,
              worstThreatTypes,
              moves,
              goodMoves,
              okMoves,
              badMoves,
              noEffectMoves,
              incompatibleMoves,
            };
          })
        );

        const ranked = members.filter(Boolean).sort((a, b) => b.score - a.score);

        return {
          opponent: {
            apiName: opponentName,
            label: titleFromApiName(opponentName),
            id: opponentId,
            image: opponentImage,
            types: opponentTypes,
          },
          rankedMembers: ranked,
          typeRelCache,
        };
      }

      function useMovesDetails(moveApiNames) {
        const [state, setState] = useState({ status: 'idle', moves: [] });

        useEffect(() => {

          setState({ status: 'loading', moves: [] });
          Promise.all(

      function usePokedexEntries(pokedexName) {
        const [state, setState] = useState({ status: 'idle', entries: [] });

        useEffect(() => {
          let cancelled = false;
          const name = String(pokedexName ?? '').trim().toLowerCase();

          setState({ status: 'loading', entries: [] });
          cachedFetchJson(`${POKEAPI_BASE}/pokedex/${name}`)

              const parseId = (url) => {
                const m = String(url ?? '').match(/\/(\d+)\/?$/);
                return m ? Number(m[1]) : null;
              };

              const entries = Array.isArray(data?.pokemon_entries)
                ? data.pokemon_entries
                    .map((e) => {
                      const speciesName = String(e?.pokemon_species?.name ?? '').trim();
                      const nationalId = parseId(e?.pokemon_species?.url);
                      const entryNumber = Number.isFinite(e?.entry_number) ? e.entry_number : null;
                      if (!speciesName || !Number.isFinite(nationalId) || !Number.isFinite(entryNumber)) return null;
                      return { speciesName, nationalId, entryNumber };

      function uniqSorted(arr) {
        const set = new Set((arr || []).filter(Boolean));
        return Array.from(set).sort((a, b) => a.localeCompare(b));
      }

      function computeOffensiveCoverage(typeRelationsList) {
        const counts = {};
        for (const rel of typeRelationsList) {
          for (const t of rel?.attack?.strong || []) {
            counts[t] = (counts[t] || 0) + 1;
          }
        }
        return Object.keys(counts)
          .map((t) => `${t} x${counts[t] >= 2 ? 4 : 2}`)
          .sort((a, b) => a.localeCompare(b));
      }

      function computeDefensiveWeaknesses(typeRelationsList) {
        const allTypes = [
          'Normal',
          'Fire',
          'Water',
          'Electric',
          'Grass',
          'Ice',
          'Fighting',
          'Poison',
          'Ground',
          'Flying',
          'Psychic',
          'Bug',
          'Rock',
          'Ghost',
          'Dragon',
          'Dark',
          'Steel',
          'Fairy',
        ];

        const mult = {};
        for (const t of allTypes) mult[t] = 1;

        for (const rel of typeRelationsList) {
          const weakTo = rel?.defend?.weakTo || [];
          const resistTo = rel?.defend?.resistTo || [];
          const immuneTo = rel?.defend?.immuneTo || [];

          for (const w of weakTo) mult[w] *= 2;
          for (const r of resistTo) mult[r] *= 0.5;
          for (const i of immuneTo) mult[i] = 0;
        }

        const out = [];
        for (const t of allTypes) {
          if (mult[t] === 4) out.push(`${t} x4`);
          else if (mult[t] === 2) out.push(`${t} x2`);
        }

        return out;
      }

      function usePokemonMatchups(typeLabels) {
        const [state, setState] = useState({ status: 'idle', strongAgainst: [], weakTo: [] });

        useEffect(() => {

          setState({ status: 'loading', strongAgainst: [], weakTo: [] });
          Promise.all(types.map((t) => getTypeDamageRelations(t)))
            .then((rels) => {

              setState({

                weakTo: computeDefensiveWeaknesses(rels),
              });
            })
            .catch(() => {
              if (cancelled) return;
              setState({ status: 'error', strongAgainst: [], weakTo: [] });
            });

          return () => {
            cancelled = true;
          };
        }, [JSON.stringify(typeLabels || [])]);

        return state;
      }

      function SmartTooltip({ open, anchorEl, children, maxWidth = 360 }) {
        const tooltipRef = useRef(null);
        const [pos, setPos] = useState({ left: 0, top: 0, ready: false });

        const recompute = () => {
          if (!open || !anchorEl || !tooltipRef.current) return;

          const a = anchorEl.getBoundingClientRect();
          const t = tooltipRef.current.getBoundingClientRect();
          const margin = 12;
          const offsetX = 12;
          const offsetY = -8;

          const rightLeft = a.right + offsetX;
          const leftLeft = a.left - offsetX - t.width;

          const fitsRight = rightLeft + t.width + margin <= window.innerWidth;
          const fitsLeft = leftLeft >= margin;

          const desiredLeft = fitsRight ? rightLeft : fitsLeft ? leftLeft : rightLeft;
          const desiredTop = a.top + offsetY;

          const safeLeft = clamp(desiredLeft, margin, window.innerWidth - t.width - margin);
          const safeTop = clamp(desiredTop, margin, window.innerHeight - t.height - margin);

          setPos({ left: safeLeft, top: safeTop, ready: true });
        };

        useLayoutEffect(() => {
          if (!open) return;
          setPos((p) => ({ ...p, ready: false }));
          requestAnimationFrame(() => {
            recompute();
            requestAnimationFrame(recompute);
          });
        }, [open, anchorEl, children]);

        useEffect(() => {
          if (!open) return;

          const onAnyScroll = () => recompute();
          const onResize = () => recompute();

          window.addEventListener('scroll', onAnyScroll, true);
          window.addEventListener('resize', onResize);

          return () => {
            window.removeEventListener('scroll', onAnyScroll, true);
            window.removeEventListener('resize', onResize);
          };
        }, [open, anchorEl]);

        useEffect(() => {
          if (!open) return;
          if (!tooltipRef.current) return;

          const ro = new ResizeObserver(() => recompute());
          ro.observe(tooltipRef.current);

          if (document.fonts?.ready) {
            document.fonts.ready.then(() => recompute());
          }

          return () => ro.disconnect();
        }, [open, anchorEl, children]);

        if (!open) return null;

        const content = (
          <div
            ref={tooltipRef}
            style={{
              position: 'fixed',
              left: pos.left,
              top: pos.top,
              maxWidth,
              width: 'max-content',
              zIndex: 9999,
              opacity: pos.ready ? 1 : 0,
            }}
            className="pointer-events-none bg-zinc-900 border border-zinc-700 rounded-2xl shadow-2xl p-4"

            <div className="max-w-[calc(100vw-24px)]">{children}</div>
          </div>
        );

        return ReactDOM.createPortal(content, document.body);
      }

          const list = Array.isArray(items) ? items : [];
          if (loading) return [];
          if (!t) return list.slice(0, 30);
          const digits = t.replace(/[^0-9]/g, '');
          const num = digits ? Number(digits) : null;
          return list
            .filter((p) => {
              if (p.name.includes(t)) return true;
              if (digits && Number.isFinite(num) && p.id === num) return true;

          if (!vg) return [];
          const out = [];
          if (vg === 'sun-moon' || vg === 'ultra-sun-ultra-moon') out.push({ key: 'zmove', label: 'Z-Move' });
          if (vg === 'sword-shield') out.push({ key: 'dynamax', label: 'Dynamax' });
          if (vg === 'scarlet-violet') out.push({ key: 'terastal', label: 'Terastal' });
          return out;
        }, [versionGroupName]);

        const pokemonSpecial = useMemo(() => {
          const vg = String(versionGroupName ?? '').trim().toLowerCase();
          if (!vg || !apiName) return [];
          const varieties = Array.isArray(speciesData?.varieties) ? speciesData.varieties : [];
          const names = varieties.map((v) => String(v?.pokemon?.name ?? '').trim().toLowerCase()).filter(Boolean);
          const out = [];
          if ((vg === 'x-y' || vg === 'omega-ruby-alpha-sapphire' || vg === 'sun-moon' || vg === 'ultra-sun-ultra-moon') && names.some((n) => n.includes('-mega')))
            out.push({ key: 'mega', label: 'Mega' });
          if ((vg === 'x-y' || vg === 'omega-ruby-alpha-sapphire') && names.some((n) => n.includes('-primal'))) out.push({ key: 'primal', label: 'Primal' });
          if (vg === 'sword-shield' && names.some((n) => n.endsWith('-gmax'))) out.push({ key: 'gmax', label: 'Gigantamax' });
          return out;
        }, [apiName, versionGroupName, speciesStatus, speciesData]);

        const featureChips = useMemo(() => {
          const map = new Map();
          [...gameFeatures, ...pokemonSpecial].forEach((x) => map.set(x.key, x));
          return Array.from(map.values());
        }, [gameFeatures, pokemonSpecial]);

        const dexNumber = Number.isFinite(poke?.id) ? `#${String(poke.id).padStart(4, '0')}` : '';
        const evoLevel = Number.isFinite(evoNext?.level) ? Number(evoNext.level) : null;

        const types = Array.isArray(poke?.types)
          ? poke.types
              .slice()
              .sort((a, b) => (a?.slot || 0) - (b?.slot || 0))
              .map((t) => typeLabelFromApiName(t?.type?.name))
              .filter(Boolean)
          : [];

        const image =
          pickBestSprite(poke, false) ||
          `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${Number.isFinite(poke?.id) ? poke.id : ''}.png`;

        const { status: matchupStatus, strongAgainst, weakTo } = usePokemonMatchups(types);

        const [tooltip, setTooltip] = useState(null);
        const tooltipOpen = Boolean(tooltip?.anchorEl);
        const closeTooltip = () => setTooltip(null);

        const moveSlots = useMemo(() => {
          const cur = Array.isArray(slot?.moveApiNames) ? slot.moveApiNames : [];
          const norm = cur
            .map((x) => String(x ?? '').trim().toLowerCase())
            .slice(0, 4);
          while (norm.length < 4) norm.push('');
          return norm;
        }, [JSON.stringify(slot?.moveApiNames || [])]);

        const nonEmptyMoveApiNames = useMemo(() => moveSlots.filter(Boolean), [moveSlots]);
        const { status: movesStatus, moves: moveRows } = useMovesDetails(nonEmptyMoveApiNames);
        const moveMap = useMemo(() => new Map((moveRows || []).map((r) => [r.apiName, r])), [moveRows]);

        const learnableMoves = useMemo(() => getLearnableMovesForVersionGroup(poke, versionGroupName), [poke, versionGroupName]);
        const learnableSet = useMemo(() => new Set((learnableMoves || []).map((m) => m.apiName)), [learnableMoves]);
        const learnMap = useMemo(() => new Map((learnableMoves || []).map((m) => [m.apiName, m.learn])), [learnableMoves]);
        const [moveQueries, setMoveQueries] = useState(['', '', '', '']);
        const [movePicker, setMovePicker] = useState(null);
        const movePickerOpen = Boolean(movePicker?.anchorEl);
        const activeMoveSlotIndex = Number.isFinite(movePicker?.slotIndex) ? movePicker.slotIndex : -1;

        const activeMoveCandidates = useMemo(() => {
          if (activeMoveSlotIndex < 0) return [];
          const q = String(moveQueries[activeMoveSlotIndex] ?? '').trim().toLowerCase();
          const used = new Set(moveSlots.filter(Boolean));
          const list = Array.isArray(learnableMoves) ? learnableMoves : [];
          const filtered = q ? list.filter((m) => m.label.toLowerCase().includes(q) || m.apiName.includes(q)) : list;
          return filtered.filter((m) => !used.has(m.apiName)).slice(0, 12);
        }, [activeMoveSlotIndex, moveQueries, moveSlots, learnableMoves]);

        useEffect(() => {
          setMoveQueries(['', '', '', '']);
          setMovePicker(null);
        }, [apiName, versionGroupName]);

        const setMoveAt = (idx, apiMoveName) => {
          const n = String(apiMoveName ?? '').trim().toLowerCase();
          const next = moveSlots.slice();
          next[idx] = n;
          onChangeSlot({ moveApiNames: next });
        };

        const clearMoveAt = (idx) => {
          const next = moveSlots.slice();
          next[idx] = '';
          onChangeSlot({ moveApiNames: next });
        };

        const genus =
          genusStatus === 'loading'
            ? 'Loading species...'
            : genusStatus === 'error'
              ? 'Could not load species.'
              : genusText || '';

        return (
          <div className="rounded-3xl border border-zinc-700 bg-zinc-900/50 shadow-2xl h-full flex flex-col lg:min-h-[720px] min-w-0">
            <div className="p-6 flex-1 flex flex-col min-w-0">
              <div className="grid grid-cols-1 md:grid-cols-[240px,1fr] gap-6 items-center md:items-start">
                <div className="flex flex-col items-center">
                  {pokeStatus === 'loading' ? (
                    <div className="w-52 h-52 flex items-center justify-center text-zinc-400">Carregando...</div>
                  ) : apiName ? (
                    <img src={image} alt={apiName} className="w-52 h-52 object-contain drop-shadow-2xl" />
                  ) : (
                    <div className="w-52 h-52 flex items-center justify-center text-zinc-500">Selecione um Pokémon</div>
                  )}

                        {apiName ? (
                          <div className="mt-4 w-full max-w-[220px]">
                            <div className="inline-flex w-full rounded-xl border border-zinc-700 bg-zinc-900/20 p-0.5">
                              <button
                                type="button"
                                onClick={() => onChangeSlot({ captured: true })}
                                className={`flex-1 px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors ${
                                  captured ? 'bg-green-500/10 text-green-100' : 'text-zinc-300 hover:bg-zinc-800/40'
                                }`}
                              >
                                Capturado
                              </button>
                              <button
                                type="button"
                                onClick={() => onChangeSlot({ captured: false })}
                                className={`flex-1 px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors ${
                                  !captured ? 'bg-amber-500/10 text-amber-100' : 'text-zinc-300 hover:bg-zinc-800/40'
                                }`}
                              >
                                Não capturado
                              </button>
                            </div>

                            {!captured ? (
                              <button
                                type="button"
                                onClick={() => {
                                  if (!versionGroupName) return;
                                  if (typeof onNavigateCapture !== 'function') return;
                                  onNavigateCapture({ pokemonName: apiName, gameKey: versionGroupName });
                                }}
                                disabled={!versionGroupName || typeof onNavigateCapture !== 'function'}
                                className="mt-3 w-full inline-flex items-center justify-center gap-2 px-4 py-2 rounded-xl border border-zinc-700 bg-zinc-800/30 text-zinc-200 hover:border-zinc-500 hover:bg-zinc-800/50 transition-colors font-semibold disabled:opacity-60 disabled:hover:border-zinc-700 disabled:hover:bg-zinc-800/30"
                              >
                                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2">
                                  <path d="M12 21s7-4.5 7-11a7 7 0 0 0-14 0c0 6.5 7 11 7 11Z" />
                                  <circle cx="12" cy="10" r="2.5" />
                                </svg>
                                Onde capturar
                              </button>
                            ) : null}

                            {featureChips.length ? (
                              <div className="mt-3 flex flex-wrap gap-2 justify-center">
                                {featureChips.map((f) => (
                                  <span
                                    key={f.key}
                                    className="inline-flex items-center px-2 py-0.5 rounded-full border border-zinc-700 bg-zinc-900/30 text-zinc-200 text-xs font-semibold"
                                  >
                                    {f.label}
                                  </span>
                                ))}
                              </div>
                            ) : null}
                          </div>
                        ) : null}
                </div>

                <div className="flex-1 w-full min-w-0">
                  <div className="flex flex-col gap-3">
                    <div className="flex items-baseline justify-between gap-4">
                      <div className="flex-1">
                        <div className="flex items-center gap-3 flex-wrap">
                          <h2 className="text-3xl font-black text-white">{apiName ? titleFromApiName(apiName) : `Slot ${slotIndex + 1}`}</h2>
                          {dexNumber ? <span className="text-sm text-zinc-400 font-black">{dexNumber}</span> : null}
                        </div>
                        {genus ? <p className="text-zinc-300">{genus}</p> : null}
                        {types.length ? (
                          <div className="mt-2 flex flex-wrap gap-2">
                            {types.map((t) => (
                              <TypePill key={t} label={t} />
                            ))}
                          </div>
                        ) : null}
                      </div>
                    </div>

                    <div className="space-y-2">
                      <PokemonPicker
                        value={apiName}
                        onChange={(v) => onChangeSlot({ speciesName: v, moveApiNames: [], captured: true })}
                        items={speciesItems}
                        loading={Boolean(speciesLoading)}
                      />
                      {versionGroupName ? (
                        <div className="text-xs text-zinc-500 font-semibold">Jogo: {versionGroupLabel || versionGroupName}</div>
                      ) : (
                        <div className="text-xs text-zinc-500 font-semibold">Selecione um jogo no topo para filtrar moves.</div>
                      )}
                    </div>

                    {matchupStatus === 'loading' ? (
                      <div className="text-sm text-zinc-400">Carregando fraquezas e forças...</div>
                    ) : matchupStatus === 'error' ? (
                      <div className="text-sm text-zinc-400">Não foi possível calcular agora.</div>
                    ) : (
                      <div className="grid grid-cols-1 gap-4">
                        <InfoBlock title="Forte contra" titleClass="text-zinc-200" items={strongAgainst} />
                        <InfoBlock title="Fraco contra" titleClass="text-zinc-200" items={weakTo} />
                      </div>
                    )}
                  </div>
                </div>
              </div>

              <div className="mt-auto pt-6">
                <div className="rounded-2xl border border-zinc-700 overflow-hidden">
                  <table className="w-full table-fixed border-separate border-spacing-0">
                    <thead>
                      <tr className="bg-zinc-800 text-left">
                        <th className="p-2 lg:p-3 w-[34%]">Move</th>
                        <th className="p-2 lg:p-3 w-[16%]">Tipo</th>
                        <th className="p-2 lg:p-3 w-[16%]">Categoria</th>
                        <th className="p-2 lg:p-3 w-[34%] lg:hidden">Stats</th>
                        <th className="hidden lg:table-cell p-2 lg:p-3 w-[12%]">Pwr</th>
                        <th className="hidden lg:table-cell p-2 lg:p-3 w-[12%]">Acc</th>
                        <th className="hidden lg:table-cell p-2 lg:p-3 w-[10%]">PP</th>
                      </tr>
                    </thead>

                    <tbody>
                      {moveSlots.map((m, idx) => {
                        const api = String(m ?? '').trim().toLowerCase();
                        if (api) {
                          const row =
                            moveMap.get(api) || ({
                              name: titleFromApiName(api),
                              apiName: api,
                              type: 'Normal',
                              category: 'Status',
                              power: '-',
                              acc: '-',
                              pp: '-',
                            });
                          const incompatible = Boolean(versionGroupName && pokeStatus === 'success' && !learnableSet.has(api));

                          return (
                            <tr key={`${idx}:${api}`} className={`border-t border-zinc-700 bg-zinc-900/40 ${incompatible ? 'bg-red-500/5' : ''}`}>
                              <td className="p-2 lg:p-3 font-semibold align-middle">
                                <div className="flex items-center gap-2 min-w-0">
                                  <button
                                    onClick={(e) => {
                                      e.preventDefault();
                                      e.stopPropagation();
                                      clearMoveAt(idx);
                                    }}
                                    className="text-white/80 hover:text-white text-xs font-black px-1.5 py-0.5 rounded-md"
                                    type="button"
                                    title="Remover"
                                  >
                                    ×
                                  </button>

                                  <span
                                    className={`min-w-0 flex-1 inline-flex items-center gap-2 transition-colors cursor-default leading-tight ${
                                      incompatible ? 'text-red-200' : 'hover:text-cyan-300'
                                    }`}
                                    onMouseEnter={(e) =>
                                      setTooltip({
                                        kind: 'move',
                                        anchorEl: e.currentTarget,
                                        payload: row,
                                        learn:
                                          learnMap.get(row.apiName) ||
                                          (versionGroupName && pokeStatus === 'success' ? 'Não aprende nesse jogo' : ''),
                                      })
                                    }
                                    onMouseLeave={closeTooltip}
                                  >
                                    <span className="truncate">{row.name}</span>
                                    <span className="shrink-0 text-xs text-zinc-500">ⓘ</span>
                                  </span>
                                </div>
                              </td>

                              <td className="p-2 lg:p-3 align-middle">
                                <span
                                  className="block w-full"
                                  onMouseEnter={(e) => {
                                    const isStatus = row.category === 'Status';
                                    setTooltip({
                                      kind: isStatus ? 'status' : 'type',
                                      anchorEl: e.currentTarget,
                                      payload: isStatus ? row : row.type,
                                    });
                                  }}
                                  onMouseLeave={closeTooltip}
                                >
                                  <span className="block w-full">
                                    <TypePill label={row.type} fullWidth size="sm" className={incompatible ? 'border-red-400/70' : ''} />
                                  </span>
                                </span>
                              </td>

                              <td className="p-2 lg:p-3 align-middle">
                                <span
                                  className="block w-full"
                                  onMouseEnter={(e) => {
                                    if (row.category !== 'Status') return;
                                    setTooltip({ kind: 'status', anchorEl: e.currentTarget, payload: row });
                                  }}
                                  onMouseLeave={closeTooltip}
                                >
                                  <TypePill label={row.category} fullWidth size="sm" className={incompatible ? 'border-red-400/70' : ''} />
                                </span>
                              </td>

                              <td className="p-2 lg:p-3 align-middle text-xs text-zinc-200 lg:hidden">
                                <span className="truncate block">
                                  {row.power} • {row.acc} • {row.pp}
                                </span>
                              </td>
                              <td className="hidden lg:table-cell p-2 lg:p-3 align-middle">{row.power}</td>
                              <td className="hidden lg:table-cell p-2 lg:p-3 align-middle">{row.acc}</td>
                              <td className="hidden lg:table-cell p-2 lg:p-3 align-middle">{row.pp}</td>
                            </tr>
                          );
                        }

                        const disabled = !versionGroupName || pokeStatus !== 'success';
                        const query = String(moveQueries[idx] ?? '');

                        return (
                          <tr key={`empty:${idx}`} className="border-t border-zinc-700 bg-zinc-900/40">
                            <td className="p-2 lg:p-3" colSpan={7}>
                              <input
                                value={query}
                                onChange={(e) =>
                                  setMoveQueries((prev) => {
                                    const next = prev.slice();
                                    next[idx] = e.target.value;
                                    return next;
                                  })
                                }
                                onFocus={(e) => setMovePicker({ slotIndex: idx, anchorEl: e.currentTarget })}
                                onBlur={() => setTimeout(() => setMovePicker(null), 100)}
                                placeholder={disabled ? 'Selecione um jogo e um Pokémon para filtrar moves...' : 'Buscar move para adicionar...'}
                                disabled={disabled}
                                className={`w-full bg-zinc-800/60 border border-zinc-700 rounded-xl px-3 py-2 text-sm outline-none focus:border-cyan-400 text-white ${
                                  disabled ? 'opacity-60' : ''
                                }`}
                              />
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>

                <SmartTooltip open={tooltipOpen} anchorEl={tooltip?.anchorEl}>
                  {tooltip?.kind === 'move' ? (
                    <div className="w-80 max-w-full">
                      <div className="grid grid-cols-2 gap-2 mb-3">
                        <TypePill label={tooltip.payload.type} fullWidth />
                        <TypePill label={tooltip.payload.category} fullWidth />
                      </div>
                      <MoveTooltipContent move={tooltip.payload} lang="pt" versionGroupName={versionGroupName} learn={tooltip?.learn} />
                    </div>
                  ) : tooltip?.kind === 'type' ? (
                    <MoveTypeTooltipContent type={tooltip.payload} />
                  ) : tooltip?.kind === 'status' ? (
                    <div className="w-80 max-w-full">
                      <div className="text-xs font-black text-zinc-200 mb-2 truncate">{tooltip?.payload?.name || 'Efeito do move'}</div>
                      <MoveStatusTooltipContent move={tooltip.payload} lang="pt" versionGroupName={versionGroupName} />
                    </div>
                  ) : null}
                </SmartTooltip>

                <SmartPopover open={movePickerOpen && activeMoveSlotIndex >= 0} anchorEl={movePicker?.anchorEl} maxWidth={520}>
                  <div className="w-[520px] max-w-full">
                    <div className="max-h-72 overflow-auto pr-1">
                      {movesStatus === 'loading' ? <div className="px-3 py-2 text-sm text-zinc-400">Carregando...</div> : null}
                      {activeMoveCandidates.map((m) => (
                        <button
                          key={m.apiName}
                          onMouseDown={(e) => e.preventDefault()}
                          onClick={() => {
                            setMoveAt(activeMoveSlotIndex, m.apiName);
                            setMoveQueries((prev) => {
                              const next = prev.slice();
                              next[activeMoveSlotIndex] = '';
                              return next;
                            });
                            setMovePicker(null);
                          }}
                          className="w-full flex items-center justify-between gap-3 text-left px-3 py-2 rounded-lg text-sm font-semibold text-zinc-200 hover:bg-zinc-800/50 transition-colors"
                          type="button"
                        >
                          <span className="truncate">{m.label}</span>
                          <span className="text-xs text-zinc-500 font-black">{m.learn}</span>
                        </button>
                      ))}
                      {!activeMoveCandidates.length ? (
                        <div className="px-3 py-2 text-sm text-zinc-500">Nenhum move encontrado para esse filtro.</div>
                      ) : null}
                    </div>
                  </div>
                </SmartPopover>
              </div>
            </div>
          </div>
        );
      }

      // Página: Time (montagem do time + seleção de moves por jogo)
      function TeamPage({ onNavigateCapture } = {}) {
        const { status: speciesStatus, items: speciesItems } = usePokemonList();
        const [team, setTeam] = usePersistentState(TEAM_STORAGE_KEY, DEFAULT_TEAM_STATE);

        // O jogo selecionado no Time define a Dex e influencia várias páginas (Batalha/Captura).
        const versionGroupName = String(team?.versionGroupName ?? '').trim().toLowerCase();
        const gameOptions = useMemo(() => POKEDEX_BY_GAME.map((g) => ({ key: g.key, label: g.label })), []);
        const versionGroupLabel = useMemo(
          () => gameOptions.find((g) => g.key === versionGroupName)?.label || '',
          [gameOptions, versionGroupName]
        );
        const selectedGame = useMemo(
          () => POKEDEX_BY_GAME.find((g) => g.key === versionGroupName) || null,
          [versionGroupName]
        );
        const { status: teamDexStatus, entries: teamDexEntries } = usePokedexEntries(selectedGame?.pokedex);

        // Lista de Pokémon mostrada nos pickers do Time:
        // - se houver "selectedGame", usa a Dex do jogo
        // - caso contrário, usa a lista geral de espécies
        const pickerItems = useMemo(() => {
          if (selectedGame) {
            const list = Array.isArray(teamDexEntries) ? teamDexEntries : [];
            return list
              .map((e) => ({ name: e.speciesName, id: e.nationalId, order: e.entryNumber }))
              .filter((x) => x.name && Number.isFinite(x.id))
              .sort((a, b) => (a.order || 0) - (b.order || 0))
              .map(({ order, ...rest }) => rest);
          }
          return Array.isArray(speciesItems) ? speciesItems : [];
        }, [selectedGame, teamDexEntries, speciesItems]);

        // Atualiza um slot do time, garantindo que existam sempre 6 slots persistidos.
        const updateSlot = (idx, patch) => {
          setTeam((prev) => {
            const slots = Array.isArray(prev?.slots) ? prev.slots.slice(0, 6) : [];
            while (slots.length < 6) slots.push({ speciesName: '', moveApiNames: [], captured: true });
            slots[idx] = { ...slots[idx], ...patch };
            return { ...(prev || {}), slots };
          });
        };

        const slots = Array.isArray(team?.slots) ? team.slots.slice(0, 6) : DEFAULT_TEAM_STATE.slots;

        return (
          <div>
            <div className="flex flex-col gap-3 mb-6">
              <div className="flex flex-col lg:flex-row lg:items-center gap-2 w-full">
                <div className="flex-1">
                  <h2 className="text-3xl font-black text-white">Time</h2>
                  <p className="text-zinc-400">Selecione o jogo e monte seu time com os moves que cada Pokémon pode aprender.</p>
                </div>
              </div>
            </div>

            {speciesStatus === 'error' ? (
              <div className="text-zinc-400 mb-6">Não foi possível carregar a lista de Pokémon.</div>
            ) : (
              <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 items-stretch">
                {slots.map((slot, idx) => (
                  <TeamSlotCard
                    key={`${idx}:${slot?.speciesName || ''}`}
                    slotIndex={idx}
                    slot={slot}
                    versionGroupName={versionGroupName}
                    versionGroupLabel={versionGroupLabel}
                    speciesItems={pickerItems}
                    speciesLoading={Boolean(selectedGame && teamDexStatus === 'loading')}
                    onChangeSlot={(patch) => updateSlot(idx, patch)}
                    onNavigateCapture={onNavigateCapture}
                  />
                ))}
              </div>
            )}
          </div>
        );
      }

      function MoveEffectChip({ label, mult, tone = 'neutral', typeLabel = '', onMouseEnter, onMouseLeave }) {
        const t = String(typeLabel ?? '').trim();
        const base =
          tone === 'incompat'
            ? 'border-red-400/30 bg-red-500/10 text-red-100'
            : t
              ? getTypeClass(t)
              : 'border-zinc-700 bg-zinc-900/30 text-zinc-200';

        const toneClass =
          tone === 'good'
            ? ''
            : tone === 'neutral'
              ? 'opacity-90'
              : tone === 'bad'
                ? 'opacity-85'
                : tone === 'no'
                  ? 'opacity-80'
                  : '';

        return (
          <span
            onMouseEnter={onMouseEnter}
            onMouseLeave={onMouseLeave}
            className={`inline-flex items-center justify-between gap-2 px-3 py-1 rounded-full border text-xs font-semibold w-full sm:w-[170px] max-w-full cursor-help ${base} ${toneClass}`}
          >
            <span className="truncate">{label}</span>
            {mult ? <span className="shrink-0 text-white/80 font-black">{mult}</span> : null}
          </span>
        );
      }

      function BattleRecommendationCard({ member, isBest }) {
        const dexNumber = Number.isFinite(member?.id) ? `#${String(member.id).padStart(4, '0')}` : '';
        const bestOff = typeof member?.bestOffensive === 'number' ? member.bestOffensive : 1;
        const worstThreat = typeof member?.worstThreat === 'number' ? member.worstThreat : 1;
        const worstTypes = Array.isArray(member?.worstThreatTypes) ? member.worstThreatTypes : [];

        const good = Array.isArray(member?.goodMoves) ? member.goodMoves : [];
        const ok = Array.isArray(member?.okMoves) ? member.okMoves : [];
        const bad = Array.isArray(member?.badMoves) ? member.badMoves : [];
        const noEff = Array.isArray(member?.noEffectMoves) ? member.noEffectMoves : [];
        const incompat = Array.isArray(member?.incompatibleMoves) ? member.incompatibleMoves : [];

        const whyWorse = [
          bestOff < 2 ? `melhor golpe só bate ${formatMultiplier(bestOff)}` : '',
          worstThreat > 1 ? `toma ${formatMultiplier(worstThreat)} de ${worstTypes.join(', ')}` : '',
        ]
          .filter(Boolean)
          .join(' • ');

        return (
          <div className={`rounded-3xl border border-zinc-700 bg-zinc-900/50 shadow-2xl p-6 ${isBest ? 'ring-2 ring-cyan-400/40' : ''}`}>
            <div className="flex items-center gap-4">

      function BattleBestCard({ member, isBest, versionGroupName }) {
        const apiName = String(member?.speciesName ?? '').trim().toLowerCase();
        const { status: pokeStatus, data: poke } = usePokemon(apiName);
        const { status: genusStatus, text: genusText } = useSpeciesGenus(apiName);
        const { status: dexStatus, text: dexText } = useSpeciesFlavorText(apiName);
        const { status: evoStatus, next: evoNext } = useEvolutionNextLevel(apiName);

        const dexNumber = Number.isFinite(member?.id) ? `#${String(member.id).padStart(4, '0')}` : '';
        const types = Array.isArray(member?.types) ? member.types : [];
        const image = member?.image || '';

        const { status: matchupStatus, strongAgainst, weakTo } = usePokemonMatchups(types);

        const genus =
          genusStatus === 'loading'
            ? 'Loading species...'
            : genusStatus === 'error'
              ? 'Could not load species.'
              : genusText || '';

        const dex =
          dexStatus === 'loading'
            ? 'Carregando texto da Pokédex...'
            : dexStatus === 'error'
              ? 'Não foi possível carregar o texto da Pokédex.'
              : dexText || '';

        const abilities = Array.isArray(poke?.abilities)
          ? poke.abilities
              .slice()
              .sort((a, b) => (a?.slot || 0) - (b?.slot || 0))
              .map((a) => titleFromApiName(a?.ability?.name))
              .filter(Boolean)
          : [];

        const evoLevel = Number.isFinite(evoNext?.level) ? Number(evoNext.level) : null;

        const stats = Array.isArray(poke?.stats)
          ? poke.stats
              .slice()
              .map((s) => ({
                name: titleFromApiName(s?.stat?.name),
                value: Number.isFinite(s?.base_stat) ? s.base_stat : null,
              }))
              .filter((x) => x.name && Number.isFinite(x.value))
          : [];

        const good = Array.isArray(member?.goodMoves) ? member.goodMoves : [];
        const ok = Array.isArray(member?.okMoves) ? member.okMoves : [];
        const bad = Array.isArray(member?.badMoves) ? member.badMoves : [];
        const noEff = Array.isArray(member?.noEffectMoves) ? member.noEffectMoves : [];
        const incompat = Array.isArray(member?.incompatibleMoves) ? member.incompatibleMoves : [];

        const bestOff = typeof member?.bestOffensive === 'number' ? member.bestOffensive : 1;
        const worstThreat = typeof member?.worstThreat === 'number' ? member.worstThreat : 1;
        const worstTypes = Array.isArray(member?.worstThreatTypes) ? member.worstThreatTypes : [];

        const [moveTip, setMoveTip] = useState(null);

                  <div className="text-3xl font-black text-white truncate">{member?.label || 'Pokémon'}</div>
                  {dexNumber ? <div className="text-sm text-zinc-400 font-black">{dexNumber}</div> : null}
                  <div className="text-xs font-black text-cyan-200 border border-cyan-400/30 bg-cyan-500/10 px-3 py-1 rounded-full">
                    {isBest ? 'Melhor escolha' : 'Em destaque'}
                  </div>
                </div>
                {genus ? <div className="text-zinc-300">{genus}</div> : null}
                {types.length ? (
                  <div className="mt-2 flex flex-wrap gap-2">
                    {types.map((t) => (
                      <TypePill key={t} label={t} />
                    ))}
                  </div>
                ) : null}
                {abilities.length ? (
                  <div className="mt-3 text-sm text-zinc-300">
                    <span className="text-zinc-200 font-black">Habilidades:</span> {abilities.join(', ')}
                  </div>
                ) : null}
                {evoStatus !== 'loading' && evoLevel ? (
                  <div className="mt-1 text-sm text-zinc-300">
                    <span className="text-zinc-200 font-black">Evolui:</span> Nv. {evoLevel}
                  </div>
                ) : null}
              </div>
            </div>

            {dex ? (
              <div className="mt-5 pt-5 border-t border-zinc-800/80 text-sm text-zinc-200 leading-relaxed">{dex}</div>
