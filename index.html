                      const id = String(learnSpeciesId ?? '').trim();
                      if (!id) return;
                      setBridgeAction({ status: 'loading', message: '' });
                      const qs = new URLSearchParams();
                      qs.set('speciesId', id);
                      qs.set('mode', String(learnMode ?? 'wild'));
                      const s = String(learnStart ?? '').trim();
                      const e = String(learnEnd ?? '').trim();
                      if (s) qs.set('start', s);
                      if (e) qs.set('end', e);
                      fetch(`${bridgeBase}/learn?${qs.toString()}`, { cache: 'no-store' })
                        .then(async (r) => {
                          if (!r.ok) {
                            const data = await r.json().catch(() => ({}));
                            throw new Error(String(data?.error || `HTTP ${r.status}`));
                          }
                          setBridgeAction({ status: 'success', message: 'Treino iniciado.' });
                          refreshBridge();
                        })
                        .catch((e) => {
                          setBridgeAction({ status: 'error', message: String(e?.message || 'Erro ao iniciar treino.') });
                          refreshBridge();
                        });
                    }}
                    className="px-3 py-2 rounded-xl border border-zinc-700 bg-zinc-900/20 text-sm font-black text-zinc-200 hover:border-zinc-500 transition-colors"
                  >
                    Treinar
                  </button>
                  <button
                    type="button"
                    onClick={() => {
                      setBridgeAction({ status: 'loading', message: '' });
                      fetch(`${bridgeBase}/learn/lockbest?mode=${encodeURIComponent(String(learnMode ?? 'wild'))}`, { cache: 'no-store' })
                        .then(async (r) => {
                          const data = await r.json().catch(() => ({}));
                          if (!r.ok) throw new Error(String(data?.error || `HTTP ${r.status}`));
                          const locked = Number.isFinite(Number(data?.locked)) ? `0x${Number(data.locked).toString(16).toUpperCase()}` : '';
                          const m = String(data?.mode ?? String(learnMode ?? 'wild')).trim().toLowerCase();
                          setBridgeAction({ status: 'success', message: locked ? `Locked (${m}): ${locked}` : `Locked (${m}).` });
                          refreshBridge();
                        })
                        .catch((e) => {
                          setBridgeAction({ status: 'error', message: String(e?.message || 'Erro ao lockar.') });
                          refreshBridge();
                        });
                    }}
                    className="px-3 py-2 rounded-xl border border-cyan-400/30 bg-cyan-500/10 text-sm font-black text-cyan-100 hover:border-cyan-400/60 transition-colors"
                  >
                    Lock best
                  </button>
                  <button
                    type="button"
                    onClick={() => {
                      setBridgeAction({ status: 'loading', message: '' });
                      fetch(`${bridgeBase}/learn/reset?mode=${encodeURIComponent(String(learnMode ?? 'wild'))}`, { cache: 'no-store' })
                        .then(async (r) => {
                          if (!r.ok) {
                            const data = await r.json().catch(() => ({}));
                            throw new Error(String(data?.error || `HTTP ${r.status}`));
                          }
                          setBridgeAction({ status: 'success', message: 'Resetado.' });
                          refreshBridge();
                        })
                        .catch((e) => {
                          setBridgeAction({ status: 'error', message: String(e?.message || 'Erro ao resetar.') });
                          refreshBridge();
                        });
                    }}
                    className="px-3 py-2 rounded-xl border border-zinc-700 bg-zinc-900/20 text-sm font-black text-zinc-200 hover:border-zinc-500 transition-colors"
                  >
                    Reset
                  </button>
                </div>
              </div>

              <div className="mt-4 grid grid-cols-1 lg:grid-cols-4 gap-3 text-xs font-semibold">
                <div className="rounded-2xl border border-zinc-800 bg-zinc-950/20 px-4 py-3">
                  <div className="text-zinc-500">Bridge</div>
                  <div className="text-zinc-200">
                    {bridge.status === 'success' ? 'OK' : bridge.status === 'loading' ? 'Carregando...' : bridge.status === 'error' ? 'Erro' : 'Parado'}
                  </div>
                  <div className="text-zinc-500 mt-2">Polling</div>
                  <div className="text-zinc-200">{bridge?.data?.config?.pollingEnabled ? 'ON' : 'OFF'}</div>
                  <div className="text-zinc-500 mt-2">Addr</div>
                  <div className="text-zinc-200 truncate">
                    {(() => {
                      const fmt = (n) => (Number.isFinite(Number(n)) ? `0x${Number(n).toString(16).toUpperCase()}` : '-');
                      const sources = bridge?.data?.config?.sources && typeof bridge.data.config.sources === 'object' ? bridge.data.config.sources : null;
                      if (sources) {
                        const wild = Array.isArray(sources?.wild) ? sources.wild : [];
                        const trainer = Array.isArray(sources?.trainer) ? sources.trainer : [];
                        const w = fmt(wild[0]);
                        const t = fmt(trainer[0]);
                        return `W:${w}  T:${t}`;
                      }
                      const addrs = Array.isArray(bridge?.data?.config?.opponentSpeciesAddrs) ? bridge.data.config.opponentSpeciesAddrs : [];
                      const a1 = fmt(addrs[0]);
                      const a2 = fmt(addrs[1]);
                      return a2 !== '-' ? `${a1} | ${a2}` : a1;
                    })()}
                  </div>
                </div>
                <div className="rounded-2xl border border-zinc-800 bg-zinc-950/20 px-4 py-3">
                  <div className="text-zinc-500">Learn</div>
                  <div className="text-zinc-200">
                    {String(learnSnapshot?.state ?? 'idle')} <span className="text-zinc-500">({String(learnMode ?? 'wild')})</span>
                  </div>
                  <div className="text-zinc-500 mt-2">Progresso</div>
                  <div className="text-zinc-200">
                    {Number(learnSnapshot?.processed ?? 0) || 0}/{Number(learnSnapshot?.total ?? 0) || 0}
                  </div>
                  <div className="text-zinc-500 mt-2">Encontrados</div>
                  <div className="text-zinc-200">{Number(learnSnapshot?.found ?? 0) || 0}</div>
                  <div className="text-zinc-500 mt-2">Range</div>
                  <div className="text-zinc-200 truncate">
                    {(() => {
                      const a = learnSnapshot?.scanStart;
                      const b = learnSnapshot?.scanEnd;
                      const fmt = (n) => (Number.isFinite(Number(n)) ? `0x${Number(n).toString(16).toUpperCase()}` : '-');
                      return `${fmt(a)} → ${fmt(b)}`;
                    })()}
                  </div>
                </div>
                <div className="rounded-2xl border border-zinc-800 bg-zinc-950/20 px-4 py-3">
                  <div className="text-zinc-500">Candidatos</div>
                  <div className="text-zinc-200">{Number(learnSnapshot?.candidates ?? 0) || 0}</div>
                </div>
                <div className="rounded-2xl border border-zinc-800 bg-zinc-950/20 px-4 py-3">
                  <div className="text-zinc-500">Amostras</div>
                  <div className="text-zinc-200">{Number(learnSnapshot?.samples ?? 0) || 0}</div>
                </div>
              </div>

              {String(bridgeAction?.message ?? '').trim() ? (
                <div className={`mt-3 text-xs font-semibold ${bridgeAction.status === 'error' ? 'text-rose-200' : 'text-zinc-300'}`}>
                  {String(bridgeAction.message)}
                </div>
              ) : null}

              {String(bridge?.data?.learn?.error ?? '').trim() ? (
                <div className="mt-3 text-xs font-semibold text-rose-200">
                  Erro: {String(bridge?.data?.learn?.error ?? '')}
                </div>
              ) : null}
            </div>
            ) : null}

            <RealTimeBattleView
              currentOpponent={currentOpponent}
              analysisStatus={analysis.status}
              focus={focus}
              focusIsBest={focusIsBest}
              versionGroupName={versionGroupName}
              rest={rest}
              visibleSlots={visibleSlots}
              selectedGameLabel={selectedGame?.label || ''}
              opponentIndex={opponentIndex}
              opponents={opponents}
              onSetOpponentIndex={setOpponentIndex}
              onSelectSlot={selectSlot}
            />
          </div>
        );
      }

      function useVersionGroupVersions(versionGroupName) {
        const [state, setState] = useState({ status: 'idle', versions: [] });

        useEffect(() => {
          let cancelled = false;
          const vg = String(versionGroupName ?? '').trim().toLowerCase();
          if (!vg) {
            setState({ status: 'idle', versions: [] });
            return;
          }

          setState({ status: 'loading', versions: [] });
          cachedFetchJson(`${POKEAPI_BASE}/version-group/${vg}`)
            .then((data) => {
              if (cancelled) return;
              const list = Array.isArray(data?.versions) ? data.versions.map((v) => String(v?.name ?? '').trim().toLowerCase()).filter(Boolean) : [];
              setState({ status: 'success', versions: list });
            })
            .catch(() => {
              if (cancelled) return;
              setState({ status: 'error', versions: [] });
            });

          return () => {
            cancelled = true;
          };
        }, [versionGroupName]);

        return state;
      }

      function formatEncounterMethodLabel(apiName) {
        const m = String(apiName ?? '').trim().toLowerCase();
        const map = {
          walk: 'Andando',
          surfing: 'Surf',
          old_rod: 'Old Rod',
          good_rod: 'Good Rod',
          super_rod: 'Super Rod',
        };
        if (map[m]) return map[m];
        return titleFromApiName(m.replace(/_/g, '-'));
      }

      function summarizeEncounterDetails(details) {
        const list = Array.isArray(details) ? details : [];
        const out = [];
        for (const d of list) {
          const method = String(d?.method?.name ?? '').trim().toLowerCase();
          if (!method) continue;
          const chance = Number.isFinite(d?.chance) ? d.chance : null;
          const min = Number.isFinite(d?.min_level) ? d.min_level : null;
          const max = Number.isFinite(d?.max_level) ? d.max_level : null;
          const conditions = Array.isArray(d?.condition_values)
            ? d.condition_values.map((c) => titleFromApiName(c?.name)).filter(Boolean)
            : [];
          out.push({ method, chance, min, max, conditions });
        }

        const groups = new Map();
        for (const r of out) {
          if (!groups.has(r.method)) groups.set(r.method, []);
          groups.get(r.method).push(r);
        }

        const summaries = [];
        for (const [method, rows] of groups.entries()) {
          const chances = rows.map((r) => r.chance).filter((x) => Number.isFinite(x));
          const mins = rows.map((r) => r.min).filter((x) => Number.isFinite(x));
          const maxs = rows.map((r) => r.max).filter((x) => Number.isFinite(x));
          const allConditions = rows.flatMap((r) => r.conditions || []).filter(Boolean);
          const uniqConditions = Array.from(new Set(allConditions));
          summaries.push({
            method,
            methodLabel: formatEncounterMethodLabel(method),
            chance: chances.length ? Math.max(...chances) : null,
            minLevel: mins.length ? Math.min(...mins) : null,
            maxLevel: maxs.length ? Math.max(...maxs) : null,
            conditions: uniqConditions,
          });
        }

        const orderKey = (m) => {
          if (m === 'walk') return 0;
          if (m === 'surfing') return 1;
          if (m === 'old-rod' || m === 'old_rod') return 2;
          if (m === 'good-rod' || m === 'good_rod') return 3;
          if (m === 'super-rod' || m === 'super_rod') return 4;
          return 99;
        };
        summaries.sort((a, b) => orderKey(a.method) - orderKey(b.method) || a.methodLabel.localeCompare(b.methodLabel));
        return summaries;
      }

      function CaptureMethodPill({ methodLabel, chance, minLevel, maxLevel, conditions }) {
        const lvl =
          Number.isFinite(minLevel) && Number.isFinite(maxLevel)
            ? minLevel === maxLevel
              ? `Lv ${minLevel}`
              : `Lv ${minLevel}-${maxLevel}`
            : '';
        const ch = Number.isFinite(chance) ? `${chance}%` : '';
        const cond = Array.isArray(conditions) && conditions.length ? conditions.join(', ') : '';

        return (
          <div className="rounded-2xl border border-zinc-700 bg-zinc-900/30 p-4">
            <div className="flex items-center gap-3">
              <div className="w-10 h-10 rounded-xl border border-zinc-800 bg-zinc-900/40 flex items-center justify-center">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" className="text-zinc-200">
                  <path d="M12 3v18" opacity="0.25" />
                  <path d="M6 7h12M6 17h12" />
                </svg>
              </div>
              <div className="min-w-0 flex-1">
                <div className="font-black text-zinc-100 truncate">{methodLabel}</div>
                <div className="text-xs text-zinc-400 font-semibold">
                  {[lvl, ch].filter(Boolean).join(' • ')}
                  {cond ? ` • ${cond}` : ''}
                </div>
              </div>
            </div>
          </div>
        );
      }

      function CaptureLocationCard({ areaName, locationName, methods }) {
        const title = titleFromApiName(locationName || areaName);
        const subtitle = locationName && areaName && locationName !== areaName ? titleFromApiName(areaName) : '';
        const list = Array.isArray(methods) ? methods : [];

        return (
          <div className="rounded-3xl border border-zinc-700 bg-zinc-900/50 shadow-2xl p-6">
            <div className="flex items-start gap-4">
              <div className="w-12 h-12 rounded-2xl border border-zinc-800 bg-zinc-900/40 flex items-center justify-center">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" className="text-zinc-200">
                  <path d="M12 21s7-4.5 7-11a7 7 0 0 0-14 0c0 6.5 7 11 7 11Z" />
                  <circle cx="12" cy="10" r="2.5" />
                </svg>
              </div>
              <div className="min-w-0 flex-1">
                <div className="text-xl font-black text-white truncate">{title}</div>
                {subtitle ? <div className="text-sm text-zinc-400 font-semibold truncate">{subtitle}</div> : null}
              </div>
            </div>

            {list.length ? (
              <div className="mt-5 grid grid-cols-1 md:grid-cols-2 gap-3">
                {list.map((m) => (
                  <CaptureMethodPill
                    key={`${m.method}:${m.minLevel || ''}:${m.maxLevel || ''}:${m.chance || ''}:${(m.conditions || []).join('|')}`}
                    methodLabel={m.methodLabel}
                    chance={m.chance}
                    minLevel={m.minLevel}
                    maxLevel={m.maxLevel}
                    conditions={m.conditions}
                  />
                ))}
              </div>
            ) : (
              <div className="mt-5 text-sm text-zinc-400">Sem detalhes de encontro para este local.</div>
            )}
          </div>
        );
      }

      // Página: Captura (onde/como capturar no jogo escolhido)
      function CapturePage({ initialGameKey = '', initialPokemonName = '', initialPlaceFilter = '', onSessionChange } = {}) {
        const { status: speciesStatus, items: speciesItems } = usePokemonList();
        const [team] = usePersistentState(TEAM_STORAGE_KEY, DEFAULT_TEAM_STATE);

        // Regras de prioridade ao abrir Captura:
        // - se vier "initialGameKey" (ex.: navegação da Pokédex), usa ele
        // - caso contrário usa o jogo do Time
        // - fallback final: primeiro jogo configurado
        const defaultGameKey = String(team?.versionGroupName ?? '').trim().toLowerCase();
        const fallbackGameKey = defaultGameKey || String(POKEDEX_BY_GAME?.[0]?.key ?? '').trim().toLowerCase();
        const normalizedInitialGameKey = String(initialGameKey ?? '').trim().toLowerCase();
        const normalizedInitialPokemonName = String(initialPokemonName ?? '').trim().toLowerCase();
        const normalizedInitialPlaceFilter = String(initialPlaceFilter ?? '');

        const [gameKey, setGameKey] = useState(normalizedInitialGameKey || fallbackGameKey);
        const [pokemonName, setPokemonName] = useState(normalizedInitialPokemonName);
        const [placeFilter, setPlaceFilter] = useState(normalizedInitialPlaceFilter);
        const skipClearOnGameChangeRef = useRef(false);
        const didMountRef = useRef(false);

        const selectedGame = useMemo(() => POKEDEX_BY_GAME.find((g) => g.key === gameKey) || null, [gameKey]);
        const { status: dexStatus, entries: dexEntries } = usePokedexEntries(selectedGame?.pokedex);
        const { status: vgStatus, versions } = useVersionGroupVersions(gameKey);

        const pickerItems = useMemo(() => {
          if (selectedGame) {
            const list = Array.isArray(dexEntries) ? dexEntries : [];
            return list
              .map((e) => ({ name: e.speciesName, id: e.nationalId, order: e.entryNumber }))
              .filter((x) => x.name && Number.isFinite(x.id))
              .sort((a, b) => (a.order || 0) - (b.order || 0))
              .map(({ order, ...rest }) => rest);
          }
          return Array.isArray(speciesItems) ? speciesItems : [];
        }, [selectedGame, dexEntries, speciesItems]);

        // Ao trocar de jogo, limpa seleção/filtro para evitar estado incoerente.
        // skipClearOnGameChangeRef é usado quando a troca vem da navegação com parâmetros.
        useEffect(() => {
          if (!didMountRef.current) {
            didMountRef.current = true;
            return;
          }
          if (skipClearOnGameChangeRef.current) {
            skipClearOnGameChangeRef.current = false;
            setPlaceFilter('');
            return;
          }
          setPokemonName('');
          setPlaceFilter('');
        }, [gameKey]);

        // Sincroniza props iniciais (navegação) com o estado interno.
        useEffect(() => {
          const g = String(initialGameKey ?? '').trim().toLowerCase();
          const p = String(initialPokemonName ?? '').trim().toLowerCase();
          const f = String(initialPlaceFilter ?? '');
          if (g && g !== gameKey) {
            skipClearOnGameChangeRef.current = true;
            setGameKey(g);
          }
          if (p && p !== pokemonName) setPokemonName(p);
          if (f !== placeFilter) setPlaceFilter(f);
        }, [initialGameKey, initialPokemonName, initialPlaceFilter]);

        // Informa o pai para persistir/restaurar sessão, evitando sobrescrever durante o sync inicial.
        useEffect(() => {
          if (typeof onSessionChange !== 'function') return;
          const g = String(initialGameKey ?? '').trim().toLowerCase();
          const p = String(initialPokemonName ?? '').trim().toLowerCase();
          if (g && g !== gameKey) return;
          if (p && p !== pokemonName) return;
          onSessionChange({ gameKey, pokemonName, placeFilter });
        }, [gameKey, pokemonName, placeFilter, onSessionChange, initialGameKey, initialPokemonName]);

        const { status: pokeStatus, data: poke } = usePokemon(pokemonName);
        const { status: genusStatus, text: genusText } = useSpeciesGenus(pokemonName);
        const { status: evoStatus, next: evoNext } = useEvolutionNextLevel(pokemonName);

        const dexNumber = Number.isFinite(poke?.id) ? `#${String(poke.id).padStart(4, '0')}` : '';
        const types = Array.isArray(poke?.types)
          ? poke.types
              .slice()
              .sort((a, b) => (a?.slot || 0) - (b?.slot || 0))
              .map((t) => typeLabelFromApiName(t?.type?.name))
              .filter(Boolean)
          : [];
        const image = pickBestSprite(poke, false) || '';
        const evoLevel = Number.isFinite(evoNext?.level) ? Number(evoNext.level) : null;

        const [encState, setEncState] = useState({ status: 'idle', rows: [], total: 0 });

        useEffect(() => {
          let cancelled = false;
          const name = String(pokemonName ?? '').trim().toLowerCase();
          const vg = String(gameKey ?? '').trim().toLowerCase();
          const versionsSet = new Set(Array.isArray(versions) ? versions : []);

          if (!name || !vg) {
            setEncState({ status: 'idle', rows: [], total: 0 });
            return;
          }
          if (vgStatus === 'loading') {
            setEncState((prev) => ({ ...prev, status: prev.status === 'idle' ? 'loading' : prev.status }));
            return;
          }

          setEncState({ status: 'loading', rows: [], total: 0 });
          cachedFetchJson(`${POKEAPI_BASE}/pokemon/${name}/encounters`)
            .then((data) => {
              if (cancelled) return;
              const entries = Array.isArray(data) ? data : [];
              const mapped = [];

              for (const e of entries) {
                const areaUrl = String(e?.location_area?.url ?? '').trim();
                const areaName = String(e?.location_area?.name ?? '').trim();
                if (!areaUrl || !areaName) continue;
                const vd = Array.isArray(e?.version_details) ? e.version_details : [];
                const relevant = vd.filter((x) => versionsSet.has(String(x?.version?.name ?? '').trim().toLowerCase()));
                if (!relevant.length) continue;
                const allDetails = relevant.flatMap((x) => (Array.isArray(x?.encounter_details) ? x.encounter_details : []));
                const methods = summarizeEncounterDetails(allDetails);
                mapped.push({ areaUrl, areaName, methods });
              }

              setEncState({ status: 'success', rows: mapped.slice(0, 60), total: mapped.length });
            })
            .catch(() => {
              if (cancelled) return;
              setEncState({ status: 'error', rows: [], total: 0 });
            });

          return () => {
            cancelled = true;
          };
        }, [pokemonName, gameKey, vgStatus, JSON.stringify(versions)]);

        const [areaInfo, setAreaInfo] = useState({ status: 'idle', map: new Map() });

        useEffect(() => {
          let cancelled = false;
          const rows = Array.isArray(encState?.rows) ? encState.rows : [];
          if (!rows.length) {
            setAreaInfo({ status: 'idle', map: new Map() });
            return;
          }

          const urls = rows.map((r) => r.areaUrl).filter(Boolean).slice(0, 40);
          setAreaInfo({ status: 'loading', map: new Map() });
          Promise.all(
            urls.map((url) =>
              cachedFetchJson(url)
                .then((data) => {
                  const loc = String(data?.location?.name ?? '').trim();
                  return { url, locationName: loc };
                })
                .catch(() => ({ url, locationName: '' }))
            )
          )
            .then((list) => {
              if (cancelled) return;
              const map = new Map();
              for (const it of list) {
                map.set(it.url, { locationName: it.locationName });
              }
              setAreaInfo({ status: 'success', map });
            })
            .catch(() => {
              if (cancelled) return;
              setAreaInfo({ status: 'error', map: new Map() });
            });

          return () => {
            cancelled = true;
          };
        }, [encState.status, JSON.stringify((encState.rows || []).map((r) => r.areaUrl))]);

        const filteredRows = useMemo(() => {
          const q = String(placeFilter ?? '').trim().toLowerCase();
          const rows = Array.isArray(encState?.rows) ? encState.rows : [];
          if (!q) return rows;
          return rows.filter((r) => {
            const loc = String(areaInfo.map?.get?.(r.areaUrl)?.locationName ?? '').toLowerCase();
            if (r.areaName.toLowerCase().includes(q)) return true;
            if (loc && loc.includes(q)) return true;
            return false;
          });
        }, [placeFilter, encState.rows, areaInfo.map]);

        const loadingPickers = Boolean(selectedGame && dexStatus === 'loading') || speciesStatus === 'loading';

        const genus =
          genusStatus === 'loading'
            ? 'Carregando espécie...'
            : genusStatus === 'error'
              ? ''
              : genusText || '';

        return (
          <div>
            <div className="flex flex-col gap-3 mb-6">
              <div className="flex flex-col lg:flex-row lg:items-center gap-2 w-full">
                <div className="flex-1">
                  <h2 className="text-3xl font-black text-white">Captura</h2>
                  <p className="text-zinc-400">Selecione um jogo e um Pokémon para ver onde e como capturar.</p>
                </div>
              </div>

              <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                <div className="rounded-3xl border border-zinc-700 bg-zinc-900/50 shadow-2xl p-6">
                  <div className="text-sm font-black text-zinc-200 mb-3">Jogo</div>
                  <GamePicker value={gameKey} onChange={(k) => setGameKey(String(k || fallbackGameKey).trim().toLowerCase())} options={POKEDEX_BY_GAME} />
                  {vgStatus === 'loading' ? <div className="mt-2 text-xs text-zinc-500 font-semibold">Carregando versões...</div> : null}
                </div>

                <div className="rounded-3xl border border-zinc-700 bg-zinc-900/50 shadow-2xl p-6">
                  <div className="text-sm font-black text-zinc-200 mb-3">Pokémon</div>
                  <PokemonPicker value={pokemonName} onChange={setPokemonName} items={pickerItems} loading={loadingPickers} />
                  {selectedGame ? (
                    <div className="mt-2 text-xs text-zinc-500 font-semibold">Dex do jogo: {selectedGame.label}</div>
                  ) : null}
                </div>
              </div>
            </div>

            {pokemonName ? (
              <div className="rounded-3xl border border-zinc-700 bg-zinc-900/50 shadow-2xl p-6 mb-6">
                <div className="flex flex-col md:flex-row gap-6 items-center md:items-start">
                  <div className="w-40 h-40 flex items-center justify-center">
                    {pokeStatus === 'loading' ? (
                      <div className="text-zinc-400">Carregando...</div>
                    ) : (
                      <img src={image} alt={pokemonName} className="w-40 h-40 object-contain drop-shadow-2xl" />
                    )}
                  </div>
                  <div className="flex-1 w-full">
                    <div className="flex items-baseline gap-3 flex-wrap">
                      <div className="text-3xl font-black text-white">{titleFromApiName(pokemonName)}</div>
                      {dexNumber ? <div className="text-sm text-zinc-400 font-black">{dexNumber}</div> : null}
                    </div>
                    {genus ? <div className="text-zinc-300">{genus}</div> : null}
                    {evoStatus !== 'loading' && evoLevel ? (
                      <div className="mt-2 text-sm text-zinc-300">
                        <span className="text-zinc-200 font-black">Evolui:</span> Nv. {evoLevel}
                      </div>
                    ) : null}
                    {types.length ? (
                      <div className="mt-2 flex flex-wrap gap-2">
                        {types.map((t) => (
                          <TypePill key={t} label={t} />
                        ))}
                      </div>
                    ) : null}
                    <div className="mt-4 text-xs text-zinc-500 font-semibold">
                      {encState.status === 'success'
                        ? `Locais encontrados: ${encState.total} (mostrando ${filteredRows.length})`
                        : encState.status === 'loading'
                          ? 'Buscando locais...'
                          : encState.status === 'error'
                            ? 'Não foi possível buscar os locais agora.'
                            : ''}
                    </div>
                  </div>
                </div>
              </div>
            ) : (
              <div className="text-zinc-400">Selecione um Pokémon para ver as informações de captura.</div>
            )}

            {pokemonName ? (
              <div className="mb-6">
                <div className="flex flex-col lg:flex-row lg:items-center gap-2 w-full mb-4">
                  <div className="flex-1 text-sm font-black text-zinc-200">Onde encontrar</div>
                  <input
                    value={placeFilter}
                    onChange={(e) => setPlaceFilter(e.target.value)}
                    placeholder="Filtrar locais (ex: route, cave, forest...)"
                    className="w-full lg:w-96 bg-zinc-900/50 border border-zinc-800 rounded-xl px-3 py-2 text-sm outline-none focus:border-cyan-400 text-white"
                  />
                </div>

                {encState.status === 'loading' ? (
                  <div className="text-zinc-400">Carregando encontros...</div>
                ) : encState.status === 'error' ? (
                  <div className="text-zinc-400">Não foi possível carregar os encontros agora.</div>
                ) : encState.status === 'success' ? (
                  filteredRows.length ? (
                    <div className="grid grid-cols-1 gap-6">
                      {filteredRows.map((r) => (
                        <CaptureLocationCard
                          key={r.areaUrl}
                          areaName={r.areaName}
                          locationName={areaInfo.map.get(r.areaUrl)?.locationName || ''}
                          methods={r.methods}
                        />
                      ))}
                    </div>
                  ) : (
                    <div className="text-zinc-400">Nenhum local encontrado para esse filtro.</div>
                  )
                ) : null}
              </div>
            ) : null}
          </div>
        );
      }

      function PokedexCard({ apiName, captureGameKey, onNavigateCapture }) {
        const { status: pokeStatus, data: poke } = usePokemon(apiName);
        const { status: genusStatus, text: genusText } = useSpeciesGenus(apiName);
        const { status: dexStatus, text: dexText } = useSpeciesFlavorText(apiName);
        const { status: evoStatus, next: evoNext } = useEvolutionNextLevel(apiName);
        const [artTip, setArtTip] = useState(null);
        const artOpen = Boolean(artTip?.anchorEl);
        const { status: formsStatus, forms } = useVarietySprites(apiName, artOpen);
        const dexNumber = Number.isFinite(poke?.id) ? `#${String(poke.id).padStart(4, '0')}` : '';

        const types = Array.isArray(poke?.types)
          ? poke.types
              .slice()
              .sort((a, b) => (a?.slot || 0) - (b?.slot || 0))
              .map((t) => typeLabelFromApiName(t?.type?.name))
              .filter(Boolean)
          : [];

        const { status: matchupStatus, strongAgainst, weakTo } = usePokemonMatchups(types);

        const image =
          poke?.sprites?.other?.['official-artwork']?.front_default ||
          poke?.sprites?.other?.home?.front_default ||
          poke?.sprites?.front_default ||
          '';

        const genus =
          genusStatus === 'loading'
            ? 'Carregando espécie...'
            : genusStatus === 'error'
              ? 'Não foi possível carregar a espécie.'
              : genusText || 'Espécie desconhecida';

        const dex =
          dexStatus === 'loading'
            ? 'Carregando texto da Pokédex...'
            : dexStatus === 'error'
              ? 'Não foi possível carregar o texto da Pokédex.'
              : dexText || 'Sem texto disponível.';

        const evoLevel = Number.isFinite(evoNext?.level) ? Number(evoNext.level) : null;

        return (
          <div className="rounded-3xl border border-zinc-700 bg-zinc-900/50 p-6">
            <div className="flex flex-col md:flex-row gap-6 items-center md:items-start">
              <div
                className="w-52 h-52 flex items-center justify-center"
                onMouseEnter={(e) => setArtTip({ anchorEl: e.currentTarget })}
                onMouseLeave={() => setArtTip(null)}
              >
                {pokeStatus === 'loading' ? (
                  <div className="text-zinc-400">Carregando...</div>
                ) : image ? (
                  <img src={image} alt={apiName} className="w-52 h-52 object-contain drop-shadow-2xl" />
                ) : (
                  <div className="text-zinc-400">Sem imagem</div>
                )}
              </div>

              <SmartTooltip open={artOpen} anchorEl={artTip?.anchorEl} maxWidth={520}>
                <div className="w-[520px] max-w-full">
                  {formsStatus === 'loading' ? (
                    <div className="text-sm text-zinc-300">Carregando formas...</div>
                  ) : formsStatus === 'error' ? (
                    <div className="text-sm text-zinc-300">Não foi possível carregar as formas.</div>
                  ) : (
                    <div className="grid gap-3 grid-cols-1 sm:grid-cols-2">
                      {forms.map((f) => (
                        <div key={f.apiName} className="rounded-xl border border-zinc-800 bg-zinc-950/20 p-3">
                          <div className="text-sm font-black text-zinc-100 truncate">{f.label}</div>
                          <div className="mt-2 grid grid-cols-2 gap-3 items-center">
                            <div className="flex flex-col items-center">
                              {f.normal ? (
                                <img src={f.normal} alt={`${f.apiName} normal`} className="w-20 h-20 object-contain" />
                              ) : (
                                <div className="w-20 h-20 flex items-center justify-center text-xs text-zinc-600">—</div>
                              )}
                              <div className="text-[10px] font-black text-zinc-500 mt-1">Normal</div>
                            </div>
                            <div className="flex flex-col items-center">
                              {f.shiny ? (
                                <img src={f.shiny} alt={`${f.apiName} shiny`} className="w-20 h-20 object-contain" />
                              ) : (
                                <div className="w-20 h-20 flex items-center justify-center text-xs text-zinc-600">—</div>
                              )}
                              <div className="text-[10px] font-black text-zinc-500 mt-1">Shiny</div>
                            </div>
                          </div>
                        </div>
                      ))}
                      {!forms.length ? <div className="text-sm text-zinc-300">Sem formas alternativas.</div> : null}
                    </div>
                  )}
                </div>
              </SmartTooltip>

              <div className="flex-1 w-full">
                <div className="flex items-center gap-3 flex-wrap">
                  <h2 className="text-4xl font-black text-white">{typeLabelFromApiName(apiName)}</h2>
                  {dexNumber ? <span className="text-zinc-300 font-black">{dexNumber}</span> : null}
                  <div className="flex flex-wrap gap-2">
                    {types.map((t) => (
                      <TypePill key={t} label={t} />
                    ))}
                  </div>
                </div>

                <p className="text-zinc-200 mt-1">{genus}</p>
                {evoStatus !== 'loading' && evoLevel ? (
                  <div className="mt-2 text-sm text-zinc-300">
                    <span className="text-zinc-200 font-black">Evolui:</span> Nv. {evoLevel}
                  </div>
                ) : null}

                {captureGameKey && typeof onNavigateCapture === 'function' ? (
                  <div className="mt-3">
                    <button
                      type="button"
                      onClick={() => onNavigateCapture({ pokemonName: apiName, gameKey: captureGameKey })}
                      className="inline-flex items-center gap-2 px-4 py-2 rounded-xl border border-zinc-700 bg-zinc-800/30 text-zinc-200 hover:border-zinc-500 hover:bg-zinc-800/50 transition-colors font-semibold"
                    >
                      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2">
                        <path d="M12 21s7-4.5 7-11a7 7 0 0 0-14 0c0 6.5 7 11 7 11Z" />
                        <circle cx="12" cy="10" r="2.5" />
                      </svg>
                      Onde capturar
                    </button>
                  </div>
                ) : null}

                <div className="mt-4 grid grid-cols-1 md:grid-cols-2 gap-4 items-stretch">
                  <Panel className="p-4 h-full">
                    <h3 className="text-xs font-black tracking-wide text-zinc-200 mb-2">Forte contra</h3>
                    {matchupStatus === 'loading' ? (
                      <div className="text-sm text-zinc-400">Carregando...</div>
                    ) : matchupStatus === 'error' ? (
                      <div className="text-sm text-zinc-400">Não foi possível calcular agora.</div>
                    ) : (
                      <div className="grid gap-x-3 gap-y-2 grid-cols-[repeat(auto-fill,minmax(120px,1fr))]">
                        {strongAgainst.map((t) => (
                          <TypePill key={t} label={t} fullWidth />
                        ))}
                      </div>
                    )}
                  </Panel>

                  <Panel className="p-4 h-full">
                    <h3 className="text-xs font-black tracking-wide text-zinc-200 mb-2">Fraco contra</h3>
                    {matchupStatus === 'loading' ? (
                      <div className="text-sm text-zinc-400">Carregando...</div>
                    ) : matchupStatus === 'error' ? (
                      <div className="text-sm text-zinc-400">Não foi possível calcular agora.</div>
                    ) : (
                      <div className="grid gap-x-3 gap-y-2 grid-cols-[repeat(auto-fill,minmax(120px,1fr))]">
                        {weakTo.map((t) => (
                          <TypePill key={t} label={t} fullWidth />
                        ))}
                      </div>
                    )}
                  </Panel>
                </div>

                <Panel className="mt-4 p-4">
                  <h3 className="font-black text-zinc-100 mb-2">Pokédex</h3>
                  <p className="text-zinc-200 leading-relaxed">{dex}</p>
                </Panel>
              </div>
            </div>
          </div>
        );
      }

      function usePokedexGridColumns() {
        const calc = () => {
          const w = window.innerWidth;
          if (w >= 1024) return 5;
          if (w >= 768) return 4;
          if (w >= 640) return 3;
          return 2;
        };

        const [cols, setCols] = useState(calc);

        useEffect(() => {
          const onResize = () => setCols(calc());
          window.addEventListener('resize', onResize);
          return () => window.removeEventListener('resize', onResize);
        }, []);

        return cols;
      }

      function GamePicker({ value, onChange, options }) {
        const [open, setOpen] = useState(false);
        const [q, setQ] = useState('');
        const [activeIndex, setActiveIndex] = useState(0);
        const ref = useRef(null);

        const selected = useMemo(() => options.find((o) => o.key === value) || null, [options, value]);
        const filtered = useMemo(() => {
          const t = q.trim().toLowerCase();
          if (!t) return options;
          return options.filter((o) => o.label.toLowerCase().includes(t));
        }, [q, options]);

        useEffect(() => {
          if (!open) return;
          setActiveIndex(0);
          const onDown = (e) => {
            if (!ref.current) return;
            if (!ref.current.contains(e.target)) setOpen(false);
          };
          document.addEventListener('mousedown', onDown);
          return () => document.removeEventListener('mousedown', onDown);
        }, [open]);

        useEffect(() => {
          if (!open) return;
          setActiveIndex(0);
        }, [open, q]);

        const maxIndex = 1 + (Array.isArray(filtered) ? filtered.length : 0);
        const clampIndex = (n) => Math.max(0, Math.min(maxIndex - 1, n));

        return (
          <div ref={ref} className="relative w-full md:w-64">
            <button
              onClick={() => setOpen((o) => !o)}
              className="w-full flex items-center justify-between gap-3 bg-zinc-800/60 border border-zinc-700 rounded-xl px-3 py-2 text-left hover:border-zinc-500 transition-colors"
              type="button"
            >
              <span className={`truncate text-sm font-semibold ${selected ? 'text-zinc-100' : 'text-zinc-400'}`}>
                {selected ? selected.label : 'Filtrar por jogo (opcional)'}
              </span>
              <span className="text-zinc-500 text-xs font-black">{open ? '▲' : '▼'}</span>
            </button>

            {open ? (
              <div className="absolute z-50 mt-2 w-full rounded-xl border border-zinc-700 bg-zinc-900/95 backdrop-blur p-2 shadow-2xl">
                <input
                  value={q}
                  onChange={(e) => setQ(e.target.value)}
                  onKeyDown={(e) => {
                    if (e.key === 'Escape') {
                      setOpen(false);
                      return;
                    }
                    if (e.key === 'ArrowDown') {
                      e.preventDefault();
                      setActiveIndex((i) => clampIndex(i + 1));
                      return;
                    }
                    if (e.key === 'ArrowUp') {
                      e.preventDefault();
                      setActiveIndex((i) => clampIndex(i - 1));
                      return;
                    }
                    if (e.key === 'Enter') {
                      e.preventDefault();
                      if (activeIndex === 0) {
                        onChange('');
                        setOpen(false);
                        return;
                      }
                      const pick = filtered[activeIndex - 1];
                      if (pick?.key) {
                        onChange(pick.key);
                        setOpen(false);
                      }
                    }
                  }}
                  placeholder="Buscar jogo..."
                  className="w-full bg-zinc-800/60 border border-zinc-700 rounded-lg px-3 py-2 text-sm outline-none focus:border-cyan-400 text-white"
                />

                <div className="mt-2 max-h-72 overflow-auto pr-1">
                  <button
                    onClick={() => {
                      onChange('');
                      setOpen(false);
                    }}
                    className={`w-full text-left px-3 py-2 rounded-lg text-sm font-semibold transition-colors ${
                      activeIndex === 0 || !value ? 'bg-zinc-800/50 text-zinc-100' : 'text-zinc-200 hover:bg-zinc-800/50'
                    }`}
                    type="button"
                  >
                    Dex completa
                  </button>

                  <div className="my-2 h-px bg-zinc-800" />

                  {filtered.map((o, idx) => {
                    const active = o.key === value;
                    const highlighted = activeIndex === idx + 1;
                    return (
                      <button
                        key={o.key}
                        onClick={() => {
                          onChange(active ? '' : o.key);
                          setOpen(false);
                        }}
                        className={`w-full text-left px-3 py-2 rounded-lg text-sm font-semibold transition-colors ${
                          active || highlighted
                            ? 'border border-cyan-400/50 bg-cyan-500/10 text-cyan-100'
                            : 'text-zinc-200 hover:bg-zinc-800/50'
                        }`}
                        type="button"
                      >
                        {o.label}
                      </button>
                    );
                  })}

                  {!filtered.length ? <div className="px-3 py-2 text-sm text-zinc-500">Nenhum jogo encontrado.</div> : null}
                </div>
              </div>
            ) : null}
          </div>
        );
      }

      // Página: Pokédex (lista + detalhe inline)
      function PokedexPage({
        query: queryProp,
        setQuery: setQueryProp,
        gameKey: gameKeyProp,
        setGameKey: setGameKeyProp,
        numbering: numberingProp,
        setNumbering: setNumberingProp,
        visibleCount: visibleCountProp,
        setVisibleCount: setVisibleCountProp,
        selected: selectedProp,
        setSelected: setSelectedProp,
        onNavigateCapture,
      } = {}) {
        const [queryState, setQueryState] = useState('');
        const query = queryProp !== undefined ? queryProp : queryState;
        const setQuery = typeof setQueryProp === 'function' ? setQueryProp : setQueryState;
        const [selectedState, setSelectedState] = useState('');
        const selected = selectedProp !== undefined ? selectedProp : selectedState;
        const setSelected = typeof setSelectedProp === 'function' ? setSelectedProp : setSelectedState;

        const [gameKeyState, setGameKeyState] = useState('');
        const gameKey = gameKeyProp !== undefined ? gameKeyProp : gameKeyState;
        const setGameKey = typeof setGameKeyProp === 'function' ? setGameKeyProp : setGameKeyState;

        const [numberingState, setNumberingState] = useState('national');
        const numbering = numberingProp !== undefined ? numberingProp : numberingState;
        const setNumbering = typeof setNumberingProp === 'function' ? setNumberingProp : setNumberingState;

        const [visibleCountState, setVisibleCountState] = useState(100);
        const visibleCount = visibleCountProp !== undefined ? visibleCountProp : visibleCountState;
        const setVisibleCount = typeof setVisibleCountProp === 'function' ? setVisibleCountProp : setVisibleCountState;

        const cols = usePokedexGridColumns();
        const detailRef = useRef(null);
        const skipFirstAutoScrollRef = useRef(true);

        const selectedGame = useMemo(() => POKEDEX_BY_GAME.find((g) => g.key === gameKey) || null, [gameKey]);
        const { status: gameStatus, entries: gameEntries } = usePokedexEntries(selectedGame?.pokedex);
        const { status: allStatus, items: allItems } = usePokemonList();

        const status = gameKey ? gameStatus : allStatus;
        const baseEntries = useMemo(() => {
          if (gameKey) return Array.isArray(gameEntries) ? gameEntries : [];
          const list = Array.isArray(allItems) ? allItems : [];
          return list.map((p) => ({ speciesName: p.name, nationalId: p.id, entryNumber: p.id }));
        }, [gameKey, gameEntries, allItems]);

        const filtered = useMemo(() => {
          const qRaw = query.trim().toLowerCase();
          const list = Array.isArray(baseEntries) ? baseEntries : [];
          if (!qRaw) return list;

          const digits = qRaw.replace(/[^0-9]/g, '');
          const num = digits ? Number(digits) : null;
          const paddedNational = digits ? digits.padStart(4, '0') : '';
          const paddedGame = digits ? digits.padStart(3, '0') : '';

          return list.filter((p) => {
            if (p.speciesName.includes(qRaw)) return true;
            if (digits) {
              const nationalStr = String(p.nationalId).padStart(4, '0');
              const gameStr = String(p.entryNumber).padStart(3, '0');
              if (String(p.nationalId).includes(digits)) return true;
              if (String(p.entryNumber).includes(digits)) return true;
              if (paddedNational && nationalStr.includes(paddedNational)) return true;
              if (paddedGame && gameStr.includes(paddedGame)) return true;
              if (Number.isFinite(num) && (p.nationalId === num || p.entryNumber === num)) return true;
            }
            return false;
          });
        }, [query, baseEntries]);

        useEffect(() => {
          const q = query.trim();
          if (!q) return;
          if (!filtered.length) return;
          if (filtered.some((p) => p.speciesName === selected)) return;
          setSelected(filtered[0].speciesName);
        }, [query, filtered, selected]);

        useEffect(() => {
          setVisibleCount(100);
          setSelected('');
        }, [gameKey]);

        useEffect(() => {
          if (!gameKey) setNumbering('national');
        }, [gameKey]);

        const shown = useMemo(() => {
          const q = query.trim();
          if (!q) return filtered.slice(0, visibleCount);
          return filtered.slice(0, 200);
        }, [filtered, query, visibleCount]);

        const insertAfterIndex = useMemo(() => {
          if (!shown.length) return -1;
          if (!selected) return -1;
          const idx = shown.findIndex((p) => p.speciesName === selected);
          if (idx < 0) return -1;
          const rowEnd = Math.min((Math.floor(idx / cols) + 1) * cols - 1, shown.length - 1);
          return rowEnd;
        }, [shown, selected, cols]);

        useEffect(() => {
          if (!detailRef.current) return;
          if (skipFirstAutoScrollRef.current) {
            skipFirstAutoScrollRef.current = false;
            return;
          }
          detailRef.current.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, [selected, insertAfterIndex]);

        return (
          <div>
            {status === 'loading' ? (
              <div className="text-zinc-400 mb-6">Carregando lista...</div>
            ) : status === 'error' ? (
              <div className="text-zinc-400 mb-6">Não foi possível carregar a lista agora.</div>
            ) : (
              <div className="mb-6">
                <div className="text-zinc-400 mb-4">
                  {query.trim()
                    ? `Resultados: ${filtered.length}`
                    : `Lista completa: ${baseEntries.length} (mostrando ${shown.length})`}
                </div>

                {shown.length ? (
                  <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4">
                    {shown.map((p, idx) => {
                      const sprite = `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${p.nationalId}.png`;
                      const isActive = selected === p.speciesName;
                      const shownNumber =
                        !gameKey || numbering === 'national'
                          ? `#${String(p.nationalId).padStart(4, '0')}`
                          : `#${String(p.entryNumber).padStart(3, '0')}`;
                      return (
                        <React.Fragment key={`${p.entryNumber}:${p.speciesName}`}>
                          <button
                            onClick={() => setSelected((curr) => (curr === p.speciesName ? '' : p.speciesName))}
                            className={`text-left rounded-2xl border p-4 transition-colors ${
                              isActive
                                ? 'border-cyan-400 bg-cyan-500/10'
                                : 'border-zinc-700 bg-zinc-800/30 hover:border-zinc-500'
                            }`}
                          >
                            <div className="text-sm text-zinc-400 font-black">{shownNumber}</div>
                            <div className="flex items-center gap-3 mt-2">
                              <img src={sprite} alt={p.speciesName} className="w-20 h-20 object-contain" loading="lazy" />
                              <div className="font-black text-zinc-100 text-lg">{typeLabelFromApiName(p.speciesName)}</div>
                            </div>
                          </button>

                          {idx === insertAfterIndex ? (
                            <div ref={detailRef} className="col-span-full mt-2">
                              <PokedexCard apiName={selected} captureGameKey={gameKey} onNavigateCapture={onNavigateCapture} />
                            </div>
                          ) : null}
                        </React.Fragment>
                      );
                    })}
                  </div>
                ) : query.trim() ? (
                  <div className="text-zinc-400">Nenhum resultado para "{query.trim()}".</div>
                ) : (
                  <div className="text-zinc-400">Sem itens.</div>
                )}

                {!query.trim() && shown.length < filtered.length ? (
                  <div className="mt-4">
                    <button
                      onClick={() => setVisibleCount((c) => c + 72)}
                      className="px-5 py-2 rounded-full border border-zinc-700 bg-zinc-800/40 text-zinc-200 hover:border-zinc-500 transition-colors"
                    >
                      Carregar mais
                    </button>
                  </div>
                ) : null}
              </div>
            )}
          </div>
        );
      }

      function useTypeList() {
        const [state, setState] = useState({ status: 'loading', types: [] });

        useEffect(() => {
          let cancelled = false;
          setState({ status: 'loading', types: [] });

          cachedFetchJson(`${POKEAPI_BASE}/type?limit=100`)
            .then((data) => {
              if (cancelled) return;
              const results = Array.isArray(data?.results) ? data.results : [];
              const types = results
                .map((t) => String(t?.name ?? '').trim())
                .filter((name) => name && name !== 'unknown' && name !== 'shadow' && name !== 'stellar')
                .map(typeLabelFromApiName)
                .sort((a, b) => a.localeCompare(b));
              setState({ status: 'success', types });
            })
            .catch(() => {
              if (cancelled) return;
              setState({ status: 'error', types: [] });
            });

          return () => {
            cancelled = true;
          };
        }, []);

        return state;
      }

      function TypeCard({ type }) {
        const { status, data } = useTypeRelations(type);
        const icon = ICONIC_POKEMON_BY_TYPE[type] || null;
        const iconSprite = icon ? `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${icon.id}.png` : '';

        return (
          <div className="relative overflow-hidden rounded-3xl border border-zinc-700 bg-zinc-900/50 shadow-2xl p-6">
            {iconSprite ? (
              <img
                src={iconSprite}
                alt={icon.name}
                className="absolute -bottom-6 -right-6 w-32 h-32 opacity-15 pointer-events-none select-none"
                loading="lazy"
              />
            ) : null}

            <div className="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
              <div className="flex items-center gap-3 flex-wrap">
                <span className={`border px-4 py-2 rounded-full font-black ${getTypeClass(type)}`}>{type}</span>
                {data?.meta ? (
                  <div className="border border-zinc-700/80 bg-zinc-900/40 rounded-full px-3 py-1 text-sm text-zinc-300">
                    <span className="font-black text-zinc-200">{data.meta.pokemonCount}</span> Pokémon
                  </div>
                ) : null}
              </div>
            </div>

            {status === 'loading' ? (
              <div className="text-sm text-zinc-400 mt-5 pt-5 border-t border-zinc-800/80">Carregando...</div>
            ) : status === 'error' ? (
              <div className="text-sm text-zinc-400 mt-5 pt-5 border-t border-zinc-800/80">
                Não foi possível carregar este tipo agora.
              </div>
            ) : data ? (
              <div className="mt-5 pt-5 border-t border-zinc-800/80">
                <div className="grid grid-cols-1 lg:grid-cols-2 lg:gap-0">
                  <div className="space-y-4 lg:pr-8">
                  <div className="font-black text-zinc-100">Ataque</div>
                  <InfoBlock
                    title="Super efetivo contra"
                    titleClass="text-zinc-200"
                    items={ensureMultiplier(data.attack.strong, 'x2')}
                    variant="plain"
                  />
                  <InfoBlock
                    title="Não é muito efetivo contra"
                    titleClass="text-zinc-200"
                    items={ensureMultiplier(data.attack.weak, 'x0.5')}
                    variant="plain"
                  />
                  <InfoBlock title="Não afeta" titleClass="text-zinc-200" items={ensureMultiplier(data.attack.immune, 'x0')} variant="plain" />
                </div>

                  <div className="space-y-4 lg:pl-8 lg:border-l lg:border-zinc-800/80 mt-6 lg:mt-0">
                  <div className="font-black text-zinc-100">Defesa</div>
                  <InfoBlock
                    title="Recebe super efetivo de"
                    titleClass="text-zinc-200"
                    items={ensureMultiplier(data.defend.weakTo, 'x2')}
                    variant="plain"
                  />
                  <InfoBlock title="Resiste a" titleClass="text-zinc-200" items={ensureMultiplier(data.defend.resistTo, 'x0.5')} variant="plain" />
                  <InfoBlock title="Imune a" titleClass="text-zinc-200" items={ensureMultiplier(data.defend.immuneTo, 'x0')} variant="plain" />
                </div>
              </div>
              </div>
            ) : null}
          </div>
        );
      }

      // Página: Tipos (matchups por tipo)
      function TypeChartPage({ filter: filterProp, setFilter: setFilterProp } = {}) {
        // Este filtro é controlado opcionalmente pelo pai (PokemonTeamGuide) para preservar a busca ao navegar.
        const [filterState, setFilterState] = useState('');
        const filter = filterProp !== undefined ? filterProp : filterState;
        const setFilter = typeof setFilterProp === 'function' ? setFilterProp : setFilterState;
        const { status, types } = useTypeList();

        // Filtra por substring (client-side), já que a lista de tipos é pequena.
        const filteredTypes = useMemo(() => {
          const f = filter.trim().toLowerCase();
          const list = Array.isArray(types) ? types : [];
          return f ? list.filter((t) => t.toLowerCase().includes(f)) : list;
        }, [filter, types]);

        return (
          <div>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              {status === 'loading' ? (
                <div className="text-zinc-400">Carregando tipos...</div>
              ) : status === 'error' ? (
                <div className="text-zinc-400">Não foi possível carregar os tipos agora.</div>
              ) : (
                filteredTypes.map((type) => <TypeCard key={type} type={type} />)
              )}
            </div>
          </div>
        );
      }

      // Layout global (topbar fixa + sidebar retrátil + roteamento das abas)
      function PokemonTeamGuide() {
        // initialNav: tenta restaurar estado via history.state (navegação interna),
        // com fallback para hash (#team, #battle, etc.).
        const initialNav = useMemo(() => {
          try {
            const st = history?.state?.appNav;
            if (st && typeof st === 'object' && st.page) return st;
          } catch {
            void 0;
          }
          try {
            const hash = String(window.location.hash || '').replace(/^#/, '').trim().toLowerCase();
            const allowed = new Set(['team', 'battle', 'dex', 'capture', 'types', 'realtime']);
            const p = allowed.has(hash) ? hash : 'team';
            return { page: p };
          } catch {
            return { page: 'team' };
          }
        }, []);

        // page: aba atual.
        const [page, setPage] = useState(String(initialNav?.page || 'team'));
        // ui: preferências de layout (ex.: sidebar colapsada).
        const [ui, setUi] = usePersistentState('ui:v1', { sidebarCollapsed: false });
        const sidebarCollapsed = Boolean(ui?.sidebarCollapsed);
        const isDesktop = useMediaQuery('(min-width: 1024px)');
        const sidebarWidth = isDesktop ? (sidebarCollapsed ? 72 : 240) : 0;
        const [mobileNavOpen, setMobileNavOpen] = useState(false);
        const [dexControls, setDexControls] = useState(null);
        const dexControlsOpen = Boolean(dexControls?.anchorEl);
        const [team, setTeam] = usePersistentState(TEAM_STORAGE_KEY, DEFAULT_TEAM_STATE);

        // navIndex: contador para diferenciar estados no history (útil para back/forward coerentes).
        const [navIndex, setNavIndex] = useState(() => {
          try {
            const n = Number(history?.state?.appNavIndex);
            return Number.isFinite(n) ? n : 0;
          } catch {
            return 0;
          }
        });

        const [dexQuery, setDexQuery] = useState(String(initialNav?.dexQuery || ''));
        const [typesQuery, setTypesQuery] = useState(String(initialNav?.typesQuery || ''));
        // captureNav: parâmetros de navegação "pontual" (ex.: clique em "onde capturar" vindo do Time/Pokédex).
        const [captureNav, setCaptureNav] = useState(
          initialNav?.captureNav && typeof initialNav.captureNav === 'object' ? initialNav.captureNav : { gameKey: '', pokemonName: '' }
        );
        // captureSession: estado persistível da página (jogo/pokémon/filtro de local).
        const [captureSession, setCaptureSession] = useState(
          initialNav?.captureSession && typeof initialNav.captureSession === 'object'
            ? initialNav.captureSession
            : { gameKey: '', pokemonName: '', placeFilter: '' }
        );
        // battleSession: estado persistível da página (modo, boss selecionado, oponente e slot ativo).
        const [battleSession, setBattleSession] = useState(
          initialNav?.battleSession && typeof initialNav.battleSession === 'object'
            ? initialNav.battleSession
            : { opponent: '', mode: 'pokemon', bossCategory: 'gym', bossId: '', activeSlotIndex: null }
        );
        const captureNavReqIdRef = useRef(0);
        // pokedexSession: mantém seleção e scroll ao voltar para a Pokédex.
        const [pokedexSession, setPokedexSession] = useState(
          initialNav?.pokedexSession && typeof initialNav.pokedexSession === 'object'
            ? initialNav.pokedexSession
            : { gameKey: '', numbering: 'national', visibleCount: 100, selected: '', scrollY: 0 }
        );
        const prevPageRef = useRef(page);

        const onCaptureSessionChange = useCallback((s) => setCaptureSession(s), [setCaptureSession]);
        const onBattleSessionChange = useCallback((s) => setBattleSession(s), [setBattleSession]);

        // Snapshot do estado necessário para restaurar via history.state.
        const makeNavSnapshot = () => ({
          page,
          dexQuery,
          typesQuery,
          captureNav,
          captureSession,
          battleSession,
          pokedexSession,
        });

        // Aplica um snapshot vindo do history (back/forward).
        const applyNavSnapshot = (snap) => {
          const next = snap && typeof snap === 'object' ? snap : {};
          setPage(String(next.page || 'team'));
          setDexQuery(String(next.dexQuery || ''));
          setTypesQuery(String(next.typesQuery || ''));
          setCaptureNav(
            next.captureNav && typeof next.captureNav === 'object' ? next.captureNav : { gameKey: '', pokemonName: '' }
          );
          setCaptureSession(
            next.captureSession && typeof next.captureSession === 'object'
              ? next.captureSession
              : { gameKey: '', pokemonName: '', placeFilter: '' }
          );
          setBattleSession(
            next.battleSession && typeof next.battleSession === 'object'
              ? next.battleSession
              : { opponent: '', mode: 'pokemon', bossCategory: 'gym', bossId: '', activeSlotIndex: null }
          );
          setPokedexSession(
            next.pokedexSession && typeof next.pokedexSession === 'object'
              ? next.pokedexSession
              : { gameKey: '', numbering: 'national', visibleCount: 100, selected: '', scrollY: 0 }
          );
        };

        useEffect(() => {
          try {
            if (!history?.state?.appNav) {
              const snap = makeNavSnapshot();
              history.replaceState({ appNav: snap, appNavIndex: 0 }, '', `#${String(snap.page || 'team')}`);
              setNavIndex(0);
            }
          } catch {
            void 0;
          }

          const onPop = (e) => {
            const snap = e?.state?.appNav;
            const idx = Number(e?.state?.appNavIndex);
            if (snap && typeof snap === 'object') {
              setNavIndex(Number.isFinite(idx) ? idx : 0);
              applyNavSnapshot(snap);
              return;
            }
            try {
              const hash = String(window.location.hash || '').replace(/^#/, '').trim().toLowerCase();
              const allowed = new Set(['team', 'battle', 'dex', 'capture', 'types', 'realtime']);
              setNavIndex(0);
              setPage(allowed.has(hash) ? hash : 'team');
            } catch {
              setNavIndex(0);
              setPage('team');
            }
          };

          window.addEventListener('popstate', onPop);
          return () => window.removeEventListener('popstate', onPop);
        }, []);

        useEffect(() => {
          try {
            const snap = makeNavSnapshot();
            history.replaceState({ appNav: snap, appNavIndex: navIndex }, '', `#${String(snap.page || 'team')}`);
          } catch {
            void 0;
          }
        }, [
          page,
          dexQuery,
          typesQuery,
          captureNav?.gameKey,
          captureNav?.pokemonName,
          captureSession?.gameKey,
          captureSession?.pokemonName,
          captureSession?.placeFilter,
          battleSession?.opponent,
          battleSession?.mode,
          battleSession?.bossCategory,
          battleSession?.bossId,
          battleSession?.activeSlotIndex,
          pokedexSession?.gameKey,
          pokedexSession?.numbering,
          pokedexSession?.visibleCount,
          pokedexSession?.selected,
          pokedexSession?.scrollY,
          navIndex,
        ]);

        const navigate = (patch) => {
          const current = makeNavSnapshot();
          const next = { ...current, ...(patch && typeof patch === 'object' ? patch : {}) };
          const nextPage = String(next.page || 'team');
          const nextIndex = navIndex + 1;
          setNavIndex(nextIndex);
          try {
            history.pushState({ appNav: next, appNavIndex: nextIndex }, '', `#${nextPage}`);
          } catch {
            void 0;
          }
          applyNavSnapshot(next);
        };

        const onNavigateCapture = ({ pokemonName, gameKey }) => {
          const p = String(pokemonName ?? '').trim().toLowerCase();
          const vg = String(gameKey ?? '').trim().toLowerCase();
          if (!p || !vg) return;
          const reqId = (captureNavReqIdRef.current += 1);
          resolveCapturablePokemonForGame(p, vg)
            .then((resolved) => {
              if (captureNavReqIdRef.current !== reqId) return;
              const name = resolved || p;
              navigate({ page: 'capture', captureNav: { pokemonName: name, gameKey: vg }, captureSession: { gameKey: vg, pokemonName: name, placeFilter: '' } });
            })
            .catch(() => {
              if (captureNavReqIdRef.current !== reqId) return;
              navigate({ page: 'capture', captureNav: { pokemonName: p, gameKey: vg }, captureSession: { gameKey: vg, pokemonName: p, placeFilter: '' } });
            });
        };

        const topSearch =
          page === 'dex'
            ? { value: dexQuery, onChange: setDexQuery, placeholder: 'Buscar Pokémon (ex: sceptile, #025, 386...)' }
            : page === 'types'
              ? { value: typesQuery, onChange: setTypesQuery, placeholder: 'Buscar tipo (ex: Fire, Steel, Fairy...)' }
              : null;

        useEffect(() => {
          const prev = prevPageRef.current;
          if (prev === 'dex' && page !== 'dex') {
            setPokedexSession((s) => ({ ...(s || {}), scrollY: window.scrollY || 0 }));
          }
          prevPageRef.current = page;
        }, [page]);

        useEffect(() => {
          if (page !== 'dex') return;
          const y = Number.isFinite(pokedexSession?.scrollY) ? pokedexSession.scrollY : 0;
          requestAnimationFrame(() => {
            requestAnimationFrame(() => {
              window.scrollTo(0, y);
            });
          });
        }, [page, pokedexSession.scrollY]);

        const topControls =
          page === 'team' ? (
            <div className="hidden lg:flex items-center gap-2">
              <div className="w-64">
                <GamePicker
                  value={String(team?.versionGroupName ?? '').trim().toLowerCase()}
                  onChange={(key) => setTeam((prev) => ({ ...(prev || {}), versionGroupName: String(key ?? '').trim().toLowerCase() }))}
                  options={POKEDEX_BY_GAME}
                />
              </div>
            </div>
          ) : page === 'dex' ? (
            <div className="hidden lg:flex items-center gap-2">
              <div className="w-64">
                <GamePicker
                  value={pokedexSession.gameKey}
                  onChange={(key) => setPokedexSession((s) => ({ ...(s || {}), gameKey: String(key ?? '').trim().toLowerCase() }))}
                  options={POKEDEX_BY_GAME}
                />
              </div>
              <div className="inline-flex rounded-xl border border-zinc-700 bg-zinc-900/20 p-0.5">
                <button
                  onClick={() => setPokedexSession((s) => ({ ...(s || {}), numbering: 'regional' }))}
                  disabled={!pokedexSession.gameKey}
                  className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors ${
                    !pokedexSession.gameKey
                      ? 'text-zinc-600'
                      : pokedexSession.numbering === 'regional'
                        ? 'bg-cyan-500/10 text-cyan-100'
                        : 'text-zinc-200 hover:bg-zinc-800/40'
                  }`}
                  type="button"
                >
                  Numeração do jogo
                </button>
                <button
                  onClick={() => setPokedexSession((s) => ({ ...(s || {}), numbering: 'national' }))}
                  className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors ${
                    pokedexSession.numbering === 'national'
                      ? 'bg-cyan-500/10 text-cyan-100'
                      : 'text-zinc-200 hover:bg-zinc-800/40'
                  }`}
                  type="button"
                >
                  Numeração nacional
                </button>
              </div>
            </div>
          ) : null;

        const navItems = [
          { key: 'team', label: 'Time' },
          { key: 'battle', label: 'Batalha' },
          { key: 'realtime', label: 'Real Time' },
          { key: 'dex', label: 'Pokédex' },
          { key: 'capture', label: 'Captura' },
          { key: 'types', label: 'Tipos' },
        ];

        const canGoBack = navIndex > 0;

        return (
          <div className="min-h-screen bg-zinc-950 text-white overflow-x-hidden">
            <header className="fixed top-0 left-0 right-0 h-14 z-50 border-b border-zinc-800 bg-zinc-950/80 backdrop-blur">
              <div className="h-full flex items-center">
                <div className="h-full flex items-center justify-center px-4 border-r border-zinc-800" style={{ width: isDesktop ? sidebarWidth : 56 }}>
                  <button
                    type="button"
                    onClick={() => (isDesktop ? setUi((prev) => ({ ...(prev || {}), sidebarCollapsed: !sidebarCollapsed })) : setMobileNavOpen((v) => !v))}
                    className="w-9 h-9 rounded-lg border border-zinc-800 bg-zinc-900/40 hover:bg-zinc-900/70 transition-colors flex items-center justify-center"
                    aria-label="Alternar menu"
                    title="Alternar menu"
                  >
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2">
                      <path d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                  </button>
                </div>

                <div className="flex-1 h-full flex items-center gap-3 px-4">
                  {canGoBack ? (
                    <button
                      type="button"
                      onClick={() => history.back()}
                      className="w-9 h-9 rounded-lg border border-zinc-800 bg-zinc-900/40 hover:bg-zinc-900/70 transition-colors flex items-center justify-center"
                      aria-label="Voltar"
                      title="Voltar"
                    >
                      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2">
                        <path d="M15 18l-6-6 6-6" />
                      </svg>
                    </button>
                  ) : null}
                  <button
                    type="button"
                    onClick={() => navigate({ page: 'team' })}
                    className="inline-flex items-center gap-3 rounded-xl hover:bg-zinc-900/40 transition-colors px-2 py-1"
                    title="Home"
                    aria-label="Home"
                  >
                    <span className="w-9 h-9 rounded-lg border border-zinc-800 bg-zinc-900/30 flex items-center justify-center">
                      <svg viewBox="0 0 24 24" width="18" height="18">
                        <circle cx="12" cy="12" r="9" fill="#ef4444" opacity="0.9" />
                        <path d="M12 3a9 9 0 0 0-9 9h18a9 9 0 0 0-9-9Z" fill="#ef4444" opacity="0.9" />
                        <path d="M12 21a9 9 0 0 1-9-9h18a9 9 0 0 1-9 9Z" fill="#ffffff" opacity="0.9" />
                        <path d="M3 12h18" stroke="#0a0a0a" strokeWidth="2" opacity="0.9" />
                        <circle cx="12" cy="12" r="3" fill="#0a0a0a" opacity="0.9" />
                        <circle cx="12" cy="12" r="1.6" fill="#ffffff" opacity="0.95" />
                      </svg>
                    </span>
                    <span className="font-black text-zinc-100 hidden sm:inline">PokéGuide</span>
                  </button>
                  <div className="flex-1" />
                  {isDesktop ? topControls : null}
                  {!isDesktop && page === 'dex' ? (
                    <button
                      type="button"
                      onClick={(e) => setDexControls({ anchorEl: e.currentTarget })}
                      className="w-9 h-9 rounded-lg border border-zinc-800 bg-zinc-900/40 hover:bg-zinc-900/70 transition-colors flex items-center justify-center"
                      aria-label="Filtros da Pokédex"
                      title="Filtros"
                    >
                      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2">
                        <path d="M4 6h16M7 12h10M10 18h4" />
                      </svg>
                    </button>
                  ) : null}
                  {topSearch ? (
                    <input
                      value={topSearch.value}
                      onChange={(e) => topSearch.onChange(e.target.value)}
                      placeholder={topSearch.placeholder}
                      className={`w-full ${isDesktop ? (page === 'dex' ? 'max-w-[420px]' : 'max-w-[520px]') : 'max-w-full'} bg-zinc-900/50 border border-zinc-800 rounded-xl px-3 py-2 text-sm outline-none focus:border-cyan-400 text-white`}
                    />
                  ) : (
                    <div className="w-full max-w-[520px]" />
                  )}
                </div>
              </div>
            </header>

            <SmartPopover open={!isDesktop && dexControlsOpen} anchorEl={dexControls?.anchorEl} maxWidth={520} className="z-[60]">
              <div className="w-[520px] max-w-full">
