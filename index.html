                <div className="flex items-center justify-between gap-3 mb-3">
                  <div className="font-black text-zinc-100">Filtros</div>
                  <button
                    type="button"
                    onClick={() => setDexControls(null)}
                    className="text-xs font-semibold text-zinc-300 hover:text-white transition-colors"
                  >
                    Fechar
                  </button>
                </div>
                <div className="space-y-3">
                  <div>
                    <div className="text-xs font-black text-zinc-300 mb-2">Jogo</div>
                    <GamePicker
                      value={pokedexSession.gameKey}
                      onChange={(key) => {
                        setPokedexSession((s) => ({ ...(s || {}), gameKey: String(key ?? '').trim().toLowerCase() }));
                        setDexControls(null);
                      }}
                      options={POKEDEX_BY_GAME}
                    />
                  </div>
                  <div>
                    <div className="text-xs font-black text-zinc-300 mb-2">Numeração</div>
                    <div className="inline-flex rounded-xl border border-zinc-700 bg-zinc-900/20 p-0.5">
                      <button
                        onClick={() => setPokedexSession((s) => ({ ...(s || {}), numbering: 'regional' }))}
                        disabled={!pokedexSession.gameKey}
                        className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors ${
                          !pokedexSession.gameKey
                            ? 'text-zinc-600'
                            : pokedexSession.numbering === 'regional'
                              ? 'bg-cyan-500/10 text-cyan-100'
                              : 'text-zinc-200 hover:bg-zinc-800/40'
                        }`}
                        type="button"
                      >
                        Do jogo
                      </button>
                      <button
                        onClick={() => setPokedexSession((s) => ({ ...(s || {}), numbering: 'national' }))}
                        className={`px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors ${
                          pokedexSession.numbering === 'national'
                            ? 'bg-cyan-500/10 text-cyan-100'
                            : 'text-zinc-200 hover:bg-zinc-800/40'
                        }`}
                        type="button"
                      >
                        Nacional
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </SmartPopover>

            {isDesktop ? (
              <aside
                className="fixed top-14 left-0 bottom-0 z-40 border-r border-zinc-800 bg-zinc-950/80 backdrop-blur flex flex-col"
                style={{ width: sidebarWidth }}
              >
                <nav className="p-2 space-y-1">
                  {navItems.map((item) => {
                    const active = page === item.key;
                    return (
                      <button
                        key={item.key}
                        type="button"
                        onClick={() => navigate({ page: item.key })}
                        className={`w-full flex items-center gap-3 px-3 py-2 rounded-xl border transition-colors ${
                          active
                            ? 'border-cyan-400/40 bg-cyan-500/10 text-cyan-100'
                            : 'border-transparent text-zinc-200 hover:bg-zinc-900/40'
                        }`}
                        title={item.label}
                      >
                        <span className="w-9 h-9 rounded-lg border border-zinc-800 bg-zinc-900/30 flex items-center justify-center">
                          <span className="text-sm font-black text-zinc-200">{item.label[0]}</span>
                        </span>
                        {!sidebarCollapsed ? <span className="font-semibold">{item.label}</span> : null}
                      </button>
                    );
                  })}
                </nav>

                <div className="mt-auto p-3 text-xs text-zinc-500">
                  {!sidebarCollapsed ? <>© {new Date().getFullYear()} Gabriel Guedes &quot;Andr0id&quot;</> : <span>©</span>}
                </div>
              </aside>
            ) : null}

            {!isDesktop && mobileNavOpen ? (
              <div className="fixed inset-0 z-50">
                <div className="absolute inset-0 bg-black/60" onClick={() => setMobileNavOpen(false)} />
                <div className="absolute top-14 left-0 bottom-0 w-[280px] border-r border-zinc-800 bg-zinc-950/95 backdrop-blur flex flex-col">
                  <nav className="p-2 space-y-1">
                    {navItems.map((item) => {
                      const active = page === item.key;
                      return (
                        <button
                          key={item.key}
                          type="button"
                          onClick={() => {
                            navigate({ page: item.key });
                            setMobileNavOpen(false);
                          }}
                          className={`w-full flex items-center gap-3 px-3 py-2 rounded-xl border transition-colors ${
                            active
                              ? 'border-cyan-400/40 bg-cyan-500/10 text-cyan-100'
                              : 'border-transparent text-zinc-200 hover:bg-zinc-900/40'
                          }`}
                          title={item.label}
                        >
                          <span className="w-9 h-9 rounded-lg border border-zinc-800 bg-zinc-900/30 flex items-center justify-center">
                            <span className="text-sm font-black text-zinc-200">{item.label[0]}</span>
                          </span>
                          <span className="font-semibold">{item.label}</span>
                        </button>
                      );
                    })}
                  </nav>
                  <div className="mt-auto p-3 text-xs text-zinc-500">© {new Date().getFullYear()} Gabriel Guedes &quot;Andr0id&quot;</div>
                </div>
              </div>
            ) : null}

            <main className="pt-14" style={{ paddingLeft: sidebarWidth }}>
              <div className="max-w-screen-2xl mx-auto p-6">
                {page === 'team' ? (
                  <TeamPage
                    onNavigateCapture={onNavigateCapture}
                  />
                ) : page === 'battle' ? (
                  <BattlePage
                    initialOpponent={battleSession?.opponent || ''}
                    initialMode={battleSession?.mode || 'pokemon'}
                    initialBossCategory={battleSession?.bossCategory || 'gym'}
                    initialBossId={battleSession?.bossId || ''}
                    initialActiveSlotIndex={battleSession?.activeSlotIndex ?? null}
                    onSessionChange={onBattleSessionChange}
                  />
                ) : page === 'realtime' ? (
                  <RealTimePage />
                ) : page === 'dex' ? (
                  <PokedexPage
                    query={dexQuery}
                    setQuery={setDexQuery}
                    gameKey={pokedexSession.gameKey}
                    setGameKey={(key) => setPokedexSession((s) => ({ ...(s || {}), gameKey: String(key ?? '').trim().toLowerCase() }))}
                    numbering={pokedexSession.numbering}
                    setNumbering={(v) => setPokedexSession((s) => ({ ...(s || {}), numbering: v }))}
                    visibleCount={pokedexSession.visibleCount}
                    setVisibleCount={(next) =>
                      setPokedexSession((s) => ({
                        ...(s || {}),
                        visibleCount: typeof next === 'function' ? next(s?.visibleCount ?? 100) : next,
                      }))
                    }
                    selected={pokedexSession.selected}
                    setSelected={(next) =>
                      setPokedexSession((s) => ({
                        ...(s || {}),
                        selected: typeof next === 'function' ? next(s?.selected ?? '') : next,
                      }))
                    }
                    onNavigateCapture={({ pokemonName, gameKey }) => {
                      onNavigateCapture({ pokemonName, gameKey });
                    }}
                  />
                ) : page === 'capture' ? (
                  <CapturePage
                    initialGameKey={captureSession?.gameKey || captureNav.gameKey}
                    initialPokemonName={captureSession?.pokemonName || captureNav.pokemonName}
                    initialPlaceFilter={captureSession?.placeFilter || ''}
                    onSessionChange={onCaptureSessionChange}
                  />
                ) : (
                  <TypeChartPage filter={typesQuery} setFilter={setTypesQuery} />
                )}
              </div>
            </main>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<PokemonTeamGuide />);
    </script>
  </body>
</html>
